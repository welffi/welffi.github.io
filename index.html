<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>welffi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    /* ─────────────────────────────────────────────
       EASY CUSTOMIZATION
       • Add/remove items in the JS `links` array below
       • Change colors in :root
    ───────────────────────────────────────────── */

    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --border:   #2a2a2a;
      --text:     #e8e4dc;
      --muted:    #5a5a5a;
      --accent:   #c8b89a;
      --hover-bg: #1e1e1e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      gap: 3rem;
    }

    /* ── Header ─────────────────────────── */
    .header {
      text-align: center;
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      margin: 0 auto 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Instrument Serif', serif;
      font-size: 1.6rem;
      color: var(--accent);
      letter-spacing: -0.02em;
      background: var(--surface);
      transition: border-color 0.3s, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .avatar:hover { border-color: var(--accent); transform: scale(1.06); }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
    }

    .tagline {
      margin-top: 0.55rem;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── Link list ───────────────────────── */
    .links {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.95rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .link-item:hover {
      background: var(--hover-bg);
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .link-icon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      border-radius: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s;
    }
    .link-item:hover .link-icon { border-color: var(--accent); }

    .link-icon svg {
      width: 15px;
      height: 15px;
      fill: var(--muted);
      transition: fill 0.2s;
    }
    .link-item:hover .link-icon svg { fill: var(--accent); }

    .link-text {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      min-width: 0;
    }

    .link-label {
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      font-weight: 400;
    }

    .link-sub {
      font-size: 0.68rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 300;
    }

    .link-arrow {
      margin-left: auto;
      color: var(--muted);
      font-size: 0.8rem;
      transition: color 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .link-item:hover .link-arrow { color: var(--accent); transform: translateX(2px); }

    /* ── Footer ─────────────────────────── */
    footer {
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      animation: fadeUp 0.7s 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* ── Animations ──────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="avatar">w</div>
    <h1>welffi</h1>
    <p class="tagline">links &amp; socials</p>
  </header>

  <nav class="links" id="links-container">
    <!-- links are injected by JS below -->
  </nav>

  <footer>© 2026 welffi</footer>

</div>

<script>

       icon   – choose from: twitter, instagram, github,

    {

  /* ── Render ──────────────────────────────────── */
  const container = document.getElementById('links-container');

  links.forEach((link, i) => {
    const a = document.createElement('a');
    a.href = link.url;
    a.className = 'link-item';
    a.target = link.url.startsWith('mailto') ? '_self' : '_blank';
    a.rel = 'noopener noreferrer';
    a.style.animationDelay = `${0.1 + i * 0.07}s`;

    a.innerHTML = `
      <span class="link-icon">
        ${icons[link.icon] || icons.website}
      </span>
      <span class="link-text">
        <span class="link-label">${link.label}</span>
        ${link.sub ? `<span class="link-sub">${link.sub}</span>` : ''}
      </span>
      <span class="link-arrow">→</span>
    `;
    container.appendChild(a);
  });
</script>

</html>
