<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>welffi's links</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/c7moPaj.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100;0,9..144,300;1,9..144,100;1,9..144,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0a0908;
      --surface:  #141210;
      --surface2: #1a1714;
      --border:   #241f1b;
      --border2:  #2e2821;
      --text:     #ede8e0;
      --muted:    #4e463c;
      --muted2:   #695e52;
      --accent:   #d4a574;
      --accent2:  #e8c49a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.032) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 40% at 50% -5%, rgba(212,165,116,0.09) 0%, transparent 65%),
        radial-gradient(ellipse 60% 30% at 50% 105%, rgba(180,130,80,0.05) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 7rem;
    }

    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding-bottom: 2rem;
      margin-bottom: 1.6rem;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .avatar-wrap { position: relative; flex-shrink: 0; }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid rgba(212,165,116,0.25);
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid rgba(212,165,116,0.18);
      animation: ringPulse 3s ease-in-out infinite;
    }

    .avatar-ring2 {
      position: absolute;
      inset: -9px;
      border-radius: 50%;
      border: 1px solid rgba(212,165,116,0.07);
      animation: ringPulse 3s ease-in-out 1s infinite;
    }

    .header-text { flex: 1; }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.7rem;
      font-weight: 300;
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--text);
    }

    .header-sub {
      margin-top: 0.35rem;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      color: var(--muted2);
      font-weight: 300;
      text-transform: lowercase;
    }

    .status-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 0.4rem;
      box-shadow: 0 0 6px rgba(74, 222, 128, 0.6);
      animation: blink 2.5s ease-in-out infinite;
    }

    .links { display: flex; flex-direction: column; gap: 0; }

    .category-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 1.5rem 0 0.7rem;
    }

    .category-row:first-child { padding-top: 0; }

    .category-row::before,
    .category-row::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    .category-label {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: lowercase;
      color: var(--muted);
      font-weight: 300;
      flex-shrink: 0;
    }

    .link-group { display: flex; flex-direction: column; gap: 3px; }

    .link-item {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.8rem 1rem;
      color: var(--text);
      text-decoration: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.018);
      border: 1px solid transparent;
      position: relative;
      overflow: hidden;
      transition: background 0.3s ease, border-color 0.3s ease, transform 0.25s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.3s ease, padding-left 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      animation: fadeUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .link-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.04) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .link-item:hover::before { transform: translateX(100%); }
    .link-item:hover { transform: translateY(-1px); padding-left: 1.15rem; }

    .link-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 9px;
      flex-shrink: 0;
      transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .link-item:hover .link-icon { transform: scale(1.1) rotate(-3deg); }
    .link-icon svg { width: 15px; height: 15px; display: block; }

    .link-body {
      display: flex;
      flex-direction: column;
      gap: 0.12rem;
      flex: 1;
      min-width: 0;
    }

    .link-label { font-size: 0.77rem; letter-spacing: 0.06em; color: var(--text); font-weight: 400; }

    .link-sub {
      font-size: 0.62rem;
      color: var(--muted2);
      font-weight: 300;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-arrow {
      font-size: 0.7rem;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      opacity: 0;
    }

    .link-item:hover .link-arrow { opacity: 1; transform: translate(2px, -2px); }

    .taskbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 6px;
      height: 52px;
      background: rgba(20, 17, 14, 0.82);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(212,165,116,0.14);
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset, 0 1px 0 rgba(255,255,255,0.06) inset;
      animation: dockSlideUp 0.7s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .taskbar-section { display: flex; align-items: center; gap: 2px; padding: 0 8px; }

    .taskbar-divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; margin: 0 2px; }

    .taskbar-clock { padding: 0 10px; text-align: center; }

    .clock-time {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.08em;
      line-height: 1;
    }

    .clock-date {
      font-size: 0.5rem;
      font-weight: 300;
      color: var(--muted2);
      letter-spacing: 0.12em;
      margin-top: 2px;
      text-transform: lowercase;
    }

    .dock-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: none;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), background 0.2s ease;
      text-decoration: none;
    }

    .dock-btn:hover { background: rgba(212,165,116,0.08); transform: translateY(-4px) scale(1.08); }
    .dock-btn svg { width: 16px; height: 16px; display: block; }

    .dock-btn.active::after {
      content: '';
      position: absolute;
      bottom: 1px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--accent);
    }

    .dock-btn .tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: rgba(20,17,14,0.95);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
    }

    .dock-btn:hover .tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }

    .spotify-player { display: flex; align-items: center; gap: 8px; padding: 0 6px; max-width: 240px; }

    .sp-art {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .sp-art img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .sp-art-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .sp-art-placeholder svg { width: 14px; height: 14px; color: var(--muted2); }

    .sp-info { display: flex; flex-direction: column; gap: 1px; min-width: 0; flex: 1; overflow: hidden; }

    .sp-track { font-size: 0.62rem; color: var(--text); font-weight: 400; letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sp-artist { font-size: 0.54rem; color: var(--muted2); font-weight: 300; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .sp-controls { display: flex; align-items: center; gap: 1px; flex-shrink: 0; }

    .play-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 7px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--muted2);
      transition: color 0.2s, background 0.2s;
    }

    .play-btn:hover { color: #1ed760; background: rgba(30,215,96,0.08); }
    .play-btn svg { width: 11px; height: 11px; }

    .sp-connect-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid rgba(30,215,96,0.3);
      background: rgba(30,215,96,0.07);
      cursor: pointer;
      color: #1ed760;
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    .sp-connect-btn:hover { background: rgba(30,215,96,0.14); border-color: rgba(30,215,96,0.5); }
    .sp-connect-btn svg { width: 12px; height: 12px; }

    .sp-idle { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.08em; padding: 0 4px; }

    .bars { display: flex; align-items: flex-end; gap: 2px; height: 12px; flex-shrink: 0; }

    .bar { width: 2px; background: #1ed760; border-radius: 1px; animation: barBounce 0.8s ease-in-out infinite; }
    .bar:nth-child(1) { animation-delay: 0s;    height: 6px; }
    .bar:nth-child(2) { animation-delay: 0.15s; height: 10px; }
    .bar:nth-child(3) { animation-delay: 0.3s;  height: 7px; }

    @keyframes barBounce {
      0%, 100% { transform: scaleY(0.4); }
      50%       { transform: scaleY(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes dockSlideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.04); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>

<script>
  const SPOTIFY_CLIENT_ID = 'YOUR_CLIENT_ID_HERE';
  const REDIRECT_URI = window.location.origin + window.location.pathname;
  const SCOPES = 'user-read-currently-playing user-read-playback-state user-modify-playback-state';

  let spotifyToken = null;
  let pollInterval = null;

  function generateRandom(len) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    return Array.from(crypto.getRandomValues(new Uint8Array(len))).map(b => chars[b % chars.length]).join('');
  }

  async function sha256(plain) {
    const enc = new TextEncoder().encode(plain);
    const hash = await crypto.subtle.digest('SHA-256', enc);
    return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  }

  async function spotifyLogin() {
    const verifier = generateRandom(64);
    const challenge = await sha256(verifier);
    sessionStorage.setItem('sp_verifier', verifier);
    const params = new URLSearchParams({
      response_type: 'code',
      client_id: SPOTIFY_CLIENT_ID,
      scope: SCOPES,
      redirect_uri: REDIRECT_URI,
      code_challenge_method: 'S256',
      code_challenge: challenge,
    });
    window.location.href = 'https://accounts.spotify.com/authorize?' + params;
  }

  async function exchangeCode(code) {
    const verifier = sessionStorage.getItem('sp_verifier');
    if (!verifier) return;
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        code,
        redirect_uri: REDIRECT_URI,
        client_id: SPOTIFY_CLIENT_ID,
        code_verifier: verifier,
      }),
    });
    const data = await res.json();
    if (data.access_token) {
      spotifyToken = data.access_token;
      sessionStorage.removeItem('sp_verifier');
      window.history.replaceState({}, '', window.location.pathname);
      startPolling();
    }
  }

  async function fetchNowPlaying() {
    if (!spotifyToken) return;
    try {
      const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
        headers: { Authorization: 'Bearer ' + spotifyToken },
      });
      if (res.status === 204) { renderIdle(); return; }
      if (res.status === 401) { spotifyToken = null; renderConnect(); return; }
      const data = await res.json();
      if (data && data.item) renderPlaying(data.item, data.is_playing);
      else renderIdle();
    } catch {}
  }

  async function spotifyAction(action) {
    if (!spotifyToken) return;
    const map = {
      prev:  { method: 'POST', url: 'https://api.spotify.com/v1/me/player/previous' },
      next:  { method: 'POST', url: 'https://api.spotify.com/v1/me/player/next' },
      play:  { method: 'PUT',  url: 'https://api.spotify.com/v1/me/player/play' },
      pause: { method: 'PUT',  url: 'https://api.spotify.com/v1/me/player/pause' },
    };
    const ep = map[action];
    if (!ep) return;
    await fetch(ep.url, { method: ep.method, headers: { Authorization: 'Bearer ' + spotifyToken } });
    setTimeout(fetchNowPlaying, 400);
  }

  function renderPlaying(track, playing) {

    const playIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
    const pauseIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
    document.getElementById('spotify-player').innerHTML =
      `<div class="sp-art">${art ? `<img src="${art}" alt=""/>` : `<div class="sp-art-placeholder">${spotifyIconSvg}</div>`}</div>
       ${playing ? `<div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>` : ''}

    document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;

    const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    document.getElementById('clock-date').textContent =

  const container = document.getElementById('links-container');
  let globalIndex = 0;

  links.forEach((group) => {
    const catRow = document.createElement('div');
    catRow.className = 'category-row';
    catRow.innerHTML = `<span class="category-label">${group.category}</span>`;
    container.appendChild(catRow);

    const groupEl = document.createElement('div');
    groupEl.className = 'link-group';
    container.appendChild(groupEl);

    group.items.forEach((link) => {
      const i = globalIndex++;
      const a = document.createElement('a');
      a.href = link.url;
      a.className = 'link-item';
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.style.animationDelay = `${0.08 + i * 0.06}s`;

      const hex = link.color.replace('#','');
      const r = parseInt(hex.slice(0,2),16);
      const g = parseInt(hex.slice(2,4),16);
      const b = parseInt(hex.slice(4,6),16);

      a.addEventListener('mouseenter', () => {
        a.style.background = `rgba(${r},${g},${b},0.07)`;
        a.style.borderColor = `rgba(${r},${g},${b},0.2)`;
        a.style.boxShadow = `0 0 20px rgba(${r},${g},${b},0.06)`;
      });
      a.addEventListener('mouseleave', () => {
        a.style.background = 'rgba(255,255,255,0.018)';
        a.style.borderColor = 'transparent';
        a.style.boxShadow = 'none';
      });

      a.innerHTML = `
        <span class="link-icon" style="background:rgba(${r},${g},${b},0.1);color:${link.color}">${icons[link.icon] || ''}</span>
        <span class="link-body">

        </span>
        <span class="link-arrow" style="color:${link.color}">↗</span>
      `;

    });
