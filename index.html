<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>welffi's links</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/c7moPaj.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0d0d0d;
      --surface: #141414;
      --border:  #222222;
      --text:    #e8e4dc;
      --muted:   #484848;
      --accent:  #c8b89a;
      --glow:    rgba(200, 184, 154, 0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(200,184,154,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 50% 100%, rgba(200,184,154,0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding-bottom: 2rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }

    .avatar::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(200,184,154,0.25);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 50%;
    }

    .header-text {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.65rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }

    .tagline {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 300;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .category {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1.5rem 0 0.5rem;
    }
    .category:first-child { padding-top: 0; }
    .category::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .category-label {
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 400;
      flex-shrink: 0;
    }

    .link-item {
      display: grid;
      grid-template-columns: 20px 1fr auto;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      position: relative;
      transition: padding-left 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .link-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0;
      background: linear-gradient(90deg, var(--glow), transparent);
      transition: width 0.3s ease;
      pointer-events: none;
    }

    .link-item:hover {
      padding-left: 0.5rem;
    }

    .link-item:hover::before {
      width: 100%;
    }

    .link-num {
      font-size: 0.6rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.05em;
      transition: color 0.2s;
      user-select: none;
    }
    .link-item:hover .link-num { color: var(--accent); }

    .link-body {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      min-width: 0;
    }

    .link-label {
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      color: var(--text);
      font-weight: 400;
      transition: color 0.2s;
    }
    .link-item:hover .link-label { color: var(--accent); }

    .link-sub {
      font-size: 0.64rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 300;
    }

    .link-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 13px;
      height: 13px;
      fill: var(--muted);
      display: block;
      transition: fill 0.2s;
    }
    .link-item:hover .link-icon svg { fill: var(--accent); }

    .link-arrow {
      font-size: 0.7rem;
      color: var(--muted);
      transition: color 0.2s, transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .link-item:hover .link-arrow {
      color: var(--accent);
      transform: translate(3px, -2px);
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
      animation: fadeUp 0.6s 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

        </span>
      `;
      container.appendChild(a);
    });
  });
</script>
