<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>welffi's links</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/c7moPaj.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0e0c0b;
      --surface: #181512;
      --border:  #2a2420;
      --text:    #ede8e0;
      --muted:   #5a5048;
      --accent:  #d4a574;
      --glow:    rgba(212, 165, 116, 0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      background-image: radial-gradient(circle, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 22px 22px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(212,165,116,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 50% 100%, rgba(212,165,116,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 1.1rem;
      padding-bottom: 1.8rem;
      margin-bottom: 1.8rem;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }

    .avatar::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(212,165,116,0.3);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 50%;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.7rem;
      font-weight: 300;
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--text);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .category {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 1.4rem 0 0.6rem;
    }
    .category:first-child { padding-top: 0; }
    .category::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .category-label {
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: lowercase;
      color: var(--muted);
      font-weight: 300;
      flex-shrink: 0;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.75rem 0.9rem;
      margin: 2px 0;
      color: var(--text);
      text-decoration: none;
      border-radius: 10px;
      background: transparent;
      position: relative;
      transition: background 0.25s ease, padding-left 0.2s ease;
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .link-item:hover {
      padding-left: 1.1rem;
    }

    .link-icon svg {
      width: 15px;
      height: 15px;
      display: block;
      flex-shrink: 0;
      transition: opacity 0.2s;
      opacity: 0.55;
    }
    .link-item:hover .link-icon svg { opacity: 1; }

    .link-body {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      flex: 1;
      min-width: 0;
    }

    .link-label {
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      color: var(--text);
      font-weight: 400;
      transition: color 0.2s;
    }

    .link-sub {
      font-size: 0.63rem;
      color: var(--muted);
      font-weight: 300;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-arrow {
      font-size: 0.65rem;
      color: var(--muted);
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s cubic-bezier(0.22, 1, 0.36, 1);
      opacity: 0;
    }
    .link-item:hover .link-arrow {
      opacity: 1;
      transform: translate(2px, -2px);
    }

    footer {
      margin-top: 2.2rem;
      font-size: 0.56rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: lowercase;
      text-align: center;
      opacity: 0.6;
      animation: fadeUp 0.5s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="card">

    <header class="header">

      <h1>hi hi hi hi</h1>
    </header>

    <footer></footer>
  </div>

  const container = document.getElementById('links-container');
  let globalIndex = 0;

  links.forEach((group) => {
    const categoryEl = document.createElement('div');
    categoryEl.className = 'category';
    categoryEl.innerHTML = `<span class="category-label">${group.category}</span>`;
    container.appendChild(categoryEl);

    group.items.forEach((link) => {
      const i = globalIndex++;
      const a = document.createElement('a');
      a.href = link.url;
      a.className = 'link-item';
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.style.animationDelay = `${0.07 + i * 0.055}s`;

      const hex = link.color;
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);

      a.addEventListener('mouseenter', () => {
        a.style.background = `rgba(${r},${g},${b},0.08)`;
      });
      a.addEventListener('mouseleave', () => {
        a.style.background = 'transparent';
      });

      a.innerHTML = `
        <span class="link-icon" style="color:${link.color}">${icons[link.icon] || ''}</span>
        <span class="link-body">
          <span class="link-label">${link.label}</span>
          ${link.sub ? `<span class="link-sub">${link.sub}</span>` : ''}
        </span>
        <span class="link-arrow" style="color:${link.color}">↗</span>
      `;
      container.appendChild(a);
    });
  });
