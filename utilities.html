<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>welffi's utilities</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/c7moPaj.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100;0,9..144,300;1,9..144,100;1,9..144,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0a0908;
      --surface:  #141210;
      --surface2: #1a1714;
      --border:   #241f1b;
      --border2:  #2e2821;
      --text:     #ede8e0;
      --muted:    #4e463c;
      --muted2:   #695e52;
      --accent:   #d4a574;
      --accent2:  #e8c49a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.032) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 40% at 50% -5%, rgba(212,165,116,0.09) 0%, transparent 65%),
        radial-gradient(ellipse 60% 30% at 50% 105%, rgba(180,130,80,0.05) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 7rem;
    }

    .card {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding-bottom: 1.8rem;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      text-decoration: none;
      color: var(--muted2);
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.2s cubic-bezier(0.22,1,0.36,1);
      flex-shrink: 0;
    }
    .back-btn:hover {
      background: rgba(212,165,116,0.08);
      border-color: rgba(212,165,116,0.25);
      color: var(--accent);
      transform: translateX(-2px);
    }
    .back-btn svg { width: 14px; height: 14px; }

    .header-text { flex: 1; }
    .header-title {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--text);
    }
    .header-sub {
      margin-top: 0.3rem;
      font-size: 0.56rem;
      letter-spacing: 0.18em;
      color: var(--muted2);
      font-weight: 300;
      text-transform: lowercase;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 580px) {
      .tools-grid { grid-template-columns: 1fr; }
      .tool-card.wide { grid-column: 1; }
    }

    .tool-card {
      background: rgba(255,255,255,0.018);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }

    .tool-card.wide { grid-column: 1 / -1; }

    .tool-title {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: lowercase;
      color: var(--muted2);
      font-weight: 300;
    }

    .tool-sublabel {
      font-size: 0.5rem;
      letter-spacing: 0.16em;
      text-transform: lowercase;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 0.35rem;
    }

    .util-row {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .util-group {
      display: flex;
      flex-direction: column;
    }

    textarea, input[type="text"], input[type="number"] {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      padding: 0.6rem 0.8rem;
      outline: none;
      resize: none;
      transition: border-color 0.2s;
    }
    textarea:focus, input[type="text"]:focus, input[type="number"]:focus {
      border-color: rgba(212,165,116,0.35);
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.5rem 0.85rem;
      border-radius: 9px;
      border: 1px solid var(--border2);
      background: rgba(255,255,255,0.03);
      color: var(--muted2);
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-transform: lowercase;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s cubic-bezier(0.22,1,0.36,1);
      white-space: nowrap;
    }
    .btn:hover {
      background: rgba(212,165,116,0.08);
      border-color: rgba(212,165,116,0.25);
      color: var(--accent);
      transform: translateY(-1px);
    }
    .btn.accent {
      background: rgba(212,165,116,0.1);
      border-color: rgba(212,165,116,0.3);
      color: var(--accent);
    }
    .btn.accent:hover {
      background: rgba(212,165,116,0.18);
      border-color: rgba(212,165,116,0.5);
    }
    .btn svg { width: 11px; height: 11px; flex-shrink: 0; }

    .btn-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* case converter */
    .case-output {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.6rem 0.8rem;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      color: var(--text);
      min-height: 2.5rem;
      word-break: break-all;
      white-space: pre-wrap;
    }

    /* counter */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .stat-box {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0.5rem 0.7rem;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-value {
      font-size: 1rem;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.5rem;
      letter-spacing: 0.15em;
      color: var(--muted2);
      text-transform: lowercase;
    }

    /* color */
    .color-preview {
      width: 100%;
      height: 52px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      transition: background 0.15s;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .color-preview input[type="color"] {
      position: absolute;
      inset: -4px;
      width: calc(100% + 8px);
      height: calc(100% + 8px);
      opacity: 0;
      cursor: pointer;
      border: none;
      padding: 0;
    }

    .color-fields {
      display: flex;
      gap: 6px;
    }

    .color-field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .color-field label {
      font-size: 0.5rem;
      letter-spacing: 0.15em;
      color: var(--muted2);
      text-transform: lowercase;
    }

    input[type="number"] {
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    /* password */
    .pass-output {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 0.6rem 0.8rem;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      color: var(--accent2);
      word-break: break-all;
      min-height: 2.5rem;
      white-space: pre-wrap;
    }

    .length-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .length-label {
      font-size: 0.58rem;
      color: var(--muted2);
      letter-spacing: 0.06em;
      min-width: 26px;
      text-align: right;
      flex-shrink: 0;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: var(--border2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px rgba(212,165,116,0.4);
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--bg);
    }

    .options-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .opt-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      user-select: none;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      color: var(--muted2);
      text-transform: lowercase;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .opt-toggle.on {
      background: rgba(212,165,116,0.1);
      border-color: rgba(212,165,116,0.35);
      color: var(--accent);
    }
    .opt-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .opt-toggle.on .opt-dot { background: var(--accent); }

    /* taskbar */
    .taskbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 6px;
      height: 52px;
      background: rgba(20, 17, 14, 0.82);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(212,165,116,0.14);
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset, 0 1px 0 rgba(255,255,255,0.06) inset;
      animation: dockSlideUp 0.7s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .taskbar-section { display: flex; align-items: center; gap: 2px; padding: 0 8px; }
    .taskbar-divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
    .taskbar-clock { padding: 0 10px; text-align: center; }
    .clock-time { font-size: 0.72rem; font-weight: 400; color: var(--accent); letter-spacing: 0.08em; line-height: 1; }
    .clock-date { font-size: 0.5rem; font-weight: 300; color: var(--muted2); letter-spacing: 0.12em; margin-top: 2px; text-transform: lowercase; }

    .dock-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: none;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), background 0.2s ease;
      text-decoration: none;
    }
    .dock-btn:hover { background: rgba(212,165,116,0.08); transform: translateY(-4px) scale(1.08); }
    .dock-btn svg { width: 16px; height: 16px; display: block; }
    .dock-btn.active::after {
      content: '';
      position: absolute;
      bottom: 1px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--accent);
    }
    .dock-btn .tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: rgba(20,17,14,0.95);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
    }
    .dock-btn:hover .tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dockSlideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="card">

    <header class="header">
      <a class="back-btn" href="./">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </a>
      <div class="header-text">
        <h1 class="header-title">utilities</h1>
        <p class="header-sub">small tools · no frills</p>
      </div>
    </header>

    <div class="tools-grid">

      <!-- Username Generator -->
      <div class="tool-card wide" style="animation-delay:0.26s">
        <span class="tool-title">username</span>
        <div class="pass-output" id="user-output">—</div>

        <div>
          <p class="tool-sublabel">word pools</p>
          <div class="options-row">
            <div class="opt-toggle on" id="upool-adj"     onclick="togglePool(this)"><div class="opt-dot"></div>adjectives</div>
            <div class="opt-toggle on" id="upool-animals" onclick="togglePool(this)"><div class="opt-dot"></div>animals</div>
            <div class="opt-toggle"   id="upool-colors"  onclick="togglePool(this)"><div class="opt-dot"></div>colors</div>
            <div class="opt-toggle"   id="upool-tech"    onclick="togglePool(this)"><div class="opt-dot"></div>tech</div>
            <div class="opt-toggle"   id="upool-nature"  onclick="togglePool(this)"><div class="opt-dot"></div>nature</div>
            <div class="opt-toggle"   id="upool-fantasy" onclick="togglePool(this)"><div class="opt-dot"></div>fantasy</div>
          </div>
        </div>

        <div class="util-row">
          <div class="util-group">
            <p class="tool-sublabel">words</p>
            <div class="options-row">
              <div class="opt-toggle"   id="uwc-1" onclick="setUserRadio('wc','uwc-1',1)"><div class="opt-dot"></div>1</div>
              <div class="opt-toggle on" id="uwc-2" onclick="setUserRadio('wc','uwc-2',2)"><div class="opt-dot"></div>2</div>
              <div class="opt-toggle"   id="uwc-3" onclick="setUserRadio('wc','uwc-3',3)"><div class="opt-dot"></div>3</div>
            </div>
          </div>
          <div class="util-group">
            <p class="tool-sublabel">separator</p>
            <div class="options-row">
              <div class="opt-toggle on" id="usep-none"  onclick="setUserRadio('sep','usep-none','')"><div class="opt-dot"></div>none</div>
              <div class="opt-toggle"   id="usep-under" onclick="setUserRadio('sep','usep-under','_')"><div class="opt-dot"></div>_</div>
              <div class="opt-toggle"   id="usep-dot"   onclick="setUserRadio('sep','usep-dot','.')"><div class="opt-dot"></div>.</div>
              <div class="opt-toggle"   id="usep-dash"  onclick="setUserRadio('sep','usep-dash','-')"><div class="opt-dot"></div>-</div>
            </div>
          </div>
          <div class="util-group">
            <p class="tool-sublabel">case</p>
            <div class="options-row">
              <div class="opt-toggle"   id="ucase-lower" onclick="setUserRadio('case','ucase-lower','lower')"><div class="opt-dot"></div>lower</div>
              <div class="opt-toggle on" id="ucase-title" onclick="setUserRadio('case','ucase-title','title')"><div class="opt-dot"></div>Title</div>
              <div class="opt-toggle"   id="ucase-upper" onclick="setUserRadio('case','ucase-upper','upper')"><div class="opt-dot"></div>UPPER</div>
              <div class="opt-toggle"   id="ucase-camel" onclick="setUserRadio('case','ucase-camel','camel')"><div class="opt-dot"></div>camel</div>
            </div>
          </div>
          <div class="util-group">
            <p class="tool-sublabel">numbers</p>
            <div class="options-row">
              <div class="opt-toggle on" id="unum-none"   onclick="setUserRadio('num','unum-none','none')"><div class="opt-dot"></div>none</div>
              <div class="opt-toggle"   id="unum-prefix" onclick="setUserRadio('num','unum-prefix','prefix')"><div class="opt-dot"></div>prefix</div>
              <div class="opt-toggle"   id="unum-suffix" onclick="setUserRadio('num','unum-suffix','suffix')"><div class="opt-dot"></div>suffix</div>
            </div>
          </div>
          <div class="util-group" id="udig-group" style="opacity:0.35;pointer-events:none;transition:opacity 0.2s">
            <p class="tool-sublabel">digits</p>
            <div class="options-row">
              <div class="opt-toggle"   id="udig-2" onclick="setUserRadio('dig','udig-2',2)"><div class="opt-dot"></div>2</div>
              <div class="opt-toggle on" id="udig-3" onclick="setUserRadio('dig','udig-3',3)"><div class="opt-dot"></div>3</div>
              <div class="opt-toggle"   id="udig-4" onclick="setUserRadio('dig','udig-4',4)"><div class="opt-dot"></div>4</div>
            </div>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn accent" onclick="generateUser()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            regenerate
          </button>
          <button class="btn" onclick="copyUser()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            copy
          </button>
        </div>
      </div>

      <!-- Password Generator -->
      <div class="tool-card" style="animation-delay:0.32s">
        <span class="tool-title">password</span>
        <div class="pass-output" id="pass-output">—</div>
        <div class="length-row">
          <span class="length-label" id="pass-len-label">16</span>
          <input type="range" id="pass-length" min="6" max="64" value="16" />
        </div>
        <div class="options-row">
          <div class="opt-toggle on" id="opt-upper" onclick="toggleOpt(this)"><div class="opt-dot"></div>A–Z</div>
          <div class="opt-toggle on" id="opt-lower" onclick="toggleOpt(this)"><div class="opt-dot"></div>a–z</div>
          <div class="opt-toggle on" id="opt-nums"  onclick="toggleOpt(this)"><div class="opt-dot"></div>0–9</div>
          <div class="opt-toggle on" id="opt-syms"  onclick="toggleOpt(this)"><div class="opt-dot"></div>!@#</div>
        </div>
        <div class="btn-row">
          <button class="btn accent" onclick="generatePass()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            regenerate
          </button>
          <button class="btn" onclick="copyPass()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            copy
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="taskbar">
  <div class="taskbar-section">
    <div class="taskbar-clock">
      <div class="clock-time" id="clock-time">--:--</div>
      <div class="clock-date" id="clock-date">--- --</div>
    </div>
  </div>
  <div class="taskbar-divider"></div>
  <div class="taskbar-section">
    <a class="dock-btn" href="./">
      <span class="tooltip">home</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:#d4a574">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
    </a>
    <a class="dock-btn" href="cropper.html">
      <span class="tooltip">crop image</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:#d4a574">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </a>
    <a class="dock-btn" href="video-cutter.html">
      <span class="tooltip">video cutter</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:#d4a574">
        <path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/>
      </svg>
    </a>
    <button class="dock-btn active">
      <span class="tooltip">utilities</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:#d4a574">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock-time').textContent = h + ':' + m + ':' + s;
    const days = ['sun','mon','tue','wed','thu','fri','sat'];
    const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    document.getElementById('clock-date').textContent =
      days[now.getDay()] + ' · ' + months[now.getMonth()] + ' ' + String(now.getDate()).padStart(2,'0');
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Password Generator
  const passLengthEl   = document.getElementById('pass-length');
  const passLenLabel   = document.getElementById('pass-len-label');
  const passOutputEl   = document.getElementById('pass-output');

  passLengthEl.addEventListener('input', function() {
    passLenLabel.textContent = this.value;
    generatePass();
  });

  function toggleOpt(el) {
    el.classList.toggle('on');
    generatePass();
  }

  function generatePass() {
    const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const lower = 'abcdefghijklmnopqrstuvwxyz';
    const nums  = '0123456789';
    const syms  = '!@#$%^&*()-_=+[]{}|;:,.<>?';

    let charset = '';
    if (document.getElementById('opt-upper').classList.contains('on')) charset += upper;
    if (document.getElementById('opt-lower').classList.contains('on')) charset += lower;
    if (document.getElementById('opt-nums').classList.contains('on'))  charset += nums;
    if (document.getElementById('opt-syms').classList.contains('on'))  charset += syms;

    if (!charset) { passOutputEl.textContent = '—'; return; }

    const len = parseInt(passLengthEl.value);
    const arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    passOutputEl.textContent = Array.from(arr, v => charset[v % charset.length]).join('');
  }

  function copyPass() {
    const text = passOutputEl.textContent;
    if (text && text !== '—') navigator.clipboard.writeText(text);
  }

  generatePass();

  // Username Generator
  const USER_POOLS = {
    adj:     ['silent','cosmic','swift','wild','phantom','crystal','hollow','ancient','blazing','frozen','stormy','bold','calm','feral','amber','ashen','velvet','iron','bright','dark','clever','nimble','fierce','lunar','solar','neon','lost','golden','sly','grim','keen','vague','wired','lucky','odd','grave','heavy','sharp','sleek','stark'],
    animals: ['wolf','fox','hawk','eagle','bear','tiger','shark','raven','viper','phoenix','dragon','panda','lynx','owl','crow','cobra','falcon','hyena','jackal','mantis','mamba','osprey','wolverine','bison','gecko','moose','pelican','weasel','badger','otter','ibis','kestrel','marmot','narwhal','quokka','tapir'],
    colors:  ['crimson','azure','scarlet','indigo','violet','amber','ivory','cobalt','teal','jade','onyx','silver','golden','obsidian','sapphire','coral','magenta','turquoise','emerald','maroon','lavender','vermillion','charcoal','ochre','umber','sienna','cerulean','viridian'],
    tech:    ['cyber','pixel','neon','binary','vector','codec','matrix','kernel','daemon','flux','nexus','cipher','proxy','quantum','node','byte','hex','nano','grid','core','mesh','sync','signal','pulse','data','bit','stack','cache','socket','shader','tensor','voxel','drone','router','lambda'],
    nature:  ['storm','river','peak','forest','ocean','crater','dusk','dawn','frost','ember','glacier','canyon','mesa','delta','summit','vale','ridge','reef','tundra','geyser','lagoon','torrent','cavern','boulder','thicket','squall','cinder','marsh','hollow','rapids'],
    fantasy: ['mystic','arcane','rune','shadow','wraith','specter','astral','ethereal','oracle','druid','sorcerer','paladin','ranger','warden','herald','sentinel','vanguard','revenant','eldritch','abyssal','cursed','gilded','hallowed','forsaken','omen','sigil','grimoire','hex','banshee','golem'],
  };

  const userState = { pools: new Set(['adj','animals']), wc: 2, sep: '', caseStyle: 'title', num: 'none', dig: 3 };

  const userRadioGroups = {
    wc:   ['uwc-1','uwc-2','uwc-3'],
    sep:  ['usep-none','usep-under','usep-dot','usep-dash'],
    case: ['ucase-lower','ucase-title','ucase-upper','ucase-camel'],
    num:  ['unum-none','unum-prefix','unum-suffix'],
    dig:  ['udig-2','udig-3','udig-4'],
  };

  function togglePool(el) {
    const key = el.id.replace('upool-', '');
    el.classList.toggle('on');
    if (el.classList.contains('on')) userState.pools.add(key);
    else userState.pools.delete(key);
    generateUser();
  }

  function setUserRadio(group, activeId, value) {
    userRadioGroups[group].forEach(id => document.getElementById(id).classList.remove('on'));
    document.getElementById(activeId).classList.add('on');
    if (group === 'wc')   userState.wc        = value;
    if (group === 'sep')  userState.sep       = value;
    if (group === 'case') userState.caseStyle = value;
    if (group === 'num')  {
      userState.num = value;
      const digGroup = document.getElementById('udig-group');
      digGroup.style.opacity      = value === 'none' ? '0.35' : '1';
      digGroup.style.pointerEvents = value === 'none' ? 'none' : 'auto';
    }
    if (group === 'dig')  userState.dig       = value;
    generateUser();
  }

  function generateUser() {
    let pool = [];
    userState.pools.forEach(k => pool = pool.concat(USER_POOLS[k]));
    if (!pool.length) { document.getElementById('user-output').textContent = '—'; return; }

    const rnd = new Uint32Array(userState.wc);
    crypto.getRandomValues(rnd);
    const words = Array.from(rnd, v => pool[v % pool.length]);

    const fmt = (w, i) => {
      if (userState.caseStyle === 'upper') return w.toUpperCase();
      if (userState.caseStyle === 'lower') return w.toLowerCase();
      if (userState.caseStyle === 'title') return w[0].toUpperCase() + w.slice(1).toLowerCase();
      if (userState.caseStyle === 'camel') return i === 0 ? w.toLowerCase() : w[0].toUpperCase() + w.slice(1).toLowerCase();
      return w;
    };

    let name = words.map(fmt).join(userState.sep);

    if (userState.num !== 'none') {
      const na = new Uint32Array(1);
      crypto.getRandomValues(na);
      const max = Math.pow(10, userState.dig);
      const min = Math.pow(10, userState.dig - 1);
      const num = (na[0] % (max - min)) + min;
      name = userState.num === 'prefix'
        ? num + userState.sep + name
        : name + userState.sep + num;
    }

    document.getElementById('user-output').textContent = name;
  }

  function copyUser() {
    const text = document.getElementById('user-output').textContent;
    if (text && text !== '—') navigator.clipboard.writeText(text);
  }

  generateUser();
</script>
</body>
