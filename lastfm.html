<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>last.fm stats · welffi</title>
  <meta name="description" content="Look up Last.fm listening stats, showing listening hours this week, ban risk, top artists, tracks, and albums." />
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://welffi.github.io/lastfm.html" />
  <meta property="og:site_name"   content="welffi" />
  <meta property="og:title"       content="last.fm stats" />
  <meta property="og:description" content="listening hours · ban risk · top artists, tracks &amp; albums · impossible scrobble check" />
  <meta property="og:image"       content="https://i.imgur.com/c7moPaj.png" />
  <meta name="theme-color"        content="#d4a574" />
  <link rel="icon" type="image/png" href="https://i.imgur.com/c7moPaj.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100;0,9..144,300;1,9..144,100;1,9..144,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0a0908;
      --surface:  #141210;
      --surface2: #1a1714;
      --border:   #241f1b;
      --border2:  #2e2821;
      --text:     #ede8e0;
      --muted:    #4e463c;
      --muted2:   #695e52;
      --accent:   #d4a574;
      --accent2:  #e8c49a;
      --red:      #e8726f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.032) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 40% at 50% -5%, rgba(212,165,116,0.09) 0%, transparent 65%),
        radial-gradient(ellipse 60% 30% at 50% 105%, rgba(180,130,80,0.05) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 7rem;
    }

    .hidden { display: none !important; }

    /* ── Input ── */
    .input-card {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .input-title { text-align: center; margin-bottom: 0.4rem; }
    .input-title h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.9rem;
      font-weight: 300;
      color: var(--text);
    }
    .input-title p {
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      color: var(--muted2);
      margin-top: 0.4rem;
      text-transform: lowercase;
    }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    .field label { font-size: 0.58rem; letter-spacing: 0.15em; color: var(--muted2); text-transform: lowercase; }

    .field input {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: rgba(212,165,116,0.4);
      box-shadow: 0 0 0 3px rgba(212,165,116,0.08);
    }
    .field input::placeholder { color: var(--muted); }

    .api-section { display: flex; flex-direction: column; gap: 0.5rem; }
    .api-hint { font-size: 0.54rem; color: var(--muted); letter-spacing: 0.08em; }
    .api-hint a { color: var(--accent2); text-decoration: none; }
    .api-hint a:hover { text-decoration: underline; }

    .btn-primary {
      background: rgba(212,165,116,0.1);
      border: 1px solid rgba(212,165,116,0.25);
      border-radius: 10px;
      padding: 0.8rem;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      text-transform: lowercase;
    }
    .btn-primary:hover { background: rgba(212,165,116,0.16); transform: translateY(-1px); }

    .toggle-link {
      text-align: center;
      font-size: 0.54rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .error-box {
      font-size: 0.6rem;
      color: var(--red);
      letter-spacing: 0.08em;
      padding: 0.6rem 0.8rem;
      background: rgba(232,114,111,0.07);
      border: 1px solid rgba(232,114,111,0.18);
      border-radius: 8px;
      text-align: center;
    }

    /* ── Loading ── */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      animation: fadeUp 0.4s ease both;
    }
    .spinner {
      width: 34px;
      height: 34px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-label { font-size: 0.6rem; letter-spacing: 0.18em; color: var(--muted2); text-transform: lowercase; }
    .loading-sub { font-size: 0.52rem; letter-spacing: 0.14em; color: var(--muted); text-transform: lowercase; min-height: 0.8em; }

    .results-card {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    #ban-card:empty, #patterns-card:empty { display: none; }

    .profile-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }
    .profile-top {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.95rem 1.1rem;
    }
    .stat-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid var(--border);
    }
    .stat-strip-item {
      padding: 0.55rem 0.4rem;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat-strip-item:last-child { border-right: none; }
    .strip-num {
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      font-weight: 100;
      color: var(--accent);
      line-height: 1;
      display: block;
    }
    .strip-lbl {
      font-size: 0.44rem;
      letter-spacing: 0.12em;
      color: var(--muted2);
      text-transform: lowercase;
      margin-top: 0.22rem;
      display: block;
      line-height: 1.5;
    }
    .profile-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(212,165,116,0.22);
      flex-shrink: 0;
    }
    .profile-avatar-ph {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted2);
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; min-width: 0; }
    .profile-name {
      font-family: 'Fraunces', serif;
      font-size: 1.2rem;
      font-weight: 300;
      color: var(--text);
      line-height: 1;
    }
    .profile-meta { font-size: 0.56rem; color: var(--muted2); letter-spacing: 0.1em; margin-top: 0.3rem; }

    .back-btn {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      color: var(--muted2);
      font-family: 'DM Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .back-btn:hover { color: var(--text); border-color: var(--muted2); }

    /* Sections */
    .section {
      display: flex;
      flex-direction: column;
      gap: 0;
      animation: fadeUp 0.5s ease both;
    }

    .section-head {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.4rem;
    }
    .section-head::before, .section-head::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }
    .section-label {
      font-size: 0.53rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: lowercase;
      flex-shrink: 0;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.6rem 0.7rem;
      border-radius: 10px;
      transition: background 0.2s;
    }
    .list-item:hover { background: rgba(255,255,255,0.022); }
    .list-item.nowplaying { background: rgba(212,165,116,0.04); }

    .list-rank { font-size: 0.56rem; color: var(--muted); width: 1.1rem; text-align: right; flex-shrink: 0; }

    .list-img {
      width: 34px;
      height: 34px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }
    .list-img-ph {
      width: 34px;
      height: 34px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .list-body { flex: 1; min-width: 0; }
    .list-name { font-size: 0.7rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-sub { font-size: 0.57rem; color: var(--muted2); margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .bar-wrap { height: 2px; background: var(--border); border-radius: 2px; margin-top: 0.35rem; overflow: hidden; }
    .bar { height: 100%; background: var(--accent); border-radius: 2px; }

    .list-count { font-size: 0.58rem; color: var(--muted2); flex-shrink: 0; }

    .nowplaying-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px rgba(212,165,116,0.5);
      animation: blink 2s ease infinite;
      flex-shrink: 0;
    }

    /* Taskbar */
    .taskbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 6px;
      height: 52px;
      background: rgba(20,17,14,0.82);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(212,165,116,0.14);
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset, 0 1px 0 rgba(255,255,255,0.06) inset;
      animation: dockSlideUp 0.7s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .taskbar-section { display: flex; align-items: center; gap: 2px; padding: 0 8px; }
    .taskbar-divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
    .taskbar-clock { padding: 0 10px; text-align: center; }
    .clock-time { font-size: 0.72rem; font-weight: 400; color: var(--accent); letter-spacing: 0.08em; line-height: 1; }
    .clock-date { font-size: 0.5rem; font-weight: 300; color: var(--muted2); letter-spacing: 0.12em; margin-top: 2px; text-transform: lowercase; }

    .dock-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: none;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), background 0.2s ease;
      text-decoration: none;
    }
    .dock-btn:hover { background: rgba(212,165,116,0.08); transform: translateY(-4px) scale(1.08); }
    .dock-btn svg { width: 16px; height: 16px; display: block; }
    .dock-btn.active::after {
      content: '';
      position: absolute;
      bottom: 1px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--accent);
    }
    .dock-btn .tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: rgba(20,17,14,0.95);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
    }
    .dock-btn:hover .tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dockSlideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Integrity badge ── */
    .integrity-badge { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.35rem; flex-wrap: wrap; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      padding: 0.18rem 0.5rem;
      border-radius: 5px;
      font-weight: 400;
      text-transform: lowercase;
      cursor: default;
    }
    .badge-checking { color: var(--muted2); background: rgba(105,94,82,0.1); border: 1px solid var(--border2); animation: blink 2s ease infinite; }
    .badge-clean    { color: #4ade80; background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); }
    .badge-caution  { color: var(--accent2); background: rgba(212,165,116,0.08); border: 1px solid rgba(212,165,116,0.22); cursor: pointer; }
    .badge-error    { color: var(--muted2); background: transparent; border: 1px solid var(--border2); }

    .suspicious-list {
      margin-top: 0.4rem;
      padding: 0.7rem 0.8rem;
      background: rgba(232,114,111,0.05);
      border: 1px solid rgba(232,114,111,0.15);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .suspicious-row { display: flex; flex-direction: column; gap: 0.1rem; }
    .suspicious-track { font-size: 0.67rem; color: var(--text); }
    .suspicious-detail { font-size: 0.56rem; color: var(--muted2); letter-spacing: 0.06em; }

    /* ── Ban risk card ── */
    .ban-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }
    .ban-card.danger  { border-color: rgba(232,114,111,0.3); background: rgba(232,114,111,0.04); }
    .ban-card.warning { border-color: rgba(212,165,116,0.3); background: rgba(212,165,116,0.04); }

    .ban-header { display: flex; align-items: center; gap: 0.75rem; }
    .ban-pct {
      font-family: 'Fraunces', serif;
      font-size: 1.8rem;
      font-weight: 100;
      line-height: 1;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }

    .ban-bar-wrap {
      height: 5px;
      background: var(--border2);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }
    .ban-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .ban-detail-label { font-size: 0.54rem; color: var(--muted2); letter-spacing: 0.1em; text-transform: lowercase; }
    .ban-detail-val   { font-size: 0.6rem; color: var(--text); letter-spacing: 0.06em; }
    .ban-status {
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      text-transform: lowercase;
      align-self: flex-start;
    }
    .ban-status.safe     { color: #4ade80; background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.18); }
    .ban-status.caution  { color: var(--accent2); background: rgba(212,165,116,0.08); border: 1px solid rgba(212,165,116,0.2); }
    .ban-status.danger   { color: var(--red); background: rgba(232,114,111,0.08); border: 1px solid rgba(232,114,111,0.2); }
    .ban-status.banned   { color: var(--red); background: rgba(232,114,111,0.12); border: 1px solid rgba(232,114,111,0.3); font-weight: 500; }

    /* ── Input note ── */
    .input-note {
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-align: center;
      text-transform: lowercase;
      line-height: 1.7;
    }

    /* ── Tabs card ── */
    .tabs-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .tabs-header {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 0.4rem;
    }
    .tab-btn {
      background: none;
      border: none;
      padding: 0.7rem 0.85rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      color: var(--muted2);
      cursor: pointer;
      text-transform: lowercase;
      position: relative;
      transition: color 0.2s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0.5rem;
      right: 0.5rem;
      height: 1px;
      background: var(--accent);
    }
    .tab-content { display: none; padding: 0.3rem 0; }
    .tab-content.active { display: block; }

    /* ── Artist rank number ── */
    .artist-rank {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      font-weight: 100;
      color: var(--muted);
      width: 38px;
      text-align: right;
      flex-shrink: 0;
      letter-spacing: -0.02em;
      line-height: 1;
      padding-right: 2px;
    }

    /* ── Slot-in animation ── */
    @keyframes slotIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .slot-in { animation: slotIn 0.4s cubic-bezier(0.22,1,0.36,1) both; }

    /* ── Recent searches ── */
    .recent-searches { display: flex; flex-direction: column; gap: 0.5rem; }
    .recent-label { font-size: 0.54rem; letter-spacing: 0.15em; color: var(--muted); text-transform: lowercase; }
    .recent-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .recent-chip {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 7px;
      padding: 0.28rem 0.65rem;
      color: var(--muted2);
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      text-transform: lowercase;
    }
    .recent-chip:hover { color: var(--text); border-color: rgba(212,165,116,0.3); background: rgba(212,165,116,0.05); }

    /* ── Patterns card ── */
    .patterns-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1.3rem;
    }

    /* insight pills */
    .insight-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }
    .insight {
      background: rgba(212,165,116,0.04);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 0.7rem 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .insight-icon { font-size: 0.85rem; line-height: 1; }
    .insight-val {
      font-family: 'Fraunces', serif;
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--text);
      line-height: 1.1;
    }
    .insight-label { font-size: 0.5rem; letter-spacing: 0.13em; color: var(--muted2); text-transform: lowercase; }

    /* 7-day bar chart */
    .chart-block { display: flex; flex-direction: column; gap: 0.7rem; }
    .day-chart {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 5px;
      height: 72px;
    }
    .day-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.4rem; height: 100%; justify-content: flex-end; min-width: 0; }
    .day-bar-track { width: 100%; flex: 1; display: flex; align-items: flex-end; }
    .day-bar {
      width: 100%;
      border-radius: 5px 5px 2px 2px;
      background: linear-gradient(180deg, var(--accent2), var(--accent));
      min-height: 2px;
      transition: height 0.7s cubic-bezier(0.22,1,0.36,1);
      position: relative;
    }
    .day-bar.peak { background: linear-gradient(180deg, #f0d9bb, var(--accent)); box-shadow: 0 0 12px rgba(212,165,116,0.35); }
    .day-bar-count { font-size: 0.5rem; color: var(--muted2); }
    .day-bar-label { font-size: 0.5rem; letter-spacing: 0.06em; color: var(--muted); text-transform: lowercase; }
    .day-col.is-peak .day-bar-label { color: var(--accent2); }

    /* radial 24h clock */
    .clock-wrap { display: flex; align-items: center; gap: 1rem; }
    .clock-svg { width: 150px; height: 150px; flex-shrink: 0; }
    @media (max-width: 380px) { .clock-svg { width: 120px; height: 120px; } }
    .clock-center-num {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
      font-weight: 300;
      fill: var(--accent);
    }
    .clock-center-sub { font-size: 0.52rem; letter-spacing: 0.1em; fill: var(--muted2); }
    .clock-tick-label { font-size: 0.46rem; fill: var(--muted); letter-spacing: 0.05em; }
    .clock-legend { display: flex; flex-direction: column; gap: 0.55rem; flex: 1; min-width: 0; }
    .clock-legend-item { display: flex; flex-direction: column; gap: 0.15rem; }
    .clock-legend-val { font-size: 0.78rem; color: var(--text); }
    .clock-legend-label { font-size: 0.5rem; letter-spacing: 0.12em; color: var(--muted2); text-transform: lowercase; }

    .pattern-sub { font-size: 0.5rem; letter-spacing: 0.13em; color: var(--muted); text-transform: lowercase; }

    .heatmap-grid {
      display: grid;
      grid-template-columns: 28px repeat(7, 1fr);
      gap: 1px;
    }
    .hm-spacer { height: 12px; }
    .hm-day-label {
      font-size: 0.44rem;
      color: var(--muted);
      text-align: center;
      height: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.05em;
    }
    .hm-hour-label {
      font-size: 0.42rem;
      color: var(--muted);
      text-align: right;
      padding-right: 4px;
      height: 8px;
      line-height: 8px;
    }
    .hm-cell {
      height: 8px;
      border-radius: 2px;
      background: rgba(212,165,116,var(--hm-a, 0));
    }
    .hm-cell.hm-empty { background: var(--surface2); }
    .hm-cell.hm-sleep { background: rgba(140,120,200,var(--hm-a, 0)); }
    .hm-cell.hm-sleep.hm-empty { background: rgba(140,120,200,0.07); }
    .hm-legend {
      display: flex;
      gap: 0.9rem;
      flex-wrap: wrap;
      margin-top: 0.25rem;
    }
    .hm-legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.46rem;
      color: var(--muted2);
      letter-spacing: 0.07em;
      text-transform: lowercase;
    }
    .hm-legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .sleep-insight {
      background: rgba(140,120,200,0.06) !important;
      border-color: rgba(140,120,200,0.22) !important;
    }

    .data-tip {
      position: fixed;
      background: rgba(10,9,8,0.96);
      border: 1px solid var(--border2);
      border-radius: 7px;
      padding: 0.28rem 0.65rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      color: var(--text);
      letter-spacing: 0.08em;
      pointer-events: none;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.1s;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .eq { display: inline-flex; align-items: flex-end; gap: 2px; height: 14px; vertical-align: middle; }
    .eq-b { width: 3px; border-radius: 1.5px; background: var(--accent); animation: eq-anim 0.85s ease infinite; }
    .eq-b:nth-child(2) { animation-delay: 0.22s; }
    .eq-b:nth-child(3) { animation-delay: 0.44s; }
    @keyframes eq-anim { 0%, 100% { height: 3px; } 50% { height: 13px; } }

    .recent-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .recent-head { display: flex; align-items: center; padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); }
    .recent-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      position: relative;
      text-decoration: none;
      color: inherit;
    }
    .recent-row:last-child { border-bottom: none; }
    .recent-row:hover { background: rgba(255,255,255,0.03); }
    .recent-row.is-now { background: rgba(212,165,116,0.04); }
    .recent-art { width: 42px; height: 42px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
    .recent-art-ph { width: 42px; height: 42px; border-radius: 6px; flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); }
    .recent-info { flex: 1; min-width: 0; }
    .recent-title { font-size: 0.72rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .recent-sub   { font-size: 0.58rem; color: var(--muted2); margin-top: 0.12rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .recent-right { flex-shrink: 0; position: relative; min-width: 36px; text-align: right; }
    .recent-time  { font-size: 0.56rem; color: var(--muted2); display: block; transition: opacity 0.15s; }
    .recent-open  { position: absolute; right: 0; top: 50%; transform: translateY(-50%); opacity: 0; transition: opacity 0.15s; color: var(--accent2); font-size: 0.65rem; }
    .recent-row:hover .recent-time { opacity: 0; }
    .recent-row:hover .recent-open { opacity: 1; }

    .list-name-link { text-decoration: none; color: inherit; transition: color 0.15s; }
    .list-name-link:hover { color: var(--accent2); }

    .ms-list { display: flex; flex-direction: column; margin-top: 0.35rem; }
    .ms-item { padding: 0.42rem 0; border-bottom: 1px solid var(--border); }
    .ms-item:last-child { border-bottom: none; }
    .ms-track { font-size: 0.68rem; color: var(--text); }
    .ms-detail { font-size: 0.55rem; color: var(--muted2); letter-spacing: 0.04em; margin-top: 0.1rem; line-height: 1.5; }
    .ms-note { font-size: 0.51rem; color: var(--muted); letter-spacing: 0.07em; line-height: 1.65; margin-top: 0.55rem; border-top: 1px solid var(--border); padding-top: 0.45rem; }

    @media (min-width: 600px) {
      .profile-name    { font-size: 1.4rem; }
      .profile-meta    { font-size: 0.64rem; }
      .strip-num       { font-size: 1.25rem; }
      .strip-lbl       { font-size: 0.54rem; }
      .stat-strip-item { padding: 0.65rem 0.5rem; }
      .profile-top     { padding: 1.05rem 1.2rem; }
      .back-btn        { font-size: 0.62rem; }
      .section-label   { font-size: 0.6rem; }
      .badge           { font-size: 0.59rem; }
      .list-name       { font-size: 0.78rem; }
      .list-sub        { font-size: 0.64rem; }
      .list-count      { font-size: 0.66rem; }
      .list-rank       { font-size: 0.64rem; }
      .artist-rank     { font-size: 1.55rem; }
      .tab-btn         { font-size: 0.65rem; padding: 0.75rem 0.95rem; }
      .ban-pct         { font-size: 2rem; }
      .ban-detail-label{ font-size: 0.62rem; }
      .ban-detail-val  { font-size: 0.68rem; }
      .ban-status      { font-size: 0.64rem; }
      .insight-val     { font-size: 1.15rem; }
      .insight-label   { font-size: 0.57rem; }
      .day-chart       { height: 82px; }
      .day-bar-count   { font-size: 0.57rem; }
      .day-bar-label   { font-size: 0.57rem; }
      .clock-legend-val  { font-size: 0.88rem; }
      .clock-legend-label{ font-size: 0.57rem; }
      .pattern-sub     { font-size: 0.58rem; }
      .hm-legend-item  { font-size: 0.54rem; }
      .recent-label    { font-size: 0.62rem; }
      .recent-chip     { font-size: 0.68rem; }
      .results-card    { max-width: 620px; }
      .list-item:hover { background: rgba(255,255,255,0.04); }
      .recent-title    { font-size: 0.8rem; }
      .recent-sub      { font-size: 0.65rem; }
      .recent-time     { font-size: 0.62rem; }
      .ms-track        { font-size: 0.76rem; }
      .ms-detail       { font-size: 0.62rem; }
      .ms-note         { font-size: 0.58rem; }
    }
  </style>
</head>
<body>

<!-- INPUT PAGE -->
<div class="page" id="page-input">
  <div class="input-card">
    <div class="input-title">
      <h1>last.fm stats</h1>
      <p>look up any user's listening data</p>
    </div>

    <div class="field">
      <label>username</label>
      <input id="inp-user" type="text" placeholder="welffi" autocomplete="off" spellcheck="false" />
    </div>

    <div id="err-box" class="error-box" style="display:none"></div>

    <button class="btn-primary" id="btn-search">look up stats →</button>

    <div id="recent-searches"></div>

</div>

<!-- LOADING PAGE -->

    <div class="spinner"></div>
    <p class="loading-label" id="loading-label">looking up user...</p>
    <p class="loading-sub" id="loading-sub"></p>
  </div>
</div>

<!-- RESULTS PAGE -->
<div class="page hidden" id="page-results">
  <div class="results-card" id="results-card"></div>
</div>

<!-- TASKBAR -->
<div class="taskbar">
  <div class="taskbar-section">
    <div class="taskbar-clock">
      <div class="clock-time" id="clock-time">--:--</div>
      <div class="clock-date" id="clock-date">--- --</div>
    </div>
  </div>
  <div class="taskbar-divider"></div>
  <div class="taskbar-section">
    <a class="dock-btn" href="./">
      <span class="tooltip">home</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:#d4a574">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>

      <span class="tooltip">crop image</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:#d4a574">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>

      <span class="tooltip">last.fm</span>

        <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
      </svg>
    </a>
  </div>
</div>

<script>
  // ── Clock ──
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;
    const days = ['sun','mon','tue','wed','thu','fri','sat'];
    const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    document.getElementById('clock-date').textContent =
      `${days[now.getDay()]} · ${months[now.getMonth()]} ${String(now.getDate()).padStart(2,'0')}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  const _tip = document.createElement('div');
  _tip.className = 'data-tip';
  document.body.appendChild(_tip);
  function showTip(e, text) { _tip.textContent = text; _tip.style.opacity = '1'; moveTip(e); }
  function moveTip(e) { _tip.style.left = (e.clientX + 14) + 'px'; _tip.style.top = (e.clientY - 38) + 'px'; }
  function hideTip() { _tip.style.opacity = '0'; }

  const API_KEY = '44e2c647de30a1be4df7679e7041e36f';

  // ── Persistence & recent searches ──
  const inpUser = document.getElementById('inp-user');
  inpUser.value = localStorage.getItem('lfm_user') || '';

  const _paramUser = new URLSearchParams(location.search).get('user');
  if (_paramUser) inpUser.value = _paramUser;

  function getRecents() { return JSON.parse(localStorage.getItem('lfm_recents') || '[]'); }
  function saveRecent(user) {
    const list = [user, ...getRecents().filter(u => u !== user)].slice(0, 6);
    localStorage.setItem('lfm_recents', JSON.stringify(list));
  }
  function renderRecents() {
    const list = getRecents();
    const el   = document.getElementById('recent-searches');
    if (!el) return;
    if (!list.length) { el.innerHTML = ''; return; }
    el.innerHTML = `
      <p class="recent-label">recent</p>
      <div class="recent-chips">
        ${list.map(u => `<button class="recent-chip" onclick="quickSearch('${u}')">${u}</button>`).join('')}
      </div>`;
  }
  function quickSearch(user) { inpUser.value = user; handleSearch(); }
  renderRecents();

  // ── Pages ──
  function show(id) {
    ['page-input','page-loading','page-results'].forEach(p =>
      document.getElementById(p).classList.toggle('hidden', p !== id)
    );
    if (id === 'page-input') history.replaceState(null, '', location.pathname);
  }
  function showErr(msg) {
    const b = document.getElementById('err-box');
    b.textContent = msg; b.style.display = 'block';
  }
  function hideErr() { document.getElementById('err-box').style.display = 'none'; }

  // ── Search ──
  async function handleSearch() {
    const user = inpUser.value.trim();
    hideErr();
    if (!user) { showErr('please enter a username'); return; }
    localStorage.setItem('lfm_user', user);
    saveRecent(user);
    renderRecents();
    history.replaceState(null, '', `?user=${encodeURIComponent(user)}`);
    loadStats(user);
  }
  document.getElementById('btn-search').addEventListener('click', handleSearch);
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('page-input').classList.contains('hidden'))
      handleSearch();
  });

  // ── API ──
  const API_BASE = 'https://ws.audioscrobbler.com/2.0/';
  async function lfm(method, apiKey, params = {}) {
    const url = new URL(API_BASE);
    url.searchParams.set('method', method);
    url.searchParams.set('api_key', apiKey);
    url.searchParams.set('format', 'json');
    for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
    const r = await fetch(url);
    if (!r.ok) {
      if (r.status === 403) throw new Error('access denied — this profile may be private or suspended (403)');
      if (r.status === 429) throw new Error('rate limited — too many requests, try again in a moment (429)');
      if (r.status === 404) throw new Error('not found (404)');
      throw new Error(`network error (${r.status})`);
    }
    const d = await r.json();
    if (d.error) throw new Error(d.message);
    return d;
  }

  // ── Helpers ──
  function fmt(n) { return parseInt(n).toLocaleString(); }
  function timeAgo(uts) {
    const diff = Math.floor(Date.now() / 1000) - parseInt(uts);
    if (diff < 60)    return 'just now';
    if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
  }
  function img(imgs, pref = 'medium') {
    if (!imgs) return null;
    const arr = Array.isArray(imgs) ? imgs : [imgs];
    return (arr.find(i => i.size === pref && i['#text']) || arr.find(i => i['#text']) || {})['#text'] || null;
  }
  function toArr(v) { if (!v) return []; return Array.isArray(v) ? v : [v]; }

  function listItem(rank, imgUrl, name, sub, count, pct, imgId = null) {
    const imgHtml = imgUrl
      ? `<img class="list-img" src="${imgUrl}" alt="" onerror="this.outerHTML='<div class=list-img-ph></div>'" />`
      : `<div class="list-img-ph"${imgId ? ` id="${imgId}"` : ''}></div>`;
    return `
      <div class="list-item">
        <span class="list-rank">${rank}</span>
        ${imgHtml}
        <div class="list-body">
          <div class="list-name">${name}</div>
          ${sub ? `<div class="list-sub">${sub}</div>` : ''}
          <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
        </div>
        <div class="list-count">${count}</div>
      </div>`;
  }

  // ── Load & render ──
  async function loadStats(user) {
    show('page-loading');
    const lblEl = document.getElementById('loading-label');
    const subEl = document.getElementById('loading-sub');
    const setStatus = (lbl, sub = '') => {
      if (lblEl) lblEl.textContent = lbl;
      if (subEl) subEl.textContent = sub;
    };

    const now     = Math.floor(Date.now() / 1000);
    const weekAgo = now - 7 * 24 * 60 * 60;

    setStatus('looking up user...');
    let info;
    try {
      info = await lfm('user.getInfo', API_KEY, { user });
    } catch(e) {
      show('page-input');
      showErr(e.message || 'user not found');
      return;
    }

    setStatus('loading stats...', 'top artists · top tracks · top albums · recent plays');
    const settled = await Promise.allSettled([
      lfm('user.getRecentTracks', API_KEY, { user, from: weekAgo, to: now, limit: 1 }),
      lfm('user.getTopArtists',   API_KEY, { user, period: '7day', limit: 5 }),
      lfm('user.getTopTracks',    API_KEY, { user, period: '7day', limit: 5 }),
      lfm('user.getTopAlbums',    API_KEY, { user, period: '7day', limit: 5 }),
      lfm('user.getRecentTracks', API_KEY, { user, limit: 6 }),
    ]);
    const ok = r => r.status === 'fulfilled' ? r.value : null;

    renderResults({
      info,
      week:       ok(settled[0]),
      topArtists: ok(settled[1]),
      topTracks:  ok(settled[2]),
      topAlbums:  ok(settled[3]),
      recent:     ok(settled[4]),
    });
    show('page-results');
    runAnalysis(user).catch(e => {
      const banCard = document.getElementById('ban-card');
      if (banCard && !banCard.querySelector('.ban-pct')) {
        banCard.className = 'ban-card';
        banCard.style.cssText = '';
        banCard.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between">
            <span class="section-label">ban risk</span>
            <span class="ban-status danger">error</span>
          </div>
          <p style="font-size:0.55rem;color:var(--red);letter-spacing:0.06em;margin-top:0.3rem">${e.message || 'analysis failed'}</p>`;
      }
      const intCard = document.getElementById('integrity-card');
      if (intCard) {
        intCard.style.opacity = '1';
        intCard.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between">
            <span class="section-label">manual scrobbles</span>
            <span class="ban-status danger">error</span>
          </div>`;
      }
    });
  }

  function renderResults({ info, week, topArtists, topTracks, topAlbums, recent }) {
    const u           = info.user;
    const totalPlays  = parseInt(u.playcount);
    const regDate     = new Date(parseInt(u.registered.unixtime) * 1000);
    const memberYears = ((Date.now() - regDate) / (1000*60*60*24*365)).toFixed(1);
    const avatarUrl   = img(u.image, 'large') || img(u.image, 'medium');
    const weekTotal   = week ? parseInt(week.recenttracks['@attr'].total) : null;
    const avgPerDay   = weekTotal ? (weekTotal / 7).toFixed(1) : '—';

    const artistRows = buildArtistRows(topArtists);
    const { rows: trackRows, tracks: trackList } = buildTrackRows(topTracks);
    const albumRows  = buildAlbumRows(topAlbums);
    const recents    = toArr(recent?.recenttracks?.track).slice(0, 4);

    const recentRows = recents.map(t => {
      const isNow  = t['@attr']?.nowplaying === 'true';
      const cover  = img(t.image,'large') || img(t.image,'medium') || img(t.image,'small');
      const sub    = [t.artist['#text'], t.album?.['#text']].filter(Boolean).join(' · ');
      const lfmUrl = `https://www.last.fm/music/${encodeURIComponent(t.artist['#text'])}/_/${encodeURIComponent(t.name)}`;
      return `
        <a class="recent-row${isNow ? ' is-now' : ''}" href="${lfmUrl}" target="_blank" rel="noopener">
          ${cover ? `<img class="recent-art" src="${cover}" alt="" onerror="this.outerHTML='<div class=recent-art-ph></div>'" />` : `<div class="recent-art-ph"></div>`}
          <div class="recent-info">
            <div class="recent-title">${t.name}</div>
            <div class="recent-sub">${sub}</div>
          </div>
          <div class="recent-right">
            ${isNow
              ? `<span class="eq"><span class="eq-b"></span><span class="eq-b"></span><span class="eq-b"></span></span>`
              : `<span class="recent-time">${timeAgo(t.date?.uts)}</span><span class="recent-open">↗</span>`
            }
          </div>
        </a>`;
    }).join('');

    const hasTabs = artistRows || trackRows || albumRows;
    const firstTab = artistRows ? 'artists' : trackRows ? 'tracks' : 'albums';

    document.getElementById('results-card').innerHTML = `
      <div class="profile-banner">
        <div class="profile-top">
          ${avatarUrl ? `<img class="profile-avatar" src="${avatarUrl}" alt="${u.name}" />` : `<div class="profile-avatar-ph">♪</div>`}
          <div class="profile-info">

    if (trackList.length) loadTrackImages(trackList);

  function switchTab(name) {
    ['artists','tracks','albums'].forEach(t => {
      const content = document.getElementById(`tab-${t}`);
      const btn = document.querySelector(`.tab-btn[onclick="switchTab('${t}')"]`);
      if (content) content.classList.toggle('active', t === name);
      if (btn)     btn.classList.toggle('active', t === name);
    });
  }

  function buildArtistRows(data) {
    const artists = toArr(data?.topartists?.artist);
    if (!artists.length) return null;
    const max = parseInt(artists[0].playcount);
    return artists.map((a, i) => `
      <div class="list-item">
        <span class="artist-rank">${String(i+1).padStart(2,'0')}</span>
        <div class="list-body">
          <div class="list-name"><a class="list-name-link" href="https://www.last.fm/music/${encodeURIComponent(a.name)}" target="_blank" rel="noopener">${a.name}</a></div>
          <div class="bar-wrap"><div class="bar" style="width:${Math.round((parseInt(a.playcount)/max)*100)}%"></div></div>
        </div>
        <div class="list-count">${fmt(a.playcount)} plays</div>
      </div>`).join('');
  }

  function buildTrackRows(data) {
    const tracks = toArr(data?.toptracks?.track);
    if (!tracks.length) return { rows: null, tracks: [] };
    const max = parseInt(tracks[0].playcount);
    const rows = tracks.map((t, i) =>
      listItem(i+1, null, t.name, t.artist.name, `${fmt(t.playcount)} plays`,
        Math.round((parseInt(t.playcount)/max)*100), `timg-${i}`)
    ).join('');
    return { rows, tracks };
  }

  async function loadTrackImages(tracks) {
    await Promise.all(tracks.map(async (t, i) => {
      try {
        const d = await lfm('track.getInfo', API_KEY, { artist: t.artist.name, track: t.name });
        const albumImg = img(d.track?.album?.image, 'small') || img(d.track?.album?.image, 'medium');
        if (!albumImg) return;
        const ph = document.getElementById(`timg-${i}`);
        if (ph) ph.outerHTML = `<img class="list-img" src="${albumImg}" alt="" onerror="this.outerHTML='<div class=list-img-ph></div>'" />`;
      } catch {}
    }));
  }

  function buildAlbumRows(data) {
    const albums = toArr(data?.topalbums?.album);
    if (!albums.length) return null;
    const max = parseInt(albums[0].playcount);
    return albums.map((a, i) => {
      const cover = img(a.image,'small') || img(a.image,'medium');
      return listItem(i+1, cover, a.name, a.artist.name, `${fmt(a.playcount)} plays`,
        Math.round((parseInt(a.playcount)/max)*100));
    }).join('');
  }

  // ── Background analysis: real durations → ban risk + integrity check ──
  async function runAnalysis(user) {
    const now      = Math.floor(Date.now() / 1000);
    const eightAgo = now - 8 * 24 * 60 * 60;
    const weekAgo  = now - 7 * 24 * 60 * 60;

    const banCard = document.getElementById('ban-card');

    const page1 = await lfm('user.getRecentTracks', API_KEY, {
      user, from: eightAgo, to: now, limit: 200, page: 1
    });
    const totalPages = parseInt(page1.recenttracks['@attr'].totalPages);
    let all = toArr(page1.recenttracks.track).filter(t => t.date);

    if (totalPages > 1) {
      if (banCard) banCard.innerHTML = `<span class="section-label">ban risk</span><span class="badge badge-checking" style="margin-top:0.2rem;display:inline-flex">⟳ loading history (${totalPages} pages)...</span>`;
      const rest = await Promise.all(
        Array.from({ length: totalPages - 1 }, (_, i) =>
          lfm('user.getRecentTracks', API_KEY, {
            user, from: eightAgo, to: now, limit: 200, page: i + 2
          })
        )
      );
      rest.forEach(p => all = all.concat(toArr(p.recenttracks.track).filter(t => t.date)));
    }

    const uniq = {};
    all.forEach(t => {
      const key = `${t.artist['#text']}|||${t.name}`;
      if (!uniq[key]) uniq[key] = { artist: t.artist['#text'], name: t.name, duration: null };
    });

    const keys = Object.keys(uniq);
    const BATCH = 8;
    if (banCard) banCard.innerHTML = `<span class="section-label">ban risk</span><span class="badge badge-checking" id="dur-progress" style="margin-top:0.2rem;display:inline-flex">⟳ fetching durations (0/${keys.length} tracks)...</span>`;
    for (let i = 0; i < keys.length; i += BATCH) {
      await Promise.all(
        keys.slice(i, i + BATCH).map(async key => {
          try {
            const d = await lfm('track.getInfo', API_KEY, {
              artist: uniq[key].artist,
              track:  uniq[key].name
            });
            const ms = parseInt(d.track?.duration);
            if (ms > 0) uniq[key].duration = ms / 1000;
          } catch {}
        })
      );
      const prog = document.getElementById('dur-progress');
      if (prog) prog.textContent = `⟳ fetching durations (${Math.min(i + BATCH, keys.length)}/${keys.length} tracks)`;
      if (i + BATCH < keys.length) await new Promise(r => setTimeout(r, 120));
    }

    const BAN_LIMIT_SECS = 6 * 24 * 3600;

    let knownSum = 0, knownN = 0;
    all.forEach(t => {
      const dur = uniq[`${t.artist['#text']}|||${t.name}`]?.duration;
      if (dur) { knownSum += dur; knownN++; }
    });
    const fallbackSecs = knownN > 0 ? knownSum / knownN : 210;

    let totalListenSecs = 0;
    let tracksWithRealDur = 0;
    let tracksWithFallback = 0;
    all.forEach(t => {
      const dur = uniq[`${t.artist['#text']}|||${t.name}`]?.duration;
      if (dur) { totalListenSecs += dur; tracksWithRealDur++; }
      else      { totalListenSecs += fallbackSecs; tracksWithFallback++; }
    });

    updateBanCard(totalListenSecs, all.length, tracksWithRealDur, tracksWithFallback, fallbackSecs);

    // ── Update hero card with real 7-day listening time ──
    const week = all.filter(t => parseInt(t.date.uts) >= weekAgo);

    let weekListenSecs = 0;
    week.forEach(t => {
      const dur = uniq[`${t.artist['#text']}|||${t.name}`]?.duration;
      weekListenSecs += dur ?? fallbackSecs;
    });
    const realWeekHrs = weekListenSecs / 3600;
    const heroNum  = document.getElementById('hero-number');
    const heroUnit = document.getElementById('hero-unit');
    if (heroNum) {
      heroNum.textContent = realWeekHrs < 10 ? realWeekHrs.toFixed(1) : Math.round(realWeekHrs);
      heroNum.style.cssText = '';
    }
    if (heroUnit) heroUnit.textContent = realWeekHrs >= 1 ? 'hrs · 7 days' : 'mins · 7 days';

    // ── Listening patterns visualizations ──
    renderPatterns(week, uniq);

    // ── Integrity check: sorted oldest → newest ──
    week.sort((a, b) => parseInt(a.date.uts) - parseInt(b.date.uts));

    const suspicious = [];
    for (let i = 1; i < week.length; i++) {
      const prev    = week[i - 1];
      const curr    = week[i];
      const gap     = parseInt(curr.date.uts) - parseInt(prev.date.uts);
      const prevDur = uniq[`${prev.artist['#text']}|||${prev.name}`]?.duration;
      const currDur = uniq[`${curr.artist['#text']}|||${curr.name}`]?.duration;

      const minGap = currDur
        ? Math.max(Math.min(currDur * 0.3, 120), 15)
        : 20;

      if (gap < minGap) {
        suspicious.push({
          prevTrack: prev.name, prevArtist: prev.artist['#text'],
          currTrack: curr.name, currArtist: curr.artist['#text'],
          gap, currDur, prevDur
        });
      }
    }

    const intCard = document.getElementById('integrity-card');
    if (!intCard) return;

    intCard.style.opacity = '1';

    if (suspicious.length === 0) {
      intCard.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span class="section-label">manual scrobbles</span>
          <span class="ban-status safe">✓ none detected · ${week.length} checked</span>
        </div>`;
      return;
    }

    const seen = new Set();
    const uniqSusp = suspicious.filter(s => {
      const k = `${s.prevTrack}|${s.currTrack}`;
      return seen.has(k) ? false : (seen.add(k), true);
    });

    function fmtSecs(s) {
      if (!s) return '?';
      return s >= 60 ? `${Math.floor(s/60)}m ${Math.round(s%60)}s` : `${Math.round(s)}s`;
    }

    const msPct = Math.round((uniqSusp.length / week.length) * 100);
    const msRows = uniqSusp.slice(0, 8).map(s => `
      <div class="ms-item">
        <div class="ms-track">${s.currTrack} <span style="color:var(--muted2)">by ${s.currArtist}</span></div>
        <div class="ms-detail">scrobbled ${fmtSecs(s.gap)} after "${s.prevTrack}"${s.currDur ? ` · min expected ${fmtSecs(Math.max(Math.min(s.currDur * 0.3, 120), 15))}` : ''}</div>
      </div>`).join('');

    const msExtra = uniqSusp.length > 8
      ? `<div class="ms-detail" style="padding-top:0.3rem">+ ${uniqSusp.length - 8} more</div>` : '';

    intCard.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.4rem">
        <span class="section-label">manual scrobbles</span>
        <span style="font-size:0.56rem;letter-spacing:0.08em;color:var(--accent2)">${uniqSusp.length} flagged · ${msPct}% of week</span>
      </div>
      <div class="ms-list">${msRows}${msExtra}</div>
      <p class="ms-note">tracks scrobbled faster than their expected listening time, likely added manually</p>
    `;
  }

  function renderPatterns(week, uniq) {
    const card = document.getElementById('patterns-card');
    if (!card || !week.length) return;

    const dayNames = ['sun','mon','tue','wed','thu','fri','sat'];
    const now = new Date();

    const dayBuckets = [];
    const keyIndex = {};
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(now.getDate() - i);
      keyIndex[d.toDateString()] = dayBuckets.length;
      dayBuckets.push({ label: dayNames[d.getDay()], count: 0 });
    }

    const hourCounts = new Array(24).fill(0);
    const tod = { morning: 0, afternoon: 0, evening: 0, night: 0 };
    const uniqArtists = new Set();
    const uniqTracks  = new Set();
    let sleepScrobbles = 0;

    const matrix = {};
    for (let d = 0; d < 7; d++)
      for (let h = 0; h < 24; h++)
        matrix[`${d}_${h}`] = 0;

    week.forEach(t => {
      const dt = new Date(parseInt(t.date.uts) * 1000);
      const dk = dt.toDateString();
      const di = keyIndex[dk];
      const h  = dt.getHours();
      if (di !== undefined) { dayBuckets[di].count++; matrix[`${di}_${h}`]++; }
      hourCounts[h]++;
      if (h >= 6 && h <= 11)       tod.morning++;
      else if (h >= 12 && h <= 17) tod.afternoon++;
      else if (h >= 18 && h <= 23) tod.evening++;
      else                          tod.night++;
      if (h >= 1 && h <= 6)        sleepScrobbles++;
      uniqArtists.add(t.artist['#text']);
      uniqTracks.add(`${t.artist['#text']}|||${t.name}`);
    });

    const total       = week.length;
    const activeDays  = dayBuckets.filter(b => b.count > 0).length;
    const repeatRatio = uniqTracks.size > 0 ? (total / uniqTracks.size).toFixed(1) : '—';
    const sleepPct    = total > 0 ? Math.round((sleepScrobbles / total) * 100) : 0;
    const maxDay      = Math.max(...dayBuckets.map(b => b.count), 1);
    const peakDay     = dayBuckets.reduce((mi, b, i, a) => b.count > a[mi].count ? i : mi, 0);
    const maxHour     = Math.max(...hourCounts, 1);
    const peakHour    = hourCounts.reduce((mi, c, i) => c > hourCounts[mi] ? i : mi, 0);
    const maxCell     = Math.max(...Object.values(matrix), 1);

    const fmtHour = h => { const ap = h < 12 ? 'am' : 'pm'; const hr = h % 12 || 12; return `${hr}${ap}`; };

    const cx = 100, cy = 100, rIn = 34, rMax = 80;
    let spokes = '';
    for (let h = 0; h < 24; h++) {
      const ang   = (h / 24) * 2 * Math.PI - Math.PI / 2;
      const len   = rIn + (hourCounts[h] / maxHour) * (rMax - rIn);
      const x1    = cx + Math.cos(ang) * rIn, y1 = cy + Math.sin(ang) * rIn;
      const x2    = cx + Math.cos(ang) * len, y2 = cy + Math.sin(ang) * len;
      const inten = hourCounts[h] / maxHour;
      const isP   = h === peakHour && hourCounts[h] > 0;
      const isSleepH = h >= 1 && h <= 6;
      let col;
      if (isSleepH && hourCounts[h] > 0)
        col = isP ? '#c4b8f0' : `rgba(140,120,200,${(0.22 + inten * 0.68).toFixed(2)})`;
      else
        col = isP ? '#f0d9bb' : `rgba(212,165,116,${(0.22 + inten * 0.68).toFixed(2)})`;
      spokes += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${col}" stroke-width="${isP ? 5 : 3.6}" stroke-linecap="round"/>`;
    }

    const tickDefs = [[0,'12a'],[6,'6a'],[12,'12p'],[18,'6p']];
    let tickLabels = '';
    tickDefs.forEach(([h, txt]) => {
      const ang = (h / 24) * 2 * Math.PI - Math.PI / 2;
      const x = cx + Math.cos(ang) * 92, y = cy + Math.sin(ang) * 92;
      tickLabels += `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" text-anchor="middle" dominant-baseline="central" class="clock-tick-label">${txt}</text>`;
    });

    const todPct = k => total ? Math.round((tod[k] / total) * 100) : 0;
    const legendItems = [
      ['morning',   'morning',    '6a–12p'],
      ['afternoon', 'afternoon',  '12p–6p'],
      ['evening',   'evening',    '6p–12a'],
      ['night',     'late night', '12a–6a'],
    ].map(([k, lbl, range]) => `
      <div class="clock-legend-item">
        <span class="clock-legend-val">${todPct(k)}%</span>
        <span class="clock-legend-label">${lbl} <span style="color:var(--muted);opacity:0.7">${range}</span></span>
      </div>`).join('');

    const dayCols = dayBuckets.map((b, i) => `
      <div class="day-col${i === peakDay ? ' is-peak' : ''}" style="cursor:default" onmouseenter="showTip(event,'${b.label}: ${b.count} scrobble${b.count !== 1 ? 's' : ''}')" onmousemove="moveTip(event)" onmouseleave="hideTip()">
        <span class="day-bar-count">${b.count || ''}</span>
        <div class="day-bar-track">
          <div class="day-bar${i === peakDay && b.count > 0 ? ' peak' : ''}" style="height:0%" data-h="${Math.round((b.count / maxDay) * 100)}"></div>
        </div>
        <span class="day-bar-label">${b.label}</span>
      </div>`).join('');

    let hmHtml = `<div class="hm-spacer"></div>`;
    dayBuckets.forEach(b => { hmHtml += `<div class="hm-day-label">${b.label}</div>`; });
    for (let h = 0; h < 24; h++) {
      const isSleepHour = h >= 1 && h <= 6;
      hmHtml += `<div class="hm-hour-label">${h % 6 === 0 ? fmtHour(h) : ''}</div>`;
      for (let d = 0; d < 7; d++) {
        const count = matrix[`${d}_${h}`];
        const alpha = count > 0 ? (0.15 + (count / maxCell) * 0.85).toFixed(2) : '0';
        const tipText = `${dayBuckets[d].label} ${fmtHour(h)}: ${count} scrobble${count !== 1 ? 's' : ''}`;
        const cls   = `hm-cell${isSleepHour ? ' hm-sleep' : ''}${count === 0 ? ' hm-empty' : ''}`;
        hmHtml += `<div class="${cls}" style="--hm-a:${alpha};cursor:default" onmouseenter="showTip(event,'${tipText}')" onmousemove="moveTip(event)" onmouseleave="hideTip()"></div>`;
      }
    }

    card.className = 'patterns-card slot-in';
    card.innerHTML = `
      <div class="section-head" style="margin-bottom:0">
        <span class="section-label">listening patterns · 7 days</span>
      </div>

      <div class="insight-row">
        <div class="insight">
          <span class="insight-val">${fmt(uniqArtists.size)}</span>
          <span class="insight-label">unique artists</span>
        </div>
        <div class="insight">
          <span class="insight-val">${fmt(uniqTracks.size)}</span>
          <span class="insight-label">unique tracks</span>
        </div>
        <div class="insight">
          <span class="insight-val">${activeDays}<span style="font-size:0.75em;color:var(--muted2)">/7</span></span>
          <span class="insight-label">active days</span>
        </div>
        <div class="insight">
          <span class="insight-val">${repeatRatio}×</span>
          <span class="insight-label">repeat ratio</span>
        </div>
        <div class="insight">
          <span class="insight-val">${dayBuckets[peakDay].label}</span>
          <span class="insight-label">peak day · ${dayBuckets[peakDay].count}</span>
        </div>
        <div class="insight">
          <span class="insight-val">${fmtHour(peakHour)}</span>
          <span class="insight-label">peak hour · ${hourCounts[peakHour]} plays</span>
        </div>
        ${sleepScrobbles > 0 ? `
        <div class="insight sleep-insight" style="grid-column:1 / -1">
          <span class="insight-val">🌙 ${fmt(sleepScrobbles)} sleep scrobbles</span>
          <span class="insight-label">${sleepPct}% of this week · 1am – 6am · your local timezone</span>
        </div>` : ''}
      </div>

      <div class="chart-block">
        <span class="pattern-sub">scrobbles per day</span>
        <div class="day-chart">${dayCols}</div>
      </div>

      <div class="chart-block">
        <span class="pattern-sub">by hour of day</span>
        <div class="clock-wrap">
          <svg class="clock-svg" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="${rIn - 4}" fill="none" stroke="var(--border2)" stroke-width="1"/>
            ${spokes}
            ${tickLabels}
            <text x="100" y="95" text-anchor="middle" class="clock-center-num">${fmtHour(peakHour)}</text>
            <text x="100" y="112" text-anchor="middle" class="clock-center-sub">peak hour</text>
          </svg>
          <div class="clock-legend">${legendItems}</div>
        </div>
      </div>

      <div class="chart-block">
        <span class="pattern-sub">activity heatmap · day × hour <span style="color:var(--muted);font-size:0.9em">(local time)</span></span>
        <div class="heatmap-grid">${hmHtml}</div>
        <div class="hm-legend">
          <div class="hm-legend-item">
            <div class="hm-legend-swatch" style="background:rgba(212,165,116,0.7)"></div>
            <span>regular hours</span>
          </div>
          <div class="hm-legend-item">
            <div class="hm-legend-swatch" style="background:rgba(140,120,200,0.7)"></div>
            <span>sleep hours · 1am – 6am</span>
          </div>
        </div>
      </div>
    `;

    requestAnimationFrame(() => {
      card.querySelectorAll('.day-bar').forEach(b => { b.style.height = b.dataset.h + '%'; });
    });
  }

  function updateBanCard(totalSecs, scrobbleCount, realDurCount, fallbackCount = 0, fallbackSecs = 210) {
    const card = document.getElementById('ban-card');
    if (!card) return;

    const BAN_LIMIT_SECS = 6 * 24 * 3600;
    const banPct    = (totalSecs / BAN_LIMIT_SECS) * 100;
    const barPct    = Math.min(banPct, 100);
    const listenHrs = (totalSecs / 3600).toFixed(1);
    const remainHrs = Math.max((BAN_LIMIT_SECS - totalSecs) / 3600, 0).toFixed(1);
    const overHrs   = ((totalSecs - BAN_LIMIT_SECS) / 3600).toFixed(1);
    const fbMin     = Math.floor(fallbackSecs / 60);
    const fbSecR    = Math.round(fallbackSecs % 60);
    const fmtFb     = `${fbMin}m${fbSecR > 0 ? ' ' + fbSecR + 's' : ''}`;

    let banColor, cardExtra, statusClass, statusText, banDisplay;
    if (banPct >= 100) {
      banColor = '#e8726f'; cardExtra = 'danger';
      statusClass = 'danger'; statusText = 'over est. limit!';
      banDisplay = banPct > 999 ? '999+%' : banPct.toFixed(1) + '%';
    } else if (banPct >= 75) {
      banColor = '#e8a46f'; cardExtra = 'warning';
      statusClass = 'danger'; statusText = 'approaching limit';
      banDisplay = banPct.toFixed(1) + '%';
    } else if (banPct >= 40) {
      banColor = '#d4a574'; cardExtra = '';
      statusClass = 'caution'; statusText = 'scary';
      banDisplay = banPct.toFixed(1) + '%';
    } else {
      banColor = '#4ade80'; cardExtra = '';
      statusClass = 'safe'; statusText = 'safe';
      banDisplay = banPct.toFixed(1) + '%';
    }

    card.className = `ban-card ${cardExtra}`;
    card.style.cssText = '';
    card.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.4rem">
        <span class="section-label">ban risk · est. 8-day window</span>
        <span class="ban-status ${statusClass}">${statusText}</span>
      </div>
      <div class="ban-header">
        <span class="ban-pct" style="color:${banColor}">${banDisplay}</span>
        <div style="flex:1;display:flex;flex-direction:column;gap:0.35rem">
          <div class="ban-bar-wrap">
            <div class="ban-bar" style="width:${barPct}%;background:${banColor}"></div>
          </div>
          <div style="display:flex;justify-content:space-between">
            <span class="ban-detail-label">${listenHrs} hrs listened / 144 hr limit</span>
            <span class="ban-detail-val" style="color:${banColor}">${banPct >= 100 ? '+' + overHrs + ' hrs over' : remainHrs + ' hrs left'}</span>
          </div>
          <div style="font-size:0.47rem;color:var(--muted);letter-spacing:0.06em;margin-top:0.05rem">${realDurCount}/${scrobbleCount} real durations${fallbackCount > 0 ? ` · ${fallbackCount} estimated at avg ${fmtFb}` : ''}</div>
        </div>
      </div>
      <p style="font-size:0.49rem;color:var(--muted);letter-spacing:0.07em;margin-top:0.1rem;line-height:1.55">just a rough indicator!</p>
      `;
  }

  // ── Auto-load from URL param (runs after all functions defined) ──
  if (_paramUser) handleSearch();
</script>
</body>
</html>
