    async function loadProfileViews(username) {
      const el = $('profile-views');
      if (!el) return;
      try {
        const key = encodeURIComponent(username.toLowerCase());
        const r = await fetch(`https://abacus.jasoncameron.dev/hit/welffi-lastfm-tool/${key}`);
        if (!r.ok) return;
        const d = await r.json();
        if (typeof d.value === 'number') el.textContent = ` · ${fmt(d.value)} profile view${d.value === 1 ? '' : 's'}`;
      } catch {}
    }

    window.switchTab = function(name) {
      ['artists','tracks','albums'].forEach(t => {
        const content = $(`tab-${t}`);
        const btn = document.querySelector(`.tab-btn[onclick="switchTab('${t}')"]`);
        if (content) content.classList.toggle('active', t === name);
        if (btn) btn.classList.toggle('active', t === name);
      });
      animateBars($(`tab-${name}`));
    };

    function buildArtistRows(data) {
      const artists = toArr(data?.topartists?.artist);
      if (!artists.length) return null;
      const max = parseInt(artists[0].playcount);
      return artists.map((a, i) => `
        <div class="list-item">
          <span class="artist-rank">${String(i+1).padStart(2,'0')}</span>
          <div class="list-body">
            <div class="list-name"><a class="list-name-link" href="https://www.last.fm/music/${encodeURIComponent(a.name)}" target="_blank" rel="noopener">${esc(a.name)}</a></div>
            <div class="bar-wrap"><div class="bar" data-w="${Math.round((parseInt(a.playcount)/max)*100)}"></div></div>
          </div>
          <div class="list-count">${fmt(a.playcount)} plays</div>
        </div>`).join('');
    }

    function buildTrackRows(data) {
      const tracks = toArr(data?.toptracks?.track);
      if (!tracks.length) return { rows: null, tracks: [] };
      const max = parseInt(tracks[0].playcount);
      const rows = tracks.map((t, i) =>
        listItem(i+1, null, t.name, t.artist.name, `${fmt(t.playcount)} plays`,
          Math.round((parseInt(t.playcount)/max)*100), `timg-${i}`)
      ).join('');
      return { rows, tracks };
    }

    async function loadTrackImages(tracks) {
      await Promise.all(tracks.map(async (t, i) => {
        try {
          const d = await lfm('track.getInfo', API_KEY, { artist: t.artist.name, track: t.name });
          const albumImg = img(d.track?.album?.image, 'small') || img(d.track?.album?.image, 'medium');
          if (!albumImg) return;
          const ph = $(`timg-${i}`);
          if (ph) ph.outerHTML = `<img class="list-img" src="${albumImg}" alt="" onerror="this.outerHTML='<div class=list-img-ph></div>'" />`;
        } catch {}
      }));
    }

    function buildAlbumRows(data) {
      const albums = toArr(data?.topalbums?.album);
      if (!albums.length) return null;
      const max = parseInt(albums[0].playcount);
      return albums.map((a, i) => {
        const cover = img(a.image,'small') || img(a.image,'medium');
        return listItem(i+1, cover, a.name, a.artist.name, `${fmt(a.playcount)} plays`,
          Math.round((parseInt(a.playcount)/max)*100));
      }).join('');
    }

    // ── Background analysis ──
    async function runAnalysis(user) {
      const now = Math.floor(Date.now() / 1000);
      const eightAgo = now - 8 * 24 * 60 * 60;
      const weekAgo = now - 7 * 24 * 60 * 60;
      const banCard = $('ban-card');
      const setBanLoad = (txt) => {
        if (banCard) banCard.innerHTML = `<div class="section-head"><span class="section-label">ban risk</span></div><span class="badge-loading"><span class="dot"></span>${txt}</span>`;
      };

      const page1 = await lfm('user.getRecentTracks', API_KEY, { user, from: eightAgo, to: now, limit: 200, page: 1 });
      const totalPages = parseInt(page1.recenttracks['@attr'].totalPages);
      let all = toArr(page1.recenttracks.track).filter(t => t.date);

      if (totalPages > 1) {
        setBanLoad(`loading history · ${totalPages} pages…`);
        const rest = await Promise.all(
          Array.from({ length: totalPages - 1 }, (_, i) =>
            lfm('user.getRecentTracks', API_KEY, { user, from: eightAgo, to: now, limit: 200, page: i + 2 })
          )
        );
        rest.forEach(p => all = all.concat(toArr(p.recenttracks.track).filter(t => t.date)));
      }

      const uniq = {};
      all.forEach(t => {
        const key = `${t.artist['#text']}|||${t.name}`;
        if (!uniq[key]) uniq[key] = { artist: t.artist['#text'], name: t.name, duration: null };
      });

      const keys = Object.keys(uniq);
      const BATCH = 8;
      setBanLoad(`fetching durations · 0/${keys.length}…`);
      for (let i = 0; i < keys.length; i += BATCH) {
        await Promise.all(keys.slice(i, i + BATCH).map(async key => {
          try {
            const d = await lfm('track.getInfo', API_KEY, { artist: uniq[key].artist, track: uniq[key].name });
            const ms = parseInt(d.track?.duration);
            if (ms > 0) uniq[key].duration = ms / 1000;
          } catch {}
        }));
        const prog = banCard && banCard.querySelector('.badge-loading');
        if (prog) prog.innerHTML = `<span class="dot"></span>fetching durations · ${Math.min(i + BATCH, keys.length)}/${keys.length}…`;
        if (i + BATCH < keys.length) await new Promise(r => setTimeout(r, 120));
      }

      let knownSum = 0, knownN = 0;
      all.forEach(t => {
        const dur = uniq[`${t.artist['#text']}|||${t.name}`]?.duration;
        if (dur) { knownSum += dur; knownN++; }
      });
      const fallbackSecs = knownN > 0 ? knownSum / knownN : 210;

      let totalListenSecs = 0, tracksWithRealDur = 0, tracksWithFallback = 0;
      all.forEach(t => {
        const dur = uniq[`${t.artist['#text']}|||${t.name}`]?.duration;
        if (dur) { totalListenSecs += dur; tracksWithRealDur++; }
        else { totalListenSecs += fallbackSecs; tracksWithFallback++; }
      });

      updateBanCard(totalListenSecs, all.length, tracksWithRealDur, tracksWithFallback, fallbackSecs);

      // hero: real 7-day listening hours
      const week = all.filter(t => parseInt(t.date.uts) >= weekAgo);
      let weekListenSecs = 0;
      week.forEach(t => {
        const dur = uniq[`${t.artist['#text']}|||${t.name}`]?.duration;
        weekListenSecs += dur ?? fallbackSecs;
      });
      const realWeekHrs = weekListenSecs / 3600;
      const heroNum = $('hero-number'), heroUnit = $('hero-unit');
      if (heroNum) {
        heroNum.classList.remove('pending');
        if (realWeekHrs >= 1) countUp(heroNum, realWeekHrs >= 10 ? Math.round(realWeekHrs) : +realWeekHrs.toFixed(1), { dec: realWeekHrs >= 10 ? 0 : 1 });
        else countUp(heroNum, Math.round(weekListenSecs / 60), { dec: 0 });
      }
      if (heroUnit) heroUnit.textContent = realWeekHrs >= 1 ? 'hours · this week' : 'minutes · this week';

      renderPatterns(week, uniq);
      renderStreaks(all, uniq);

      // integrity check
      week.sort((a, b) => parseInt(a.date.uts) - parseInt(b.date.uts));
      const suspicious = [];
      for (let i = 1; i < week.length; i++) {
        const prev = week[i - 1], curr = week[i];
        const gap = parseInt(curr.date.uts) - parseInt(prev.date.uts);
        const currDur = uniq[`${curr.artist['#text']}|||${curr.name}`]?.duration;
        const minGap = currDur ? Math.max(Math.min(currDur * 0.3, 120), 15) : 20;
        if (gap < minGap) {
          suspicious.push({ prevTrack: prev.name, currTrack: curr.name, currArtist: curr.artist['#text'], gap, currDur });
        }
      }

      renderTags({ totalListenSecs });

      const intCard = $('integrity-card');
      if (!intCard) return;
      intCard.style.opacity = '1';

      if (suspicious.length === 0) {
        intCard.innerHTML = `
          <div class="section-head">
            <span class="section-label">manual scrobbles</span>
            <span class="ms-status safe">✓ none · ${week.length} checked</span>
          </div>
          <p class="ms-note" style="border-top:none;padding-top:0;margin-top:0.3rem">every scrobble this week had enough time to actually play — clean listening history.</p>`;
        return;
      }

      const seen = new Set();
      const uniqSusp = suspicious.filter(s => {
        const k = `${s.prevTrack}|${s.currTrack}`;
        return seen.has(k) ? false : (seen.add(k), true);
      });
      const fmtSecs = s => !s ? '?' : (s >= 60 ? `${Math.floor(s/60)}m ${Math.round(s%60)}s` : `${Math.round(s)}s`);
      const msPct = Math.round((uniqSusp.length / week.length) * 100);
      const msRows = uniqSusp.slice(0, 8).map(s => `
        <div class="ms-item">
          <div class="ms-track">${esc(s.currTrack)} <span>by ${esc(s.currArtist)}</span></div>
          <div class="ms-detail">scrobbled ${fmtSecs(s.gap)} after the previous track${s.currDur ? ` · expected ≥ ${fmtSecs(Math.max(Math.min(s.currDur * 0.3, 120), 15))}` : ''}</div>
        </div>`).join('');
      const msExtra = uniqSusp.length > 8 ? `<div class="ms-detail" style="padding-top:0.4rem">+ ${uniqSusp.length - 8} more</div>` : '';

      intCard.innerHTML = `
        <div class="section-head">
          <span class="section-label">manual scrobbles</span>
          <span class="ms-status flag">${uniqSusp.length} flagged · ${msPct}%</span>
        </div>
        <div class="ms-list">${msRows}</div>${msExtra}
        <p class="ms-note">tracks that are scrobbled faster than their playtime, if it's a large number, then they're likely manual! sometimes last fm scrobble times are off so 20-30 "manual" scrobbles is usual.</p>`;
    }

    function renderPatterns(week, uniq) {
      _lastWeek = week;
      if (!week.length) {
        ['insights-card','clock-card','daychart-card','heatmap-card'].forEach(id => { const c = $(id); if (c) c.style.display = 'none'; });
        return;
      }

      const dayNames = ['sun','mon','tue','wed','thu','fri','sat'];
      const now = new Date();
      const dayBuckets = [], keyIndex = {};
      for (let i = 6; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(now.getDate() - i);
        keyIndex[d.toDateString()] = dayBuckets.length;
        dayBuckets.push({ label: dayNames[d.getDay()], count: 0 });
      }

      const hourCounts = new Array(24).fill(0);
      const tod = { morning: 0, afternoon: 0, evening: 0, night: 0 };
      const uniqArtists = new Set(), uniqTracks = new Set();
      let sleepScrobbles = 0;
      const matrix = {};
      for (let d = 0; d < 7; d++) for (let h = 0; h < 24; h++) matrix[`${d}_${h}`] = 0;

      week.forEach(t => {
        const dt = new Date(parseInt(t.date.uts) * 1000);
        const di = keyIndex[dt.toDateString()];
        const h = dt.getHours();
        if (di !== undefined) { dayBuckets[di].count++; matrix[`${di}_${h}`]++; }
        hourCounts[h]++;
        if (h >= 6 && h <= 11) tod.morning++;
        else if (h >= 12 && h <= 17) tod.afternoon++;
        else if (h >= 18 && h <= 23) tod.evening++;
        else tod.night++;
        if (isSleepHour(h)) sleepScrobbles++;
        uniqArtists.add(t.artist['#text']);
        uniqTracks.add(`${t.artist['#text']}|||${t.name}`);
      });

      const total = week.length;
      const activeDays = dayBuckets.filter(b => b.count > 0).length;
      const repeatRatio = uniqTracks.size > 0 ? (total / uniqTracks.size).toFixed(1) : '—';
      const sleepPct = total > 0 ? Math.round((sleepScrobbles / total) * 100) : 0;
      const maxDay = Math.max(...dayBuckets.map(b => b.count), 1);
      const peakDay = dayBuckets.reduce((mi, b, i, a) => b.count > a[mi].count ? i : mi, 0);
      const maxHour = Math.max(...hourCounts, 1);
      const peakHour = hourCounts.reduce((mi, c, i) => c > hourCounts[mi] ? i : mi, 0);
      const maxCell = Math.max(...Object.values(matrix), 1);
      const fmtHour = h => { const ap = h < 12 ? 'am' : 'pm'; const hr = h % 12 || 12; return `${hr}${ap}`; };

      // ── insights strip ──
      const insightTiles = [
        [fmt(uniqArtists.size), 'unique artists'],
        [fmt(uniqTracks.size), 'unique tracks'],
        [`${activeDays}<sub>/7</sub>`, 'active days'],
        [`${repeatRatio}×`, 'repeat ratio'],
        [dayBuckets[peakDay].label, `peak day · ${dayBuckets[peakDay].count}`],
        [fmtHour(peakHour), `peak hour · ${hourCounts[peakHour]}`],
      ].map(([v, l]) => `<div class="insight"><span class="insight-val">${v}</span><span class="insight-label">${l}</span></div>`).join('');

      const rangeLabel = `${fmtHour(sleepStart)}–${fmtHour(sleepEnd)}`;
      const fillLeft = (sleepStart / 23) * 100;
      const fillWidth = ((sleepEnd - sleepStart) / 23) * 100;

      const insCard = $('insights-card');
      if (insCard) {
        insCard.style.display = '';
        insCard.innerHTML = `
          <div class="section-head"><span class="section-label">your week</span><span class="section-aside">past 7 days · local time</span></div>
          <div class="insights-grid">${insightTiles}</div>
          <div class="sleep-insight">
            <div class="sleep-insight-top">
              <span class="moon">🌙</span>
              <span class="sleep-txt">
                <span class="insight-val" id="sleep-count">${fmt(sleepScrobbles)} sleep scrobbles</span>
                <span class="insight-label" id="sleep-label">${sleepPct}% of the week · ${rangeLabel}</span>
              </span>
            </div>
            <div class="sleep-range">
              <div class="sleep-range-track">
                <div class="sleep-range-fill" id="sleep-fill" style="left:${fillLeft}%;width:${fillWidth}%"></div>
                <input type="range" min="0" max="23" step="1" value="${sleepStart}" id="sleep-start" oninput="onSleepRange()" onchange="onSleepCommit()" aria-label="sleep start hour" />
                <input type="range" min="0" max="23" step="1" value="${sleepEnd}" id="sleep-end" oninput="onSleepRange()" onchange="onSleepCommit()" aria-label="sleep end hour" />
              </div>
              <div class="sleep-range-scale"><span>12am</span><span>6am</span><span>12pm</span><span>6pm</span><span>11pm</span></div>
            </div>
          </div>`;
      }

      // ── clock (24h radial) ──
      const cx = 100, cy = 100, rIn = 36, rMax = 84;
      let spokes = '';
      for (let h = 0; h < 24; h++) {
        const ang = (h / 24) * 2 * Math.PI - Math.PI / 2;
        const len = rIn + (hourCounts[h] / maxHour) * (rMax - rIn);
        const x1 = cx + Math.cos(ang) * rIn, y1 = cy + Math.sin(ang) * rIn;
        const x2 = cx + Math.cos(ang) * len, y2 = cy + Math.sin(ang) * len;
        const inten = hourCounts[h] / maxHour;
        const isP = h === peakHour && hourCounts[h] > 0;
        const isSleepH = isSleepHour(h);
        let col;
        if (isSleepH && hourCounts[h] > 0) col = isP ? '#c4b8f0' : `rgba(157,137,214,${(0.25 + inten * 0.65).toFixed(2)})`;
        else col = isP ? '#f3ddbf' : `rgba(216,167,114,${(0.25 + inten * 0.65).toFixed(2)})`;
        spokes += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${col}" stroke-width="${isP ? 5 : 3.6}" stroke-linecap="round"/>`;
      }
      let tickLabels = '';
      [[0,'12a'],[6,'6a'],[12,'12p'],[18,'6p']].forEach(([h, txt]) => {
        const ang = (h / 24) * 2 * Math.PI - Math.PI / 2;
        const x = cx + Math.cos(ang) * 95, y = cy + Math.sin(ang) * 95;
        tickLabels += `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" text-anchor="middle" dominant-baseline="central" class="clock-tick-label">${txt}</text>`;
      });

      const todPct = k => total ? Math.round((tod[k] / total) * 100) : 0;
      const legendItems = [
        ['morning','#d8a772','morning','6a–12p'],
        ['afternoon','#edca9f','afternoon','12p–6p'],
        ['evening','#c79a6a','evening','6p–12a'],
        ['night','#9d89d6','late night','12a–6a'],
      ].map(([k, col, lbl, range]) => `
        <div class="clock-legend-item">
          <span class="clock-legend-swatch" style="background:${col}"></span>
          <span class="clock-legend-txt">
            <span class="clock-legend-val">${todPct(k)}%</span>
            <span class="clock-legend-label">${lbl} · ${range}</span>
          </span>
        </div>`).join('');

      const clkCard = $('clock-card');
      if (clkCard) {
        clkCard.innerHTML = `
          <div class="section-head"><span class="section-label">by hour of day</span><span class="section-aside">peak ${fmtHour(peakHour)}</span></div>
          <div class="clock-wrap">
            <svg class="clock-svg" viewBox="0 0 200 200">
              <circle cx="100" cy="100" r="${rIn - 5}" fill="none" stroke="var(--border2)" stroke-width="1"/>
              ${spokes}
              ${tickLabels}
              <text x="100" y="95" text-anchor="middle" class="clock-center-num">${fmtHour(peakHour)}</text>
              <text x="100" y="113" text-anchor="middle" class="clock-center-sub">peak hour</text>
            </svg>
            <div class="clock-legend">${legendItems}</div>
          </div>`;
      }

      // ── day chart ──
      const dayCols = dayBuckets.map((b, i) => `
        <div class="day-col${i === peakDay ? ' is-peak' : ''}" onmouseenter="showTip(event,'${b.label}: ${b.count} scrobble${b.count !== 1 ? 's' : ''}')" onmousemove="moveTip(event)" onmouseleave="hideTip()">
          <span class="day-bar-count">${b.count || ''}</span>
          <div class="day-bar-track"><div class="day-bar${i === peakDay && b.count > 0 ? ' peak' : ''}" style="height:0%" data-h="${Math.round((b.count / maxDay) * 100)}"></div></div>
          <span class="day-bar-label">${b.label}</span>
        </div>`).join('');

      const dcCard = $('daychart-card');
      if (dcCard) {
        dcCard.innerHTML = `
          <div class="section-head"><span class="section-label">scrobbles per day</span><span class="section-aside">peak ${dayBuckets[peakDay].label} · ${dayBuckets[peakDay].count}</span></div>
          <div class="day-chart">${dayCols}</div>`;
      }

      // ── heatmap (day rows × hour cols) ──
      let hmHtml = `<div class="hm-corner"></div>`;
      for (let h = 0; h < 24; h++) hmHtml += `<div class="hm-col-label">${h % 4 === 0 ? fmtHour(h) : ''}</div>`;
      for (let d = 0; d < 7; d++) {
        hmHtml += `<div class="hm-row-label">${dayBuckets[d].label}</div>`;
        for (let h = 0; h < 24; h++) {
          const isSleepH = isSleepHour(h);
          const count = matrix[`${d}_${h}`];
          const alpha = count > 0 ? (0.15 + (count / maxCell) * 0.85).toFixed(2) : '0';
          const tipText = `${dayBuckets[d].label} ${fmtHour(h)}: ${count} scrobble${count !== 1 ? 's' : ''}`;
          const cls = `hm-cell${isSleepH ? ' hm-sleep' : ''}${count === 0 ? ' hm-empty' : ''}`;
          hmHtml += `<div class="${cls}" style="--hm-a:${alpha}" onmouseenter="showTip(event,'${tipText}')" onmousemove="moveTip(event)" onmouseleave="hideTip()"></div>`;
        }
      }

      const hmCard = $('heatmap-card');
      if (hmCard) {
        hmCard.innerHTML = `
          <div class="section-head"><span class="section-label">activity heatmap</span><span class="section-aside">day × hour</span></div>
          <div class="heatmap-grid">${hmHtml}</div>
          <div class="hm-legend">
            <div class="hm-legend-item"><div class="hm-legend-swatch" style="background:rgba(216,167,114,0.75)"></div><span>regular hours</span></div>
            <div class="hm-legend-item"><div class="hm-legend-swatch" style="background:rgba(157,137,214,0.75)"></div><span>sleep hours · ${fmtHour(sleepStart)}–${fmtHour(sleepEnd)}</span></div>
          </div>`;
      }

      settle(() => {
        const dc = $('daychart-card');
        if (dc) dc.querySelectorAll('.day-bar').forEach(b => { b.style.height = b.dataset.h + '%'; });
      });
    }

    function isOvernightStreak(s) {
      const eh = new Date(s.end * 1000).getHours();
      return eh >= 3 && eh < 12 && (s.end - s.start) >= 90 * 60 && s.count >= 15;
    }

    function computeStreaks(all, opts) {
      const strict = opts && opts.strict;
      const dur = (opts && opts.dur) || {};
      const IDLE_TOL = 120;
      const chron = all.slice().reverse();
      const artistOf = t => t.artist['#text'];
      const keyOf = t => `${t.artist['#text']}|||${t.name}`;
      const paused = (cur, nxt) => {
        const gap = parseInt(nxt.date.uts) - parseInt(cur.date.uts);
        return gap - (dur[keyOf(cur)] || 210) > IDLE_TOL;
      };
      const streaks = [];
      let i = 0;
      while (i < chron.length) {
        let j = i;
        const artist = artistOf(chron[i]);
        while (j + 1 < chron.length && artistOf(chron[j + 1]) === artist && !(strict && paused(chron[j], chron[j + 1]))) j++;
        const run = chron.slice(i, j + 1);
        if (run.length >= 2) {
          let best = null; const distinct = new Set();
          let k = 0;
          while (k < run.length) {
            let m = k;
            const name = run[k].name;
            while (m + 1 < run.length && run[m + 1].name === name) m++;
            distinct.add(name);
            const len = m - k + 1;
            if (!best || len > best.count) best = { name, count: len };
            k = m + 1;
          }
          streaks.push({
            artist,
            count: run.length,
            start: parseInt(run[0].date.uts),
            end: parseInt(run[run.length - 1].date.uts),
            distinctTracks: distinct.size,
            topTrack: best,
            img: img(run[0].image, 'medium') || img(run[0].image, 'small') || img(run[0].image, 'large'),
          });
        }
        i = j + 1;
      }
      return streaks;
    }

    function renderStreaks(all, uniq) {
      const card = $('streaks-card');
      if (!card) return;
      if (all) {
        const dur = {};
        if (uniq) for (const k in uniq) dur[k] = uniq[k].duration;
        _streaks = { all, dur };
      }
      if (!_streaks.all) return;

      const dayNames = ['sun','mon','tue','wed','thu','fri','sat'];
      const clock = uts => {
        const d = new Date(uts * 1000);
        const ap = d.getHours() < 12 ? 'am' : 'pm', hr = d.getHours() % 12 || 12;
        return `${dayNames[d.getDay()]} ${hr}:${String(d.getMinutes()).padStart(2,'0')}${ap}`;
      };
      const span = secs => {
        const h = Math.floor(secs / 3600), m = Math.round((secs % 3600) / 60);
        return h > 0 ? `${h}h${m > 0 ? ' ' + m + 'm' : ''}` : `${m}m`;
      };

      const head = `
        <div class="section-head">
          <span class="section-label">listening streaks</span>
          <button class="strict-toggle${strictStreaks ? ' on' : ''}" onclick="toggleStrict()"><span class="strict-dot"></span>strict mode</button>
        </div>
        <p class="strict-note">strict mode ends the streak as soon as they stop listening for a bit!</p>`;

      const streaks = computeStreaks(_streaks.all, { strict: strictStreaks, dur: _streaks.dur }).sort((a, b) => b.count - a.count);
      const top = streaks.filter(s => s.count >= 6).slice(0, 8);

      if (!top.length) {
        card.innerHTML = `${head}
          <p class="empty-note">no notable streaks in the last 8 days — nobody's been looping hard enough 🎧</p>`;
        return;
      }

      const maxCount = top[0].count;
      const rows = top.map((s, i) => {
        const hot = s.count >= 25;
        const overnight = isOvernightStreak(s);
        const tt = s.topTrack;
        const trackLine = tt && tt.count === s.count
          ? `all “${esc(tt.name)}”`
          : (tt && tt.count >= 2
            ? `incl. “${esc(tt.name)}” ×${tt.count} · ${s.distinctTracks} tracks`
            : `${s.distinctTracks} different tracks`);
        const pct = Math.round((s.count / maxCount) * 100);
        const artHtml = s.img
          ? `<img class="streak-art" src="${s.img}" alt="" onerror="this.outerHTML='<div class=streak-art-ph>♪</div>'" />`
          : `<div class="streak-art-ph">♪</div>`;
        return `
          <div class="streak-row">
            <span class="streak-rank">${i + 1}</span>
            ${artHtml}
            <div class="streak-body">
              <div class="streak-top">
                <span class="streak-artist">${esc(s.artist)}</span>
                <span class="streak-count${hot ? ' hot' : ''}">${s.count}×${hot ? ' 🔥' : ''}</span>
              </div>
              <div class="streak-track">${trackLine}</div>
              <div class="streak-bar-wrap"><div class="streak-bar" data-w="${pct}"></div></div>
              <div class="streak-when">${clock(s.start)} → ${clock(s.end)} · ${span(s.end - s.start)}${overnight ? ` · <span class="streak-moon">🌙 sleep scrobble</span>` : ''}</div>
            </div>
          </div>`;
      }).join('');

      card.innerHTML = `${head}
        <div class="streak-list">${rows}</div>
        <p class="ms-note">artist streaks: 🔥 = 25+ in a row · 🌙 = likely a sleep scrobbling streak, ran overnight</p>`;

      settle(() => card.querySelectorAll('.streak-bar').forEach(b => { b.style.width = b.dataset.w + '%'; }));
    }

    window.toggleStrict = function () { strictStreaks = !strictStreaks; renderStreaks(); };

    function renderTags(ctx) {
      const box = $('hero-tags');
      if (!box) return;
      const p = _profile || { memberYears: 0, playcount: 0 };
      const hoursPerDay = ctx.totalListenSecs / 8 / 3600;

      const defs = [];
      if (hoursPerDay >= 14) {
        defs.push({ label: 'sleep scrobbler', color: 'purple', tip: 'averages 14+ hours of listening a day.' });
      }
      const years = Math.floor(p.memberYears);
      if (years >= 1) {
        const yr = `${years} year${years === 1 ? '' : 's'}`;
        defs.push({ label: `${yr}!`, color: '', tip: `on last.fm for ${yr}.` });
      }
      const MILESTONES = [1000, 5000, 10000, 25000, 50000, 100000, 250000, 500000, 1000000, 2000000, 5000000];
      const milestone = MILESTONES.filter(m => p.playcount >= m).pop();
      if (milestone) {
        const ms = milestone >= 1000000 ? `${milestone / 1000000}M` : `${milestone / 1000}k`;
        defs.push({ label: `${ms} scrobbles!`, color: 'green', tip: `${fmt(milestone)}+ total scrobbles.` });
      }
      if (p.topTrack) {
        const tt = p.topTrack;
        const artist = tt.artist?.name || tt.artist?.['#text'] || '';
        defs.push({ label: `${tt.name}!`, color: '', tip: `favorite track this week — ${tt.name} by ${artist}, played ${fmt(tt.playcount)}x.` });
      }

      box.innerHTML = defs.map(d =>
        `<span class="tag${d.color ? ' ' + d.color : ''}" tabindex="0" data-tip="${esc(d.tip)}" onmouseenter="tagOver(this)" onmouseleave="tagOut()" onclick="tagTap(this,event)">${esc(d.label)}</span>`
      ).join('');
    }

    function updateBanCard(totalSecs, scrobbleCount, realDurCount, fallbackCount = 0, fallbackSecs = 210) {
      const card = $('ban-card');
      if (!card) return;
      const BAN_LIMIT_SECS = 6 * 24 * 3600;
      const banPct = (totalSecs / BAN_LIMIT_SECS) * 100;
      const barPct = Math.min(banPct, 100);
      const listenHrs = (totalSecs / 3600).toFixed(1);
      const remainHrs = Math.max((BAN_LIMIT_SECS - totalSecs) / 3600, 0).toFixed(1);
      const overHrs = ((totalSecs - BAN_LIMIT_SECS) / 3600).toFixed(1);
      const fbMin = Math.floor(fallbackSecs / 60), fbSecR = Math.round(fallbackSecs % 60);
      const fmtFb = `${fbMin}m${fbSecR > 0 ? ' ' + fbSecR + 's' : ''}`;
      const accuracy = scrobbleCount > 0 ? Math.round((realDurCount / scrobbleCount) * 100) : 100;
      const accColor = accuracy >= 90 ? 'var(--green)' : accuracy >= 70 ? 'var(--accent)' : 'var(--red)';

      let banColor, statusClass, statusText, banDisplay;
      if (banPct >= 100) { banColor = '#e87b78'; statusClass = 'danger'; statusText = 'over!'; banDisplay = banPct > 999 ? 999 : banPct; }
      else if (banPct >= 75) { banColor = '#e8a46f'; statusClass = 'danger'; statusText = 'close!'; banDisplay = banPct; }
      else if (banPct >= 40) { banColor = '#d8a772'; statusClass = 'caution'; statusText = 'scary!'; banDisplay = banPct; }
      else { banColor = '#82d7a4'; statusClass = 'safe'; statusText = 'safe!'; banDisplay = banPct; }

      card.className = 'card ban-card reveal';
      card.innerHTML = `
        <div class="section-head"><span class="section-label">ban risk</span><span class="section-aside">est. 8-day window</span></div>
        <div class="ban-body">
          <div class="gauge">
            <svg viewBox="0 0 168 96">
              <path class="gauge-track" d="M14 90 A 70 70 0 0 1 154 90" pathLength="100"/>
              <path class="gauge-fill" d="M14 90 A 70 70 0 0 1 154 90" pathLength="100" style="stroke:${banColor};stroke-dasharray:0 100"/>
            </svg>
            <div class="gauge-center">
              <span class="gauge-pct" style="color:${banColor}">0%</span>
              <span class="gauge-status ${statusClass}">${statusText}</span>
            </div>
          </div>
          <div class="ban-details">
            <div class="ban-row"><span class="ban-row-lbl">listened / limit</span><span class="ban-row-val">${listenHrs} / 144 hrs</span></div>
            <div class="ban-row"><span class="ban-row-lbl">${banPct >= 100 ? 'over by' : 'headroom left'}</span><span class="ban-row-val" style="color:${banColor}">${banPct >= 100 ? '+' + overHrs + ' hrs' : remainHrs + ' hrs'}</span></div>
            <div class="ban-row"><span class="ban-row-lbl">durations / est. durations</span><span class="ban-row-val">${realDurCount}/${scrobbleCount}${fallbackCount > 0 ? ` · est ${fmtFb}` : ''}</span></div>
            <div class="ban-row"><span class="ban-row-lbl">estimate accuracy</span><span class="ban-row-val" style="color:${accColor}">${accuracy}%</span></div>
          </div>
        </div>
        <p class="ban-foot">shows you how close you are to getting banned on fmbot (fmbot bans you from global leaderboards if you have over 6 days of listening in 8 days)</p>`;

      const pctEl = card.querySelector('.gauge-pct');
      const fillEl = card.querySelector('.gauge-fill');
      settle(() => {
        if (fillEl) fillEl.style.strokeDasharray = `${barPct} 100`;
        if (pctEl) {
          if (banPct > 999) { pctEl.textContent = '999+%'; }
          else countUp(pctEl, +banDisplay.toFixed(1), { dec: 1, suffix: '%' });
        }
      });
    }

    // auto-load from URL param
    if (_paramArtist || _paramUser) handleSearch();
})();
</script>
</body>
</html>
