<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>last.fm stats · welffi</title>
  <meta name="description" content="Look up Last.fm listening stats, showing listening hours this week, ban risk, top artists, tracks, and albums." />
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://welffi.github.io/lastfm.html" />
  <meta property="og:site_name"   content="welffi" />
  <meta property="og:title"       content="last.fm stats" />
  <meta property="og:description" content="listening hours · ban risk · top artists, tracks &amp; albums · impossible scrobble check" />
  <meta property="og:image"       content="https://i.imgur.com/c7moPaj.png" />
  <meta name="theme-color"        content="#d8a772" />
  <link rel="icon" type="image/png" href="https://i.imgur.com/c7moPaj.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200;0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,200;1,6..72,300;1,6..72,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0b0a08;
      --surface:  #15110d;
      --surface2: #1d1814;
      --surface3: #241e18;
      --border:   #261f19;
      --border2:  #342b22;
      --text:     #f0eae1;
      --muted:    #574d40;
      --muted2:   #786a59;
      --muted3:   #9c8d79;
      --accent:   #d8a772;
      --accent2:  #edca9f;
      --green:    #82d7a4;
      --red:      #e87b78;
      --purple:   #9d89d6;
      --serif:    'Newsreader', Georgia, serif;
      --mono:     'DM Mono', ui-monospace, monospace;
      --ease:     cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .fx { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .fx-grid { background-image: radial-gradient(circle, rgba(255,255,255,0.028) 1px, transparent 1px); background-size: 26px 26px; -webkit-mask-image: radial-gradient(ellipse 90% 70% at 50% 30%, #000 25%, transparent 80%); mask-image: radial-gradient(ellipse 90% 70% at 50% 30%, #000 25%, transparent 80%); }
    .fx-glow {
      background:
        radial-gradient(ellipse 70% 38% at 50% -6%, rgba(216,167,114,0.10) 0%, transparent 62%),
        radial-gradient(ellipse 60% 30% at 88% 8%, rgba(157,137,214,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 70% 34% at 50% 108%, rgba(180,130,80,0.05) 0%, transparent 62%);
    }
    .fx-vig { box-shadow: inset 0 0 240px 40px rgba(0,0,0,0.55); }

    .page {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 3.2rem 1.25rem 8rem;
    }
    .hidden { display: none !important; }

    .eyebrow { font-size: 0.56rem; letter-spacing: 0.32em; color: var(--accent); text-transform: lowercase; display: block; }
    .display { font-family: var(--serif); font-weight: 200; letter-spacing: -0.01em; line-height: 0.98; }

    /* ── card base ── */
    .card {
      background: linear-gradient(180deg, var(--surface) 0%, rgba(21,17,13,0.7) 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.025) inset, 0 18px 40px -28px rgba(0,0,0,0.8);
    }

    .section-head { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; margin-bottom: 0.9rem; }
    .section-label { font-size: 0.58rem; letter-spacing: 0.26em; color: var(--muted2); text-transform: lowercase; display: flex; align-items: center; gap: 0.55rem; }
    .section-label::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px rgba(216,167,114,0.5); }
    .section-aside { font-size: 0.56rem; letter-spacing: 0.1em; color: var(--muted); text-transform: lowercase; }

    /* ════ INPUT ════ */
    .input-card {
      width: 100%; max-width: 380px;
      display: flex; flex-direction: column; gap: 1.5rem;
      animation: fadeUp 0.7s var(--ease) both;
    }
    .input-head { text-align: center; display: flex; flex-direction: column; gap: 0.7rem; align-items: center; }
    .input-head .display { font-size: 2.9rem; }
    .input-head .display em { font-style: italic; color: var(--accent2); font-weight: 300; }
    .input-tagline { font-size: 0.64rem; letter-spacing: 0.04em; color: var(--muted2); line-height: 1.6; max-width: 24ch; }

    .pulse-line { display: inline-flex; align-items: flex-end; gap: 3px; height: 18px; margin-bottom: 0.2rem; }
    .pulse-line span { width: 3px; border-radius: 2px; background: linear-gradient(180deg, var(--accent2), var(--accent)); animation: eq-anim 1.1s ease infinite; }
    .pulse-line span:nth-child(1){ animation-delay: 0s; }
    .pulse-line span:nth-child(2){ animation-delay: .18s; }
    .pulse-line span:nth-child(3){ animation-delay: .36s; }
    .pulse-line span:nth-child(4){ animation-delay: .54s; }
    .pulse-line span:nth-child(5){ animation-delay: .72s; }

    .mode-toggle { display: flex; gap: 0.25rem; padding: 0.28rem; background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px; }
    .mode-opt { flex: 1; background: none; border: 1px solid transparent; border-radius: 9px; padding: 0.5rem; font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.14em; color: var(--muted2); cursor: pointer; text-transform: lowercase; transition: color 0.2s, background 0.2s, border-color 0.2s; }
    .mode-opt:hover { color: var(--text); }
    .mode-opt.active { color: var(--accent2); background: rgba(216,167,114,0.1); border-color: rgba(216,167,114,0.24); }

    .field { display: flex; flex-direction: column; gap: 0.55rem; }
    .field label { font-size: 0.56rem; letter-spacing: 0.22em; color: var(--muted2); text-transform: lowercase; }
    .field-wrap { position: relative; display: flex; align-items: center; }
    .field-at { position: absolute; left: 1rem; color: var(--muted); font-size: 0.85rem; pointer-events: none; }
    .field input {
      background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px;
      padding: 0.95rem 1rem 0.95rem 2rem; color: var(--text);
      font-family: var(--mono); font-size: 0.92rem; letter-spacing: 0.02em; outline: none; width: 100%;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .field input:focus { border-color: rgba(216,167,114,0.55); box-shadow: 0 0 0 4px rgba(216,167,114,0.09); background: var(--surface3); }
    .field input::placeholder { color: var(--muted); }

    .btn-primary {
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      background: linear-gradient(180deg, rgba(216,167,114,0.16), rgba(216,167,114,0.09));
      border: 1px solid rgba(216,167,114,0.32); border-radius: 12px;
      padding: 0.95rem; color: var(--accent2); font-family: var(--mono);
      font-size: 0.74rem; letter-spacing: 0.16em; cursor: pointer; text-transform: lowercase;
      transition: background 0.25s, transform 0.2s var(--ease), box-shadow 0.25s;
      box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset;
    }
    .btn-primary:hover { background: linear-gradient(180deg, rgba(216,167,114,0.24), rgba(216,167,114,0.14)); transform: translateY(-2px); box-shadow: 0 10px 26px -14px rgba(216,167,114,0.5), 0 1px 0 rgba(255,255,255,0.08) inset; }
    .btn-primary:active { transform: translateY(0); }
    .btn-arrow { transition: transform 0.25s var(--ease); }
    .btn-primary:hover .btn-arrow { transform: translateX(4px); }

    .error-box {
      font-size: 0.62rem; color: var(--red); letter-spacing: 0.04em; line-height: 1.5;
      padding: 0.7rem 0.85rem; background: rgba(232,123,120,0.07);
      border: 1px solid rgba(232,123,120,0.2); border-radius: 10px; text-align: center;
      animation: shake 0.4s var(--ease);
    }

    .recent-searches { display: flex; flex-direction: column; gap: 0.6rem; }
    .recent-label { font-size: 0.54rem; letter-spacing: 0.22em; color: var(--muted); text-transform: lowercase; }
    .recent-chips { display: flex; flex-wrap: wrap; gap: 0.45rem; }
    .recent-chip {
      background: var(--surface2); border: 1px solid var(--border2); border-radius: 9px;
      padding: 0.34rem 0.7rem; color: var(--muted3); font-family: var(--mono); font-size: 0.64rem;
      letter-spacing: 0.04em; cursor: pointer; text-transform: lowercase;
      transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.2s;
    }
    .recent-chip:hover { color: var(--accent2); border-color: rgba(216,167,114,0.4); background: rgba(216,167,114,0.06); transform: translateY(-1px); }

    .input-note { font-size: 0.54rem; letter-spacing: 0.07em; color: var(--muted); text-align: center; text-transform: lowercase; line-height: 1.8; }

    /* ════ LOADING ════ */
    .loading-wrap { display: flex; flex-direction: column; align-items: center; gap: 1.6rem; animation: fadeUp 0.5s var(--ease) both; width: 100%; max-width: 300px; }
    .loading-eq { display: flex; align-items: flex-end; gap: 5px; height: 46px; }
    .loading-eq span { width: 5px; border-radius: 3px; background: linear-gradient(180deg, var(--accent2), var(--accent)); animation: eq-tall 1.05s ease infinite; }
    .loading-eq span:nth-child(1){ animation-delay: 0s; }
    .loading-eq span:nth-child(2){ animation-delay: .14s; }
    .loading-eq span:nth-child(3){ animation-delay: .28s; }
    .loading-eq span:nth-child(4){ animation-delay: .42s; }
    .loading-eq span:nth-child(5){ animation-delay: .56s; }
    .loading-eq span:nth-child(6){ animation-delay: .70s; }
    .loading-eq span:nth-child(7){ animation-delay: .84s; }
    .loading-text { text-align: center; display: flex; flex-direction: column; gap: 0.5rem; }
    .loading-label { font-family: var(--serif); font-size: 1.15rem; font-weight: 300; color: var(--text); letter-spacing: 0; }
    .loading-sub { font-size: 0.56rem; letter-spacing: 0.12em; color: var(--muted2); text-transform: lowercase; min-height: 0.9em; line-height: 1.6; }
    .loading-track { width: 100%; height: 3px; background: var(--border2); border-radius: 3px; overflow: hidden; }
    .loading-track-fill { height: 100%; width: 40%; border-radius: 3px; background: linear-gradient(90deg, transparent, var(--accent), transparent); animation: indeterminate 1.4s ease infinite; }

    /* ════ RESULTS — bento grid ════ */
    .results-card { width: 100%; max-width: 1040px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; align-items: stretch; }
    .cell-full { grid-column: 1 / -1; }
    .reveal { animation: fadeUp 0.6s var(--ease) both; }
    .card-pad { padding: 1.2rem 1.4rem; display: flex; flex-direction: column; gap: 1rem; }
    .badge-loading { display: inline-flex; align-items: center; gap: 0.45rem; font-size: 0.58rem; letter-spacing: 0.1em; color: var(--muted2); text-transform: lowercase; }
    .badge-loading .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease infinite; }

    /* hero banner */
    .hero { position: relative; display: flex; align-items: center; gap: 1.2rem 1.9rem; padding: 1.4rem 1.7rem; flex-wrap: wrap; overflow: hidden; }
    .hero::after { content: ''; position: absolute; right: -8%; top: -120%; width: 46%; height: 340%; background: radial-gradient(ellipse at center, rgba(216,167,114,0.08), transparent 70%); pointer-events: none; }
    .hero-id { flex: 1 1 240px; display: flex; align-items: center; gap: 1.1rem; min-width: 0; }
    .hero-avatar { width: 62px; height: 62px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(216,167,114,0.3); flex-shrink: 0; box-shadow: 0 0 0 4px rgba(216,167,114,0.06); }
    .hero-avatar-ph { width: 62px; height: 62px; border-radius: 50%; background: var(--surface3); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 1.5rem; flex-shrink: 0; }
    .hero-info { min-width: 0; }
    .hero-name { font-family: var(--serif); font-size: 1.95rem; font-weight: 300; color: var(--text); line-height: 1.02; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hero-meta { font-size: 0.58rem; color: var(--muted2); letter-spacing: 0.06em; margin-top: 0.35rem; }
    .hero-meta a { color: var(--accent); text-decoration: none; }
    .hero-meta a:hover { text-decoration: underline; }
    .hero-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.6rem; }
    .tag { display: inline-flex; align-items: center; gap: 0.32rem; border-radius: 20px; padding: 0.22rem 0.62rem; font-family: var(--mono); font-size: 0.55rem; letter-spacing: 0.07em; text-transform: lowercase; cursor: help; user-select: none; -webkit-tap-highlight-color: transparent; transition: background 0.2s, border-color 0.2s; background: rgba(216,167,114,0.08); border: 1px solid rgba(216,167,114,0.22); color: var(--accent2); max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tag:hover { background: rgba(216,167,114,0.16); border-color: rgba(216,167,114,0.4); }
    .tag .tag-emoji { font-size: 0.72rem; }
    .tag.purple { background: rgba(157,137,214,0.1); border-color: rgba(157,137,214,0.28); color: #c4b8f0; }
    .tag.purple:hover { background: rgba(157,137,214,0.18); border-color: rgba(157,137,214,0.45); }
    .tag.red { background: rgba(232,123,120,0.1); border-color: rgba(232,123,120,0.28); color: #f0a3a1; }
    .tag.red:hover { background: rgba(232,123,120,0.18); border-color: rgba(232,123,120,0.45); }
    .tag.green { background: rgba(130,215,164,0.1); border-color: rgba(130,215,164,0.28); color: #9fe0bb; }
    .tag.green:hover { background: rgba(130,215,164,0.18); border-color: rgba(130,215,164,0.45); }
    .tag-pop { position: fixed; max-width: 230px; background: rgba(11,10,8,0.98); border: 1px solid var(--border2); border-radius: 9px; padding: 0.5rem 0.7rem; font-family: var(--mono); font-size: 0.58rem; line-height: 1.55; color: var(--text); letter-spacing: 0.03em; text-transform: none; pointer-events: none; z-index: 300; opacity: 0; transition: opacity 0.12s; box-shadow: 0 6px 24px rgba(0,0,0,0.6); }
    .genre-row { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.6rem; }
    .genre-chip { font-family: var(--mono); font-size: 0.55rem; letter-spacing: 0.07em; text-transform: lowercase; color: var(--muted3); background: rgba(255,255,255,0.03); border: 1px solid var(--border2); border-radius: 20px; padding: 0.2rem 0.6rem; }
    .genre-chip.ontour { color: var(--green); background: rgba(130,215,164,0.1); border-color: rgba(130,215,164,0.28); }
    .bio-card { padding: 1.2rem 1.4rem; }
    .bio-text { font-size: 0.68rem; color: var(--muted3); line-height: 1.75; letter-spacing: 0.01em; margin-top: 0.6rem; }
    .bio-text a { color: var(--accent); text-decoration: none; }
    .similar-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.6rem; }
    .similar-chip { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.04em; color: var(--accent2); background: rgba(216,167,114,0.08); border: 1px solid rgba(216,167,114,0.22); border-radius: 9px; padding: 0.45rem 0.7rem; cursor: pointer; transition: background 0.2s, border-color 0.2s, transform 0.15s; }
    .similar-chip:hover { background: rgba(216,167,114,0.16); border-color: rgba(216,167,114,0.4); transform: translateY(-1px); }
    .th-actions { display: flex; align-items: center; gap: 0.45rem; }
    .sort-toggle { display: inline-flex; gap: 0.12rem; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 0.14rem; }
    .sort-opt { background: none; border: none; border-radius: 6px; padding: 0.28rem 0.5rem; font-family: var(--mono); font-size: 0.5rem; letter-spacing: 0.06em; color: var(--muted2); cursor: pointer; text-transform: lowercase; transition: color 0.2s, background 0.2s; }
    .sort-opt:hover { color: var(--text); }
    .sort-opt.active { color: var(--accent2); background: rgba(216,167,114,0.12); }
    .view-all-btn { background: none; border: 1px solid var(--border2); border-radius: 8px; color: var(--muted3); cursor: pointer; padding: 0.32rem 0.55rem; font-family: var(--mono); font-size: 0.52rem; letter-spacing: 0.05em; text-transform: lowercase; white-space: nowrap; transition: color 0.2s, border-color 0.2s; }
    .view-all-btn:hover { color: var(--accent2); border-color: rgba(216,167,114,0.35); }
    .fs-overlay { position: fixed; inset: 0; z-index: 400; background: rgba(11,10,8,0.82); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; padding: 4vh 3vw; }
    .fs-overlay.open { display: flex; animation: fadeUp 0.2s var(--ease); }
    .fs-panel { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; width: 100%; max-width: 620px; max-height: 92vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
    .fs-head { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 1.05rem 1.3rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .fs-title { font-family: var(--serif); font-size: 1.15rem; color: var(--text); }
    .fs-sub { font-size: 0.53rem; color: var(--muted2); letter-spacing: 0.08em; text-transform: lowercase; margin-top: 0.25rem; }
    .fs-close { background: none; border: 1px solid var(--border2); border-radius: 8px; color: var(--muted2); cursor: pointer; padding: 0.42rem 0.7rem; font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.05em; text-transform: lowercase; white-space: nowrap; transition: color 0.2s, border-color 0.2s; }
    .fs-close:hover { color: var(--text); border-color: var(--muted2); }
    .fs-body { overflow-y: auto; padding: 0.5rem 0.8rem 0.9rem; }
    .hero-stats { display: flex; align-items: center; position: relative; z-index: 1; }
    .hero-stat { padding: 0.15rem 1.5rem; display: flex; flex-direction: column; gap: 0.32rem; text-align: right; border-left: 1px solid var(--border); }
    .hero-stat:first-child { border-left: none; }
    .hero-stat-num { font-family: var(--serif); font-weight: 300; font-size: 1.2rem; color: var(--text); line-height: 1; font-variant-numeric: tabular-nums; }
    .hero-stat.big .hero-stat-num { font-size: 2.7rem; font-weight: 200; color: var(--accent2); letter-spacing: -0.02em; }
    .hero-stat.big .hero-stat-num.pending { color: var(--muted2); animation: pulse 1.8s ease infinite; }
    .hero-stat-lbl { font-size: 0.5rem; letter-spacing: 0.13em; color: var(--muted2); text-transform: lowercase; line-height: 1.4; }
    .back-btn {
      background: var(--surface2); border: 1px solid var(--border2); border-radius: 9px;
      padding: 0.5rem 0.85rem; color: var(--muted2); font-family: var(--mono);
      font-size: 0.58rem; letter-spacing: 0.1em; cursor: pointer; flex-shrink: 0;
      transition: color 0.2s, border-color 0.2s, transform 0.2s; align-self: center;
    }
    .back-btn:hover { color: var(--text); border-color: var(--muted2); transform: translateX(-2px); }

    /* ── insights strip ── */
    .insights-strip { padding: 1.2rem 1.4rem; display: flex; flex-direction: column; gap: 0.9rem; }
    .insights-grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 9px; }
    .insight { background: rgba(216,167,114,0.04); border: 1px solid var(--border2); border-radius: 12px; padding: 0.8rem 0.85rem; display: flex; flex-direction: column; gap: 0.3rem; }
    .insight-val { font-family: var(--serif); font-size: 1.4rem; font-weight: 300; color: var(--text); line-height: 1; }
    .insight-val sub { font-size: 0.55em; color: var(--muted2); vertical-align: baseline; }
    .insight-label { font-size: 0.5rem; letter-spacing: 0.09em; color: var(--muted2); text-transform: lowercase; line-height: 1.4; }
    .sleep-insight { background: rgba(157,137,214,0.06); border: 1px solid rgba(157,137,214,0.24); border-radius: 12px; padding: 0.75rem 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .sleep-insight-top { display: flex; align-items: center; gap: 0.8rem; }
    .sleep-insight .moon { font-size: 1.4rem; }
    .sleep-txt { display: flex; flex-direction: column; gap: 0.2rem; }
    .sleep-txt .insight-val { font-size: 1.1rem; }
    .sleep-range { display: flex; flex-direction: column; gap: 0.4rem; }
    .sleep-range-track { position: relative; height: 6px; margin: 0.5rem 8px; border-radius: 3px; background: rgba(157,137,214,0.15); }
    .sleep-range-fill { position: absolute; top: 0; height: 100%; border-radius: 3px; background: rgba(157,137,214,0.55); }
    .sleep-range input[type=range] { position: absolute; top: 50%; left: -8px; width: calc(100% + 16px); height: 6px; margin: 0; padding: 0; background: none; pointer-events: none; -webkit-appearance: none; appearance: none; transform: translateY(-50%); }
    .sleep-range input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; pointer-events: auto; width: 16px; height: 16px; border-radius: 50%; background: #c4b8f0; border: 2px solid var(--bg); box-shadow: 0 1px 4px rgba(0,0,0,0.4); cursor: pointer; }
    .sleep-range input[type=range]::-moz-range-thumb { pointer-events: auto; width: 16px; height: 16px; border-radius: 50%; background: #c4b8f0; border: 2px solid var(--bg); box-shadow: 0 1px 4px rgba(0,0,0,0.4); cursor: pointer; }
    .sleep-range input[type=range]::-moz-range-track { background: none; }
    .sleep-range-scale { display: flex; justify-content: space-between; font-size: 0.5rem; letter-spacing: 0.08em; color: var(--muted2); text-transform: lowercase; padding: 0 2px; }

    /* ── ban gauge ── */
    .ban-card { padding: 1.2rem 1.4rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .ban-body { display: flex; align-items: center; gap: 1.4rem; flex-wrap: wrap; }
    .gauge { position: relative; width: 168px; height: 96px; flex-shrink: 0; margin: 0 auto; }
    .gauge svg { width: 168px; height: 96px; display: block; overflow: visible; }
    .gauge-track { fill: none; stroke: var(--border2); stroke-width: 11; stroke-linecap: round; }
    .gauge-fill { fill: none; stroke-width: 11; stroke-linecap: round; transition: stroke-dasharray 1s var(--ease); filter: drop-shadow(0 0 6px rgba(216,167,114,0.35)); }
    .gauge-center { position: absolute; left: 0; right: 0; bottom: 2px; display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
    .gauge-pct { font-family: var(--serif); font-size: 2rem; font-weight: 200; line-height: 0.9; letter-spacing: -0.02em; }
    .gauge-status { font-size: 0.54rem; letter-spacing: 0.14em; padding: 0.2rem 0.6rem; border-radius: 6px; text-transform: lowercase; }
    .gauge-status.safe    { color: var(--green);  background: rgba(130,215,164,0.1); border: 1px solid rgba(130,215,164,0.22); }
    .gauge-status.caution { color: var(--accent2); background: rgba(216,167,114,0.1); border: 1px solid rgba(216,167,114,0.24); }
    .gauge-status.danger  { color: var(--red);    background: rgba(232,123,120,0.1); border: 1px solid rgba(232,123,120,0.26); }

    .ban-details { flex: 1; min-width: 160px; display: flex; flex-direction: column; gap: 0.6rem; }
    .ban-row { display: flex; align-items: baseline; justify-content: space-between; gap: 0.8rem; padding-bottom: 0.55rem; border-bottom: 1px solid var(--border); }
    .ban-row:last-of-type { border-bottom: none; padding-bottom: 0; }
    .ban-row-lbl { font-size: 0.56rem; letter-spacing: 0.08em; color: var(--muted2); text-transform: lowercase; }
    .ban-row-val { font-size: 0.66rem; letter-spacing: 0.03em; color: var(--text); font-family: var(--serif); font-weight: 400; text-align: right; }
    .ban-foot { font-size: 0.5rem; color: var(--muted); letter-spacing: 0.06em; line-height: 1.6; margin-top: 0.1rem; }

    /* ── manual scrobbles ── */
    .ms-card { padding: 1.2rem 1.4rem; }
    .ms-status { font-size: 0.58rem; letter-spacing: 0.1em; padding: 0.24rem 0.6rem; border-radius: 6px; text-transform: lowercase; }
    .ms-status.safe { color: var(--green); background: rgba(130,215,164,0.1); border: 1px solid rgba(130,215,164,0.22); }
    .ms-status.flag { color: var(--accent2); background: rgba(216,167,114,0.1); border: 1px solid rgba(216,167,114,0.24); }
    .ms-list { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0 1.4rem; }
    .ms-item { padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
    .ms-track { font-size: 0.74rem; color: var(--text); }
    .ms-track span { color: var(--muted2); }
    .ms-detail { font-size: 0.57rem; color: var(--muted2); letter-spacing: 0.02em; margin-top: 0.18rem; line-height: 1.5; }
    .ms-note { font-size: 0.54rem; color: var(--muted); letter-spacing: 0.04em; line-height: 1.7; margin-top: 0.7rem; padding-top: 0.55rem; border-top: 1px solid var(--border); }

    .streaks-card { padding: 1.2rem 1.4rem; }
    .strict-toggle { display: inline-flex; align-items: center; gap: 0.42rem; background: none; border: 1px solid var(--border2); border-radius: 20px; padding: 0.3rem 0.7rem; font-family: var(--mono); font-size: 0.56rem; letter-spacing: 0.1em; color: var(--muted2); cursor: pointer; text-transform: lowercase; transition: color 0.2s, background 0.2s, border-color 0.2s; }
    .strict-toggle:hover { color: var(--text); }
    .strict-toggle .strict-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.2s, box-shadow 0.2s; }
    .strict-toggle.on { color: var(--accent2); border-color: rgba(216,167,114,0.35); background: rgba(216,167,114,0.08); }
    .strict-toggle.on .strict-dot { background: var(--accent2); box-shadow: 0 0 6px rgba(216,167,114,0.6); }
    .strict-note { font-size: 0.54rem; color: var(--muted); letter-spacing: 0.04em; line-height: 1.6; margin: 0.5rem 0 0.9rem; }
    .streak-list { display: flex; flex-direction: column; gap: 0.1rem; }
    .streak-row { display: flex; align-items: center; gap: 0.8rem; padding: 0.6rem 0.4rem; border-radius: 11px; transition: background 0.2s; }
    .streak-row:hover { background: rgba(255,255,255,0.026); }
    .streak-rank { font-family: var(--serif); font-size: 1.3rem; font-weight: 200; color: var(--muted); width: 1.5rem; text-align: right; flex-shrink: 0; line-height: 1; }
    .streak-art { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
    .streak-art-ph { width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted2); font-size: 0.9rem; }
    .streak-body { flex: 1; min-width: 0; }
    .streak-top { display: flex; align-items: baseline; justify-content: space-between; gap: 0.6rem; }
    .streak-artist { font-size: 0.8rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .streak-count { font-family: var(--serif); font-size: 0.98rem; color: var(--muted3); flex-shrink: 0; white-space: nowrap; }
    .streak-count.hot { color: var(--accent2); }
    .streak-track { font-size: 0.6rem; color: var(--muted2); margin-top: 0.14rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .streak-bar-wrap { height: 3px; background: var(--border); border-radius: 3px; margin-top: 0.4rem; overflow: hidden; }
    .streak-bar { height: 100%; width: 0; border-radius: 3px; background: linear-gradient(90deg, var(--purple), #c4b8f0); transition: width 0.9s var(--ease); }
    .streak-when { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.02em; margin-top: 0.3rem; }
    .streak-moon { color: var(--purple); }

    /* ── tabs ── */
    .tabs-card { padding: 0.4rem 0.5rem 0.5rem; }
    .tabs-header { display: flex; gap: 0.2rem; padding: 0.5rem 0.4rem 0.2rem; }
    .tab-btn {
      flex: 1; background: none; border: 1px solid transparent; border-radius: 10px;
      padding: 0.55rem 0.5rem; font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.1em;
      color: var(--muted2); cursor: pointer; text-transform: lowercase; transition: color 0.2s, background 0.2s, border-color 0.2s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent2); background: rgba(216,167,114,0.08); border-color: rgba(216,167,114,0.18); }
    .tab-content { display: none; padding: 0.3rem 0.1rem 0.1rem; }
    .tab-content.active { display: block; animation: fadeUp 0.3s var(--ease); }

    .list-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.62rem 0.7rem; border-radius: 11px; transition: background 0.2s; }
    .list-item:hover { background: rgba(255,255,255,0.026); }
    .artist-rank { font-family: var(--serif); font-size: 1.5rem; font-weight: 200; color: var(--muted); width: 40px; text-align: right; flex-shrink: 0; letter-spacing: -0.02em; line-height: 1; }
    .list-img { width: 38px; height: 38px; border-radius: 7px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
    .list-img-ph { width: 38px; height: 38px; border-radius: 7px; background: var(--surface2); border: 1px solid var(--border); flex-shrink: 0; }
    .list-rank { font-size: 0.58rem; color: var(--muted); width: 1.2rem; text-align: right; flex-shrink: 0; }
    .list-body { flex: 1; min-width: 0; }
    .list-name { font-size: 0.78rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-sub { font-size: 0.6rem; color: var(--muted2); margin-top: 0.12rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-name-link { text-decoration: none; color: inherit; transition: color 0.15s; }
    .list-name-link:hover { color: var(--accent2); }
    .bar-wrap { height: 3px; background: var(--border); border-radius: 3px; margin-top: 0.45rem; overflow: hidden; }
    .bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; width: 0; transition: width 0.9s var(--ease); }
    .list-count { font-size: 0.62rem; color: var(--muted2); flex-shrink: 0; font-family: var(--serif); }

    /* ── recently played ── */
    .recent-card { padding: 0; overflow: hidden; }
    .recent-head { padding: 1rem 1.3rem 0.85rem; }
    .recent-row { display: flex; align-items: center; gap: 0.85rem; padding: 0.65rem 1.3rem; border-top: 1px solid var(--border); transition: background 0.15s; position: relative; text-decoration: none; color: inherit; }
    .recent-row:hover { background: rgba(255,255,255,0.03); }
    .recent-row.is-now { background: rgba(216,167,114,0.05); }
    .recent-art { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
    .recent-art-ph { width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); }
    .recent-info { flex: 1; min-width: 0; }
    .recent-title { font-size: 0.76rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .recent-sub { font-size: 0.6rem; color: var(--muted2); margin-top: 0.14rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .recent-right { flex-shrink: 0; position: relative; min-width: 40px; text-align: right; }
    .recent-time { font-size: 0.58rem; color: var(--muted2); display: block; transition: opacity 0.15s; }
    .recent-open { position: absolute; right: 0; top: 50%; transform: translateY(-50%); opacity: 0; transition: opacity 0.15s; color: var(--accent2); font-size: 0.7rem; }
    .recent-row:hover .recent-time { opacity: 0; }
    .recent-row:hover .recent-open { opacity: 1; }
    .empty-note { font-size: 0.62rem; color: var(--muted2); letter-spacing: 0.04em; padding: 0.4rem 1.3rem 1.1rem; line-height: 1.6; }

    /* ── day chart ── */
    .day-chart { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; height: 132px; }
    .day-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; height: 100%; justify-content: flex-end; min-width: 0; }
    .day-bar-track { width: 100%; flex: 1; display: flex; align-items: flex-end; }
    .day-bar { width: 100%; border-radius: 7px 7px 3px 3px; background: linear-gradient(180deg, var(--accent2), var(--accent)); min-height: 3px; transition: height 0.85s var(--ease); }
    .day-bar.peak { background: linear-gradient(180deg, #f3ddbf, var(--accent)); box-shadow: 0 0 14px rgba(216,167,114,0.4); }
    .day-bar-count { font-size: 0.56rem; color: var(--muted2); font-family: var(--serif); }
    .day-bar-label { font-size: 0.54rem; letter-spacing: 0.06em; color: var(--muted); text-transform: lowercase; }
    .day-col.is-peak .day-bar-label { color: var(--accent2); }

    /* ── clock ── */
    .clock-wrap { display: flex; align-items: center; gap: 1.4rem; }
    .clock-svg { width: 184px; height: 184px; flex-shrink: 0; }
    .clock-center-num { font-family: var(--serif); font-size: 1.6rem; font-weight: 300; fill: var(--accent2); }
    .clock-center-sub { font-size: 0.5rem; letter-spacing: 0.14em; fill: var(--muted2); text-transform: lowercase; }
    .clock-tick-label { font-size: 0.46rem; fill: var(--muted); letter-spacing: 0.05em; }
    .clock-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem 1rem; flex: 1; min-width: 0; }
    .clock-legend-item { display: flex; align-items: center; gap: 0.6rem; }
    .clock-legend-swatch { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .clock-legend-txt { display: flex; flex-direction: column; gap: 0.1rem; }
    .clock-legend-val { font-size: 0.84rem; color: var(--text); font-family: var(--serif); }
    .clock-legend-label { font-size: 0.5rem; letter-spacing: 0.08em; color: var(--muted2); text-transform: lowercase; }

    /* ── heatmap (day × hour, weekly) ── */
    .heatmap-grid { display: grid; grid-template-columns: 34px repeat(24, minmax(0, 1fr)); gap: 3px; align-items: center; }
    .hm-corner { height: 13px; }
    .hm-col-label { font-size: 0.42rem; color: var(--muted); text-align: center; height: 13px; line-height: 13px; white-space: nowrap; }
    .hm-row-label { font-size: 0.56rem; color: var(--muted2); text-align: right; padding-right: 7px; text-transform: lowercase; letter-spacing: 0.04em; }
    .hm-cell { height: 22px; border-radius: 4px; background: rgba(216,167,114,var(--hm-a, 0)); transition: transform 0.12s; }
    .hm-cell:hover { transform: scale(1.18); }
    .hm-cell.hm-empty { background: var(--surface2); }
    .hm-cell.hm-sleep { background: rgba(157,137,214,var(--hm-a, 0)); }
    .hm-cell.hm-sleep.hm-empty { background: rgba(157,137,214,0.05); }
    .hm-legend { display: flex; gap: 1.1rem; flex-wrap: wrap; margin-top: 0.3rem; }
    .hm-legend-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.48rem; color: var(--muted2); letter-spacing: 0.06em; text-transform: lowercase; }
    .hm-legend-swatch { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }

    .eq { display: inline-flex; align-items: flex-end; gap: 2px; height: 15px; vertical-align: middle; }
    .eq-b { width: 3px; border-radius: 1.5px; background: var(--accent); animation: eq-anim 0.85s ease infinite; }
    .eq-b:nth-child(2) { animation-delay: 0.22s; }
    .eq-b:nth-child(3) { animation-delay: 0.44s; }

    .data-tip { position: fixed; background: rgba(11,10,8,0.97); border: 1px solid var(--border2); border-radius: 8px; padding: 0.32rem 0.7rem; font-family: var(--mono); font-size: 0.58rem; color: var(--text); letter-spacing: 0.04em; pointer-events: none; z-index: 300; opacity: 0; transition: opacity 0.1s; white-space: nowrap; box-shadow: 0 6px 24px rgba(0,0,0,0.6); }

    /* ── taskbar ── */
    .taskbar {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 100;
      display: flex; align-items: center; padding: 0 6px; height: 54px;
      background: rgba(21,17,13,0.8); backdrop-filter: blur(26px) saturate(180%); -webkit-backdrop-filter: blur(26px) saturate(180%);
      border: 1px solid rgba(216,167,114,0.16); border-radius: 19px;
      box-shadow: 0 10px 36px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.03) inset, 0 1px 0 rgba(255,255,255,0.06) inset;
      animation: dockSlideUp 0.8s 0.35s var(--ease) both;
    }
    .taskbar-section { display: flex; align-items: center; gap: 2px; padding: 0 8px; }
    .taskbar-divider { width: 1px; height: 26px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
    .taskbar-clock { padding: 0 10px; text-align: center; }
    .clock-time { font-size: 0.74rem; color: var(--accent); letter-spacing: 0.08em; line-height: 1; font-variant-numeric: tabular-nums; }
    .clock-date { font-size: 0.5rem; font-weight: 300; color: var(--muted2); letter-spacing: 0.12em; margin-top: 3px; text-transform: lowercase; }
    .dock-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 13px; border: none; background: transparent; cursor: pointer; position: relative; transition: transform 0.2s var(--ease), background 0.2s ease; text-decoration: none; }
    .dock-btn:hover { background: rgba(216,167,114,0.1); transform: translateY(-5px) scale(1.08); }
    .dock-btn svg { width: 17px; height: 17px; display: block; color: var(--accent); }
    .dock-btn.active::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 3px; height: 3px; border-radius: 50%; background: var(--accent); }
    .dock-btn .tooltip { position: absolute; bottom: calc(100% + 9px); left: 50%; transform: translateX(-50%) translateY(4px); background: rgba(21,17,13,0.96); border: 1px solid var(--border2); border-radius: 7px; padding: 3px 9px; font-size: 0.55rem; letter-spacing: 0.1em; color: var(--accent); white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s, transform 0.15s; }
    .dock-btn:hover .tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp { from { transform: translateY(16px); } to { transform: translateY(0); } }
    @keyframes dockSlideUp { from { opacity: 0; transform: translateX(-50%) translateY(22px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }
    @keyframes eq-anim { 0%, 100% { height: 3px; } 50% { height: 14px; } }
    @keyframes eq-tall { 0%, 100% { height: 8px; } 50% { height: 44px; } }
    @keyframes indeterminate { 0% { transform: translateX(-120%); } 100% { transform: translateX(370%); } }

    @media (max-width: 860px) {
      .results-card { grid-template-columns: 1fr; max-width: 560px; }
      .insights-grid { grid-template-columns: repeat(3, 1fr); }
      .ms-list { grid-template-columns: 1fr; }
    }
    @media (max-width: 540px) {
      .hero { gap: 1rem; }
      .hero-stats { width: 100%; justify-content: space-between; }
      .hero-stat { flex: 1; text-align: left; padding: 0.15rem 0; border-left: none; }
      .hero-stat + .hero-stat { border-left: 1px solid var(--border); padding-left: 0.9rem; }
      .insights-grid { grid-template-columns: repeat(2, 1fr); }
      .clock-wrap { flex-direction: column; gap: 1rem; }
      .clock-legend { width: 100%; }
      .back-btn { position: absolute; top: 1rem; right: 1.1rem; }
    }
  </style>
</head>
<body>

<div class="fx fx-grid"></div>
<div class="fx fx-glow"></div>
<div class="fx fx-vig"></div>

<div class="page" id="page-input">
  <div class="input-card">
    <div class="input-head">
      <div class="pulse-line"><span style="height:8px"></span><span style="height:14px"></span><span style="height:18px"></span><span style="height:11px"></span><span style="height:6px"></span></div>
      <span class="eyebrow">last.fm</span>
      <h1 class="display">listening <em>stats</em></h1>
      <p class="input-tagline" id="input-tagline">enter a username!</p>
    </div>

    <div class="mode-toggle" id="mode-toggle">
      <button class="mode-opt active" data-mode="user" onclick="setMode('user')">user</button>
      <button class="mode-opt" data-mode="artist" onclick="setMode('artist')">artist</button>
    </div>

    <div class="field">
      <label for="inp-user" id="field-label">username</label>
      <div class="field-wrap">
        <span class="field-at" id="field-at">@</span>
        <input id="inp-user" type="text" placeholder="welffi" autocomplete="off" spellcheck="false" />
      </div>
    </div>

    <div id="err-box" class="error-box" style="display:none"></div>

    <button class="btn-primary" id="btn-search"><span id="btn-text">look up stats</span><span class="btn-arrow">→</span></button>

    <div id="recent-searches"></div>
    <p class="input-note">profile must have recent tracks public! | i also can't up the rate limits so use wisely thank you</p>
  </div>
</div>

<div class="page hidden" id="page-loading">
  <div class="loading-wrap">
    <div class="loading-eq"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="loading-text">
      <p class="loading-label" id="loading-label">looking up user</p>
      <p class="loading-sub" id="loading-sub"></p>
    </div>
    <div class="loading-track"><div class="loading-track-fill"></div></div>
  </div>
</div>

<div class="page hidden" id="page-results">
  <div class="results-card" id="results-card"></div>
</div>

<div class="fs-overlay" id="fs-overlay" onclick="if(event.target===this)closeFs()">
  <div class="fs-panel">
    <div class="fs-head">
      <div class="fs-head-txt">
        <div class="fs-title" id="fs-title"></div>
        <div class="fs-sub" id="fs-sub"></div>
      </div>
      <button class="fs-close" onclick="closeFs()">close ✕</button>
    </div>
    <div class="fs-body" id="fs-body"></div>
  </div>
</div>

<div class="taskbar">
  <div class="taskbar-section">
    <div class="taskbar-clock">
      <div class="clock-time" id="clock-time">--:--</div>
      <div class="clock-date" id="clock-date">--- --</div>
    </div>
  </div>
  <div class="taskbar-divider"></div>
  <div class="taskbar-section">
    <a class="dock-btn" href="./" title="home">
      <span class="tooltip">home</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    </a>
    <a class="dock-btn" href="cropper.html" title="crop image">
      <span class="tooltip">crop image</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </a>
    <a class="dock-btn active" href="lastfm.html" title="last.fm">
      <span class="tooltip">last.fm</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
    </a>
  </div>
</div>

<script>
(function () {
  const API_KEY = '44e2c647de30a1be4df7679e7041e36f';
    const API_BASE = 'https://ws.audioscrobbler.com/2.0/';
    const $ = id => document.getElementById(id);
    // run on next frame when visible; finalize immediately when backgrounded (rAF is paused while hidden)
    const settle = (cb) => { if (document.hidden) cb(); else requestAnimationFrame(cb); };

    let sleepStart = 1, sleepEnd = 6;
    let _lastWeek = null;
    const isSleepHour = h => h >= sleepStart && h <= sleepEnd;

    let strictStreaks = false;
    let _streaks = { all: null, dur: null };
    let _profile = null;
    let _artist = null;
    let artistSort = 'listeners';

    // ── Clock ──
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      const s = String(now.getSeconds()).padStart(2,'0');
      const t = $('clock-time'); if (t) t.textContent = `${h}:${m}:${s}`;
      const days = ['sun','mon','tue','wed','thu','fri','sat'];
      const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
      const d = $('clock-date');
      if (d) d.textContent = `${days[now.getDay()]} · ${months[now.getMonth()]} ${String(now.getDate()).padStart(2,'0')}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── Tooltip ──
    const _tip = document.createElement('div');
    _tip.className = 'data-tip';
    document.body.appendChild(_tip);
    const showTip = (e, text) => { _tip.textContent = text; _tip.style.opacity = '1'; moveTip(e); };
    const moveTip = (e) => { _tip.style.left = (e.clientX + 14) + 'px'; _tip.style.top = (e.clientY - 40) + 'px'; };
    const hideTip = () => { _tip.style.opacity = '0'; };
    window.showTip = showTip; window.moveTip = moveTip; window.hideTip = hideTip;

    const _tagPop = document.createElement('div');
    _tagPop.className = 'tag-pop';
    document.body.appendChild(_tagPop);
    let _tagEl = null;
    const showTagPop = (el) => {
      _tagPop.textContent = el.dataset.tip || '';
      _tagPop.style.opacity = '1';
      const r = el.getBoundingClientRect();
      const pw = _tagPop.offsetWidth, ph = _tagPop.offsetHeight;
      let left = Math.max(8, Math.min(r.left + r.width / 2 - pw / 2, window.innerWidth - pw - 8));
      let top = r.top - ph - 8;
      if (top < 8) top = r.bottom + 8;
      _tagPop.style.left = left + 'px';
      _tagPop.style.top = top + 'px';
      _tagEl = el;
    };
    const hideTagPop = () => { _tagPop.style.opacity = '0'; _tagEl = null; };
    window.tagOver = (el) => showTagPop(el);
    window.tagOut = () => hideTagPop();
    window.tagTap = (el, ev) => { ev.stopPropagation(); if (_tagEl === el) hideTagPop(); else showTagPop(el); };
    document.addEventListener('click', hideTagPop);
    window.addEventListener('scroll', hideTagPop, true);

    const _fmtH = h => { const ap = h < 12 ? 'am' : 'pm'; const hr = h % 12 || 12; return `${hr}${ap}`; };
    window.onSleepRange = function () {
      const sEl = $('sleep-start'), eEl = $('sleep-end');
      if (!sEl || !eEl) return;
      sleepStart = Math.min(+sEl.value, +eEl.value);
      sleepEnd = Math.max(+sEl.value, +eEl.value);
      const fill = $('sleep-fill');
      if (fill) { fill.style.left = (sleepStart / 23) * 100 + '%'; fill.style.width = ((sleepEnd - sleepStart) / 23) * 100 + '%'; }
      if (_lastWeek) {
        let sc = 0;
        _lastWeek.forEach(t => { if (isSleepHour(new Date(parseInt(t.date.uts) * 1000).getHours())) sc++; });
        const total = _lastWeek.length;
        const pct = total > 0 ? Math.round((sc / total) * 100) : 0;
        const cEl = $('sleep-count'), lEl = $('sleep-label');
        if (cEl) cEl.textContent = `${fmt(sc)} sleep scrobbles`;
        if (lEl) lEl.textContent = `${pct}% of the week · ${_fmtH(sleepStart)}–${_fmtH(sleepEnd)}`;
      }
    };
    window.onSleepCommit = function () {
      window.onSleepRange();
      if (_lastWeek) renderPatterns(_lastWeek);
    };

    // ── count-up ──
    function countUp(el, target, opts = {}) {
      if (!el) return;
      const dur = opts.dur || 950, dec = opts.dec ?? 0, suffix = opts.suffix || '';
      const finalText = (Number.isInteger(target) ? target : target.toFixed(dec)) + suffix;
      if (document.hidden) { el.textContent = finalText; return; }
      const start = performance.now();
      function tick(t) {
        const p = Math.min((t - start) / dur, 1);
        const e = 1 - Math.pow(1 - p, 3);
        el.textContent = (target * e).toFixed(dec) + suffix;
        if (p < 1) requestAnimationFrame(tick);
        else el.textContent = finalText;
      }
      requestAnimationFrame(tick);
    }

    // ── Persistence & recents ──
    const inpUser = $('inp-user');
    let searchMode = localStorage.getItem('lfm_mode') === 'artist' ? 'artist' : 'user';
    const _params = new URLSearchParams(location.search);
    const _paramUser = _params.get('user');
    const _paramArtist = _params.get('artist');
    if (_paramArtist) { searchMode = 'artist'; inpUser.value = _paramArtist; }
    else if (_paramUser) { searchMode = 'user'; inpUser.value = _paramUser; }
    else inpUser.value = localStorage.getItem('lfm_user') || '';

    const recentsKey = () => searchMode === 'artist' ? 'lfm_recents_artist' : 'lfm_recents';
    const getRecents = () => JSON.parse(localStorage.getItem(recentsKey()) || '[]');
    function saveRecent(name) {
      const list = [name, ...getRecents().filter(u => u !== name)].slice(0, 6);
      localStorage.setItem(recentsKey(), JSON.stringify(list));
    }
    function renderRecents() {
      const list = getRecents();
      const el = $('recent-searches');
      if (!el) return;
      if (!list.length) { el.innerHTML = ''; return; }
      el.className = 'recent-searches';
      el.innerHTML = `
        <p class="recent-label">recent</p>
        <div class="recent-chips">
          ${list.map(u => `<button class="recent-chip" onclick="quickSearch('${u.replace(/'/g,"\\'")}')">${u}</button>`).join('')}
        </div>`;
    }
    window.quickSearch = (name) => { inpUser.value = name; handleSearch(); };

    const MODE_TEXT = {
      user:   { tagline: 'enter a username!', label: 'username', at: '@', ph: 'welffi', btn: 'look up stats' },
      artist: { tagline: 'enter an artist!', label: 'artist', at: '♪', ph: 'radiohead', btn: 'look up artist' },
    };
    function applyMode() {
      const t = MODE_TEXT[searchMode];
      $('input-tagline').textContent = t.tagline;
      $('field-label').textContent = t.label;
      $('field-at').textContent = t.at;
      inpUser.placeholder = t.ph;
      $('btn-text').textContent = t.btn;
      document.querySelectorAll('.mode-opt').forEach(b => b.classList.toggle('active', b.dataset.mode === searchMode));
      renderRecents();
    }
    window.setMode = (m) => {
      if (m !== 'user' && m !== 'artist') return;
      searchMode = m;
      localStorage.setItem('lfm_mode', m);
      hideErr();
      applyMode();
      inpUser.focus();
    };
    applyMode();

    // ── Pages ──
    function show(id) {
      ['page-input','page-loading','page-results'].forEach(p =>
        $(p).classList.toggle('hidden', p !== id)
      );
      if (id === 'page-input') history.replaceState(null, '', location.pathname);
    }
    window.show = show;
    function showErr(msg) { const b = $('err-box'); b.textContent = msg; b.style.display = 'block'; }
    function hideErr() { $('err-box').style.display = 'none'; }

    async function handleSearch() {
      const q = inpUser.value.trim();
      hideErr();
      if (!q) { showErr(searchMode === 'artist' ? 'please enter an artist' : 'please enter a username'); return; }
      saveRecent(q);
      renderRecents();
      if (searchMode === 'artist') {
        history.replaceState(null, '', `?artist=${encodeURIComponent(q)}`);
        loadArtist(q);
      } else {
        localStorage.setItem('lfm_user', q);
        history.replaceState(null, '', `?user=${encodeURIComponent(q)}`);
        loadStats(q);
      }
    }
    $('btn-search').addEventListener('click', handleSearch);
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !$('page-input').classList.contains('hidden')) handleSearch();
      if (e.key === 'Escape') { const o = $('fs-overlay'); if (o && o.classList.contains('open')) o.classList.remove('open'); }
    });

    // ── API ──
    async function lfm(method, apiKey, params = {}) {
      const url = new URL(API_BASE);
      url.searchParams.set('method', method);
      url.searchParams.set('api_key', apiKey);
      url.searchParams.set('format', 'json');
      for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
      const r = await fetch(url);
      if (!r.ok) {
        if (r.status === 403) throw new Error('access denied — this profile may be private or suspended (403)');
        if (r.status === 429) throw new Error('rate limited — too many requests, try again in a moment (429)');
        if (r.status === 404) throw new Error('not found (404)');
        throw new Error(`network error (${r.status})`);
      }
      const d = await r.json();
      if (d.error) throw new Error(d.message);
      return d;
    }

    // ── Helpers ──
    const fmt = n => parseInt(n).toLocaleString();
    function timeAgo(uts) {
      const diff = Math.floor(Date.now() / 1000) - parseInt(uts);
      if (diff < 60) return 'just now';
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return `${Math.floor(diff/86400)}d ago`;
    }
    function img(imgs, pref = 'medium') {
      if (!imgs) return null;
      const arr = Array.isArray(imgs) ? imgs : [imgs];
      return (arr.find(i => i.size === pref && i['#text']) || arr.find(i => i['#text']) || {})['#text'] || null;
    }
    const toArr = v => !v ? [] : (Array.isArray(v) ? v : [v]);
    const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    function listItem(rank, imgUrl, name, sub, count, pct, imgId = null) {
      const imgHtml = imgUrl === false
        ? ''
        : imgUrl
        ? `<img class="list-img" src="${imgUrl}" alt="" onerror="this.outerHTML='<div class=list-img-ph></div>'" />`
        : `<div class="list-img-ph"${imgId ? ` id="${imgId}"` : ''}></div>`;
      return `
        <div class="list-item">
          <span class="list-rank">${rank}</span>
          ${imgHtml}
          <div class="list-body">
            <div class="list-name">${esc(name)}</div>
            ${sub ? `<div class="list-sub">${esc(sub)}</div>` : ''}
            <div class="bar-wrap"><div class="bar" data-w="${pct}"></div></div>
          </div>
          <div class="list-count">${count}</div>
        </div>`;
    }
    function animateBars(root) {
      settle(() => {
        (root || document).querySelectorAll('.bar[data-w]').forEach(b => { b.style.width = b.dataset.w + '%'; });
      });
    }

    // ── Artist mode ──
    async function loadArtist(name) {
      show('page-loading');
      const setStatus = (lbl, sub = '') => {
        const l = $('loading-label'), s = $('loading-sub');
        if (l) l.textContent = lbl;
        if (s) s.textContent = sub;
      };

      setStatus('looking up artist', 'fetching info');
      let info;
      try {
        info = await lfm('artist.getInfo', API_KEY, { artist: name, autocorrect: 1 });
      } catch (e) {
        show('page-input'); showErr(e.message || 'artist not found'); return;
      }
      if (!info || !info.artist) { show('page-input'); showErr('artist not found'); return; }

      const realName = info.artist.name || name;
      setStatus('loading tracks & albums');
      const settled = await Promise.allSettled([
        lfm('artist.getTopTracks', API_KEY, { artist: realName, autocorrect: 1, limit: 1000 }),
        lfm('artist.getTopAlbums', API_KEY, { artist: realName, autocorrect: 1, limit: 12 }),
      ]);
      const ok = r => r.status === 'fulfilled' ? r.value : null;

      renderArtist({ info, topTracks: ok(settled[0]), topAlbums: ok(settled[1]) });
      show('page-results');
      animateBars($('results-card'));
    }

    window.searchArtist = (name) => { setMode('artist'); inpUser.value = name; handleSearch(); };

    const SORT_UNIT = k => k === 'playcount' ? 'plays' : 'listeners';
    const sortArtistTracks = (tracks) => {
      const key = artistSort === 'plays' ? 'playcount' : 'listeners';
      return tracks.slice().sort((x, y) => (parseInt(y[key]) || 0) - (parseInt(x[key]) || 0));
    };
    function artistTrackRow(t, rank, max) {
      const key = artistSort === 'plays' ? 'playcount' : 'listeners';
      const other = key === 'playcount' ? 'listeners' : 'playcount';
      return listItem(rank, false, t.name, `${fmt(t[other] || 0)} ${SORT_UNIT(other)}`,
        `${fmt(t[key] || 0)} ${SORT_UNIT(key)}`, Math.round(((parseInt(t[key]) || 0) / max) * 100));
    }

    window.setArtistSort = (s) => {
      if ((s !== 'plays' && s !== 'listeners') || s === artistSort) return;
      artistSort = s;
      if (_artist) renderArtist(_artist);
      if ($('fs-overlay')?.classList.contains('open')) fillArtistTracks();
    };
    window.openArtistTracks = () => { fillArtistTracks(); $('fs-overlay').classList.add('open'); };
    window.closeFs = () => $('fs-overlay').classList.remove('open');
    function fillArtistTracks() {
      if (!_artist) return;
      const key = artistSort === 'plays' ? 'playcount' : 'listeners';
      const sorted = sortArtistTracks(toArr(_artist.topTracks?.toptracks?.track));
      const max = sorted.length ? Math.max(...sorted.map(t => parseInt(t[key]) || 0), 1) : 1;
      $('fs-title').textContent = _artist.info.artist.name;
      $('fs-sub').textContent = `all tracks · by ${artistSort} · ${fmt(sorted.length)} shown`;
      $('fs-body').innerHTML = sorted.length
        ? sorted.map((t, i) => artistTrackRow(t, i + 1, max)).join('')
        : `<p class="empty-note">no track data.</p>`;
      animateBars($('fs-body'));
    }

    function renderArtist({ info, topTracks, topAlbums }) {
      _artist = { info, topTracks, topAlbums };
      const a = info.artist;
      const D = (n) => `style="animation-delay:${n}ms"`;
      const listeners = parseInt(a.stats?.listeners) || 0;
      const playcount = parseInt(a.stats?.playcount) || 0;
      const url = a.url || `https://www.last.fm/music/${encodeURIComponent(a.name)}`;
      const initial = (a.name || '?').trim()[0]?.toUpperCase() || '♪';

      const tags = toArr(a.tags?.tag).map(t => t.name).filter(Boolean).slice(0, 6);
      const ontour = a.ontour === '1';
      const genreRow = (tags.length || ontour) ? `<div class="genre-row">
        ${ontour ? `<span class="genre-chip ontour">● on tour</span>` : ''}
        ${tags.map(t => `<span class="genre-chip">${esc(t)}</span>`).join('')}
      </div>` : '';

      const albums = toArr(topAlbums?.topalbums?.album);
      const sortKey = artistSort === 'plays' ? 'playcount' : 'listeners';
      const sorted = sortArtistTracks(toArr(topTracks?.toptracks?.track));

      const topT = sorted.slice(0, 8);
      const maxT = topT.length ? Math.max(...topT.map(t => parseInt(t[sortKey]) || 0), 1) : 1;
      const topTracksHtml = topT.length
        ? topT.map((t, i) => artistTrackRow(t, i + 1, maxT)).join('')
        : `<p class="empty-note">no track data.</p>`;

      let deepCard = '';
      const MIN_BOTTOM_PLAYS = 1000;
      const listenable = sorted.filter(t => (parseInt(t.playcount) || 0) >= MIN_BOTTOM_PLAYS);
      if (listenable.length >= 20) {
        const deep = listenable.slice(-8).reverse();
        const maxD = Math.max(...deep.map(t => parseInt(t[sortKey]) || 0), 1);
        const deepHtml = deep.map((t, i) => artistTrackRow(t, listenable.length - i, maxD)).join('');
        deepCard = `<div class="card tabs-card reveal" ${D(200)}>
          <div class="section-head" style="padding:0.7rem 0.9rem 0.3rem"><span class="section-label">bottom tracks</span><span class="section-aside">least ${SORT_UNIT(sortKey)} · ${fmt(MIN_BOTTOM_PLAYS)}+ plays</span></div>
          <div class="tab-content active">${deepHtml}</div>
        </div>`;
      }

      const maxA = albums.length ? Math.max(...albums.map(al => parseInt(al.playcount) || 0), 1) : 1;
      const albumsHtml = albums.length ? albums.slice(0, 8).map((al, i) =>
        listItem(i + 1, false, al.name, null, `${fmt(al.playcount || 0)} plays`,
          Math.round(((parseInt(al.playcount) || 0) / maxA) * 100))
      ).join('') : `<p class="empty-note">no album data.</p>`;

      const similar = toArr(a.similar?.artist).map(s => s.name).filter(Boolean).slice(0, 8);
      const similarCard = similar.length ? `<div class="card bio-card cell-full reveal" ${D(320)}>
        <div class="section-head"><span class="section-label">similar artists</span><span class="section-aside">tap to explore</span></div>
        <div class="similar-row">${similar.map(s =>
          `<button class="similar-chip" onclick="searchArtist('${s.replace(/'/g, "\\'")}')">${esc(s)}</button>`).join('')}</div>
      </div>` : '';

      const bioRaw = (a.bio?.content || a.bio?.summary || '').replace(/<a [^>]*>Read more[^<]*<\/a>\.?/i, '').trim();
      const bioParas = bioRaw.split(/\n\s*\n/).map(p => p.trim().replace(/\n/g, ' ')).filter(Boolean);
      const bioCard = bioParas.length ? `<div class="card bio-card cell-full reveal" ${D(60)}>
        <div class="section-head"><span class="section-label">about</span></div>
        ${bioParas.map(p => `<p class="bio-text">${p}</p>`).join('')}
        <p class="bio-text"><a href="${url}" target="_blank" rel="noopener">read more on last.fm →</a></p>
      </div>` : '';

      $('results-card').innerHTML = `
        <div class="card hero cell-full reveal" ${D(0)}>
          <div class="hero-id">
            <div class="hero-avatar-ph">${esc(initial)}</div>
            <div class="hero-info">
              <div class="hero-name">${esc(a.name)}</div>
              <div class="hero-meta"><a href="${url}" target="_blank" rel="noopener">last.fm artist</a></div>
              ${genreRow}
            </div>
          </div>
          <div class="hero-stats">
            <div class="hero-stat big">
              <span class="hero-stat-num">${fmt(listeners)}</span>
              <span class="hero-stat-lbl">listeners</span>
            </div>
            <div class="hero-stat">
              <span class="hero-stat-num">${fmt(playcount)}</span>
              <span class="hero-stat-lbl">total<br>scrobbles</span>
            </div>
          </div>
          <button class="back-btn" onclick="show('page-input')">← back</button>
        </div>

        ${bioCard}

        <div class="card tabs-card reveal" ${D(120)}>
          <div class="section-head" style="padding:0.7rem 0.9rem 0.3rem">
            <span class="section-label">top tracks</span>
            <div class="th-actions">
              <div class="sort-toggle">
                <button class="sort-opt${artistSort === 'listeners' ? ' active' : ''}" onclick="setArtistSort('listeners')">listeners</button>
                <button class="sort-opt${artistSort === 'plays' ? ' active' : ''}" onclick="setArtistSort('plays')">plays</button>
              </div>
              <button class="view-all-btn" onclick="openArtistTracks()">view all →</button>
            </div>
          </div>
          <div class="tab-content active">${topTracksHtml}</div>
        </div>

        ${deepCard || `<div class="card tabs-card reveal" ${D(200)}>
          <div class="section-head" style="padding:0.7rem 0.9rem 0.3rem"><span class="section-label">top albums</span></div>
          <div class="tab-content active">${albumsHtml}</div>
        </div>`}

        ${deepCard ? `<div class="card tabs-card cell-full reveal" ${D(260)}>
          <div class="section-head" style="padding:0.7rem 0.9rem 0.3rem"><span class="section-label">top albums</span></div>
          <div class="tab-content active">${albumsHtml}</div>
        </div>` : ''}

        ${similarCard}
      `;
    }

    // ── Load & render ──
    async function loadStats(user) {
      show('page-loading');
      const setStatus = (lbl, sub = '') => {
        const l = $('loading-label'), s = $('loading-sub');
        if (l) l.textContent = lbl;
        if (s) s.textContent = sub;
      };

      const now = Math.floor(Date.now() / 1000);
      const weekAgo = now - 7 * 24 * 60 * 60;

      setStatus('looking up user', 'fetching profile');
      let info;
      try {
        info = await lfm('user.getInfo', API_KEY, { user });
      } catch(e) {
        show('page-input');
        showErr(e.message || 'user not found');
        return;
      }

      setStatus('loading! thank u for using');
      const settled = await Promise.allSettled([
        lfm('user.getRecentTracks', API_KEY, { user, from: weekAgo, to: now, limit: 1 }),
        lfm('user.getTopArtists',   API_KEY, { user, period: '7day', limit: 5 }),
        lfm('user.getTopTracks',    API_KEY, { user, period: '7day', limit: 5 }),
        lfm('user.getTopAlbums',    API_KEY, { user, period: '7day', limit: 5 }),
        lfm('user.getRecentTracks', API_KEY, { user, limit: 6 }),
      ]);
      const ok = r => r.status === 'fulfilled' ? r.value : null;

      renderResults({
        info, week: ok(settled[0]), topArtists: ok(settled[1]),
        topTracks: ok(settled[2]), topAlbums: ok(settled[3]), recent: ok(settled[4]),
      });
      show('page-results');

      runAnalysis(user).catch(e => {

          </div>

          ${trackRows  ? `<div class="tab-content${firstTab==='tracks' ?' active':''}" id="tab-tracks">${trackRows}</div>` : ''}
          ${albumRows  ? `<div class="tab-content${firstTab==='albums' ?' active':''}" id="tab-albums">${albumRows}</div>` : ''}
        </div>` : '';

      const recentCard = recentRows.length
        ? `<div class="card recent-card reveal" ${D(220)}><div class="recent-head"><span class="section-label">recently played</span></div>${recentRows}</div>`
        : (!recent ? `<div class="card recent-card reveal" ${D(220)}><div class="recent-head"><span class="section-label">recently played</span></div><p class="empty-note">this user's recent tracks are private 🔒</p></div>` : '');

      $('results-card').innerHTML = `
        <div class="card hero cell-full reveal" ${D(0)}>
          <div class="hero-id">
            ${avatarUrl ? `<img class="hero-avatar" src="${avatarUrl}" alt="${esc(u.name)}" onerror="this.outerHTML='<div class=hero-avatar-ph>♪</div>'" />` : `<div class="hero-avatar-ph">♪</div>`}
            <div class="hero-info">
              <div class="hero-name">${esc(u.name)}</div>
              <div class="hero-meta">${fmt(totalPlays)} scrobbles · ${memberYears}y on <a href="${profileUrl}" target="_blank" rel="noopener">last.fm</a><span id="profile-views"></span></div>
              <div class="hero-tags" id="hero-tags"></div>
            </div>
          </div>
          <div class="hero-stats">
            <div class="hero-stat big">
              <span class="hero-stat-num pending" id="hero-number">—</span>
              <span class="hero-stat-lbl" id="hero-unit">hours · this week</span>

            <div class="hero-stat">
              <span class="hero-stat-num">${weekTotal ? fmt(weekTotal) : '—'}</span>
              <span class="hero-stat-lbl">scrobbles<br>this week</span>

            <div class="hero-stat">
              <span class="hero-stat-num">${avgPerDay}</span>
              <span class="hero-stat-lbl">avg / day</span>

          <button class="back-btn" onclick="show('page-input')">← back</button>
        </div>

        <div class="card insights-strip cell-full reveal" id="insights-card" ${D(60)}>
          <div class="section-head"><span class="section-label">your week</span></div>

        <div class="card ban-card reveal" id="ban-card" ${D(120)}>
          <div class="section-head"><span class="section-label">ban risk</span></div>
          <span class="badge-loading"><span class="dot"></span>loading listening history…</span>

        <div class="card card-pad reveal" id="clock-card" ${D(150)}>
          <div class="section-head"><span class="section-label">by hour of day</span></div>

        ${tabsCard}
        ${recentCard}

        <div class="card card-pad cell-full reveal" id="daychart-card" ${D(250)}>
          <div class="section-head"><span class="section-label">scrobbles per day</span></div>

        <div class="card card-pad cell-full reveal" id="heatmap-card" ${D(290)}>
          <div class="section-head"><span class="section-label">activity heatmap</span></div>

        <div class="card streaks-card cell-full reveal" id="streaks-card" ${D(310)}>
          <div class="section-head"><span class="section-label">listening streaks</span></div>
          <span class="badge-loading"><span class="dot"></span>loading…</span>
        </div>

        <div class="card ms-card cell-full reveal" id="integrity-card" ${D(330)} style="opacity:0.75">
          <div class="section-head"><span class="section-label">manual scrobbles</span></div>
          <span class="badge-loading"><span class="dot"></span>loading…</span>

      `;

      animateBars($('results-card'));
      if (trackList.length) loadTrackImages(trackList);
