<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>last.fm stats · welffi</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/c7moPaj.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100;0,9..144,300;1,9..144,100;1,9..144,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0a0908;
      --surface:  #141210;
      --surface2: #1a1714;
      --border:   #241f1b;
      --border2:  #2e2821;
      --text:     #ede8e0;
      --muted:    #4e463c;
      --muted2:   #695e52;
      --accent:   #d4a574;
      --accent2:  #e8c49a;
      --red:      #e8726f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.032) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 40% at 50% -5%, rgba(212,165,116,0.09) 0%, transparent 65%),
        radial-gradient(ellipse 60% 30% at 50% 105%, rgba(180,130,80,0.05) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 7rem;
    }

    .hidden { display: none !important; }

    /* ── Input ── */
    .input-card {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .input-title { text-align: center; margin-bottom: 0.4rem; }
    .input-title h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.9rem;
      font-weight: 300;
      color: var(--text);
    }
    .input-title p {
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      color: var(--muted2);
      margin-top: 0.4rem;
      text-transform: lowercase;
    }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    .field label { font-size: 0.58rem; letter-spacing: 0.15em; color: var(--muted2); text-transform: lowercase; }

    .field input {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: rgba(212,165,116,0.4);
      box-shadow: 0 0 0 3px rgba(212,165,116,0.08);
    }
    .field input::placeholder { color: var(--muted); }

    .api-section { display: flex; flex-direction: column; gap: 0.5rem; }
    .api-hint { font-size: 0.54rem; color: var(--muted); letter-spacing: 0.08em; }
    .api-hint a { color: var(--accent2); text-decoration: none; }
    .api-hint a:hover { text-decoration: underline; }

    .btn-primary {
      background: rgba(212,165,116,0.1);
      border: 1px solid rgba(212,165,116,0.25);
      border-radius: 10px;
      padding: 0.8rem;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      text-transform: lowercase;
    }
    .btn-primary:hover { background: rgba(212,165,116,0.16); transform: translateY(-1px); }

    .toggle-link {
      text-align: center;
      font-size: 0.54rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .error-box {
      font-size: 0.6rem;
      color: var(--red);
      letter-spacing: 0.08em;
      padding: 0.6rem 0.8rem;
      background: rgba(232,114,111,0.07);
      border: 1px solid rgba(232,114,111,0.18);
      border-radius: 8px;
      text-align: center;
    }

    /* ── Loading ── */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      animation: fadeUp 0.4s ease both;
    }
    .spinner {
      width: 34px;
      height: 34px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-label { font-size: 0.6rem; letter-spacing: 0.18em; color: var(--muted2); text-transform: lowercase; }

    /* ── Results ── */
    .results-card {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.5s ease both;
    }
    .profile-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(212,165,116,0.22);
      flex-shrink: 0;
    }
    .profile-avatar-ph {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted2);
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; min-width: 0; }
    .profile-name {
      font-family: 'Fraunces', serif;
      font-size: 1.35rem;
      font-weight: 300;
      color: var(--text);
      line-height: 1;
    }
    .profile-meta { font-size: 0.56rem; color: var(--muted2); letter-spacing: 0.1em; margin-top: 0.3rem; }

    .back-btn {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      color: var(--muted2);
      font-family: 'DM Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .back-btn:hover { color: var(--text); border-color: var(--muted2); }

    /* Stat grid */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      animation: fadeUp 0.5s 0.05s ease both;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 0.8rem;
      text-align: center;
    }

    .stat-card.hero {
      grid-column: 1 / -1;
      background: rgba(212,165,116,0.04);
      border-color: rgba(212,165,116,0.18);
      padding: 1.8rem 1rem 1.4rem;
      position: relative;
      overflow: hidden;
    }
    .stat-card.hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(212,165,116,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-number {
      font-family: 'Fraunces', serif;
      font-size: 4rem;
      font-weight: 100;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .hero-unit {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--accent2);
      text-transform: lowercase;
      margin-top: 0.35rem;
    }
    .hero-sub {
      font-size: 0.53rem;
      letter-spacing: 0.1em;
      color: var(--muted2);
      margin-top: 0.7rem;
    }

    .stat-number {
      font-family: 'Fraunces', serif;
      font-size: 1.55rem;
      font-weight: 100;
      color: var(--text);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.5rem;
      letter-spacing: 0.16em;
      color: var(--muted2);
      text-transform: lowercase;
      margin-top: 0.35rem;
      line-height: 1.5;
    }

    /* Sections */
    .section {
      display: flex;
      flex-direction: column;
      gap: 0;
      animation: fadeUp 0.5s ease both;
    }

    .section-head {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.4rem;
    }
    .section-head::before, .section-head::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }
    .section-label {
      font-size: 0.53rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: lowercase;
      flex-shrink: 0;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.6rem 0.7rem;
      border-radius: 10px;
      transition: background 0.2s;
    }
    .list-item:hover { background: rgba(255,255,255,0.022); }
    .list-item.nowplaying { background: rgba(212,165,116,0.04); }

    .list-rank { font-size: 0.56rem; color: var(--muted); width: 1.1rem; text-align: right; flex-shrink: 0; }

    .list-img {
      width: 34px;
      height: 34px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }
    .list-img-ph {
      width: 34px;
      height: 34px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .list-body { flex: 1; min-width: 0; }
    .list-name { font-size: 0.7rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-sub { font-size: 0.57rem; color: var(--muted2); margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .bar-wrap { height: 2px; background: var(--border); border-radius: 2px; margin-top: 0.35rem; overflow: hidden; }
    .bar { height: 100%; background: var(--accent); border-radius: 2px; }

    .list-count { font-size: 0.58rem; color: var(--muted2); flex-shrink: 0; }

    .nowplaying-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px rgba(212,165,116,0.5);
      animation: blink 2s ease infinite;
      flex-shrink: 0;
    }

    /* Taskbar */
    .taskbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 6px;
      height: 52px;
      background: rgba(20,17,14,0.82);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(212,165,116,0.14);
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset, 0 1px 0 rgba(255,255,255,0.06) inset;
      animation: dockSlideUp 0.7s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .taskbar-section { display: flex; align-items: center; gap: 2px; padding: 0 8px; }
    .taskbar-divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
    .taskbar-clock { padding: 0 10px; text-align: center; }
    .clock-time { font-size: 0.72rem; font-weight: 400; color: var(--accent); letter-spacing: 0.08em; line-height: 1; }
    .clock-date { font-size: 0.5rem; font-weight: 300; color: var(--muted2); letter-spacing: 0.12em; margin-top: 2px; text-transform: lowercase; }

    .dock-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: none;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), background 0.2s ease;
      text-decoration: none;
    }
    .dock-btn:hover { background: rgba(212,165,116,0.08); transform: translateY(-4px) scale(1.08); }
    .dock-btn svg { width: 16px; height: 16px; display: block; }
    .dock-btn.active::after {
      content: '';
      position: absolute;
      bottom: 1px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--accent);
    }
    .dock-btn .tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: rgba(20,17,14,0.95);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
    }
    .dock-btn:hover .tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dockSlideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Integrity badge ── */
    .integrity-badge { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.35rem; flex-wrap: wrap; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      padding: 0.18rem 0.5rem;
      border-radius: 5px;
      font-weight: 400;
      text-transform: lowercase;
      cursor: default;
    }
    .badge-checking { color: var(--muted2); background: rgba(105,94,82,0.1); border: 1px solid var(--border2); animation: blink 2s ease infinite; }
    .badge-clean    { color: #4ade80; background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); }
    .badge-cheater  { color: var(--red); background: rgba(232,114,111,0.09); border: 1px solid rgba(232,114,111,0.25); cursor: pointer; }
    .badge-error    { color: var(--muted2); background: transparent; border: 1px solid var(--border2); }

    .suspicious-list {
      margin-top: 0.4rem;
      padding: 0.7rem 0.8rem;
      background: rgba(232,114,111,0.05);
      border: 1px solid rgba(232,114,111,0.15);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .suspicious-row { display: flex; flex-direction: column; gap: 0.1rem; }
    .suspicious-track { font-size: 0.67rem; color: var(--text); }
    .suspicious-detail { font-size: 0.56rem; color: var(--muted2); letter-spacing: 0.06em; }

    /* ── Ban risk card ── */
    .ban-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .ban-card.danger  { border-color: rgba(232,114,111,0.3); background: rgba(232,114,111,0.04); }
    .ban-card.warning { border-color: rgba(212,165,116,0.3); background: rgba(212,165,116,0.04); }

    .ban-header { display: flex; align-items: baseline; gap: 0.6rem; }
    .ban-pct {
      font-family: 'Fraunces', serif;
      font-size: 2.6rem;
      font-weight: 100;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .ban-pct-sub { font-size: 0.58rem; letter-spacing: 0.14em; color: var(--muted2); text-transform: lowercase; }

    .ban-bar-wrap {
      height: 5px;
      background: var(--border2);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }
    .ban-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .ban-details { display: flex; flex-direction: column; gap: 0.25rem; }
    .ban-detail-row { display: flex; justify-content: space-between; align-items: center; }
    .ban-detail-label { font-size: 0.56rem; color: var(--muted2); letter-spacing: 0.1em; text-transform: lowercase; }
    .ban-detail-val   { font-size: 0.62rem; color: var(--text); letter-spacing: 0.06em; }
    .ban-status {
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      text-transform: lowercase;
      align-self: flex-start;
    }
    .ban-status.safe     { color: #4ade80; background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.18); }
    .ban-status.caution  { color: var(--accent2); background: rgba(212,165,116,0.08); border: 1px solid rgba(212,165,116,0.2); }
    .ban-status.danger   { color: var(--red); background: rgba(232,114,111,0.08); border: 1px solid rgba(232,114,111,0.2); }
    .ban-status.banned   { color: var(--red); background: rgba(232,114,111,0.12); border: 1px solid rgba(232,114,111,0.3); font-weight: 500; }
  </style>
</head>
<body>

<!-- INPUT PAGE -->
<div class="page" id="page-input">
  <div class="input-card">
    <div class="input-title">
      <h1>last.fm stats</h1>
      <p>look up any user's listening data</p>
    </div>

    <div class="field">
      <label>username</label>
      <input id="inp-user" type="text" placeholder="welffi" autocomplete="off" spellcheck="false" />
    </div>

    <div id="err-box" class="error-box" style="display:none"></div>

    <button class="btn-primary" id="btn-search">look up stats →</button>
  </div>
</div>

<!-- LOADING PAGE -->
<div class="page hidden" id="page-loading">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <p class="loading-label">fetching stats...</p>
  </div>
</div>

<!-- RESULTS PAGE -->
<div class="page hidden" id="page-results">
  <div class="results-card" id="results-card"></div>
</div>

<!-- TASKBAR -->
<div class="taskbar">
  <div class="taskbar-section">
    <div class="taskbar-clock">
      <div class="clock-time" id="clock-time">--:--</div>
      <div class="clock-date" id="clock-date">--- --</div>
    </div>
  </div>
  <div class="taskbar-divider"></div>
  <div class="taskbar-section">
    <a class="dock-btn" href="./">
      <span class="tooltip">home</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:#d4a574">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
    </a>
    <a class="dock-btn" href="cropper.html">
      <span class="tooltip">crop image</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:#d4a574">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </a>
    <a class="dock-btn active" href="lastfm.html">
      <span class="tooltip">last.fm</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:#d4a574">
        <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
      </svg>
    </a>
  </div>
</div>

<script>
  // ── Clock ──
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;
    const days = ['sun','mon','tue','wed','thu','fri','sat'];
    const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    document.getElementById('clock-date').textContent =
      `${days[now.getDay()]} · ${months[now.getMonth()]} ${String(now.getDate()).padStart(2,'0')}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  const API_KEY = '44e2c647de30a1be4df7679e7041e36f';

  // ── Persistence ──
  const inpUser = document.getElementById('inp-user');
  inpUser.value = localStorage.getItem('lfm_user') || '';

  // ── Show/hide pages ──
  function show(id) {
    ['page-input','page-loading','page-results'].forEach(p =>
      document.getElementById(p).classList.toggle('hidden', p !== id)
    );
  }

  function showErr(msg) {
    const b = document.getElementById('err-box');
    b.textContent = msg;
    b.style.display = 'block';
  }
  function hideErr() { document.getElementById('err-box').style.display = 'none'; }

  // ── Search ──
  async function handleSearch() {
    const user = inpUser.value.trim();
    hideErr();

    if (!user) { showErr('please enter a username'); return; }

    localStorage.setItem('lfm_user', user);
    show('page-loading');

    try {
      await loadStats(user);
    } catch (e) {
      show('page-input');
      showErr(e.message || 'something went wrong');
    }
  }

  document.getElementById('btn-search').addEventListener('click', handleSearch);
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('page-input').classList.contains('hidden')) {
      handleSearch();
    }
  });

  // ── API ──
  const API_BASE = 'https://ws.audioscrobbler.com/2.0/';

  async function lfm(method, apiKey, params = {}) {
    const url = new URL(API_BASE);
    url.searchParams.set('method', method);
    url.searchParams.set('api_key', apiKey);
    url.searchParams.set('format', 'json');
    for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
    const r = await fetch(url);
    if (!r.ok) throw new Error(`network error (${r.status})`);
    const d = await r.json();
    if (d.error) throw new Error(d.message);
    return d;
  }

  async function loadStats(user) {
    const now      = Math.floor(Date.now() / 1000);
    const weekAgo  = now - 7 * 24 * 60 * 60;
    const eightAgo = now - 8 * 24 * 60 * 60;

    const [info, week, topArtists, topTracks, topAlbums, recent] = await Promise.all([
      lfm('user.getInfo',         API_KEY, { user }),
      lfm('user.getRecentTracks', API_KEY, { user, from: weekAgo, to: now, limit: 1 }),
      lfm('user.getTopArtists',   API_KEY, { user, period: '7day', limit: 5 }),
      lfm('user.getTopTracks',    API_KEY, { user, period: '7day', limit: 5 }),
      lfm('user.getTopAlbums',    API_KEY, { user, period: '7day', limit: 5 }),
      lfm('user.getRecentTracks', API_KEY, { user, limit: 6 }),
    ]);

    renderResults({ info, week, topArtists, topTracks, topAlbums, recent });
    show('page-results');

    // Background analysis: fetches real durations, updates ban card + integrity badge
    runAnalysis(user).catch(() => {
      const b = document.querySelector('.integrity-badge');
      if (b) b.innerHTML = `<span class="badge badge-error">~ couldn't check</span>`;
      const bc = document.getElementById('ban-card');
      if (bc) bc.querySelector('.ban-pct-sub').textContent = 'calculation failed';
    });
  }

  // ── Helpers ──
  function fmt(n) { return parseInt(n).toLocaleString(); }

  function timeAgo(uts) {
    const diff = Math.floor(Date.now() / 1000) - parseInt(uts);
    if (diff < 60)    return 'just now';
    if (diff < 3600)  return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return `${Math.floor(diff / 86400)}d ago`;
  }

  function img(imgs, pref = 'medium') {
    if (!imgs) return null;
    const arr = Array.isArray(imgs) ? imgs : [imgs];
    return (arr.find(i => i.size === pref && i['#text']) || arr.find(i => i['#text']) || {})['#text'] || null;
  }

  function toArr(v) {
    if (!v) return [];
    return Array.isArray(v) ? v : [v];
  }

  // ── Render ──
  function renderResults({ info, week, topArtists, topTracks, topAlbums, recent }) {
    const u           = info.user;
    const totalPlays  = parseInt(u.playcount);
    const regDate     = new Date(parseInt(u.registered.unixtime) * 1000);
    const memberYears = ((Date.now() - regDate) / (1000*60*60*24*365)).toFixed(1);
    const avatarUrl   = img(u.image, 'large') || img(u.image, 'medium');

    const weekTotal  = parseInt(week.recenttracks['@attr'].total);
    const avgPerDay  = (weekTotal / 7).toFixed(1);

    let hoursDisplay, hoursUnit;
    if (estHours >= 1) {
      hoursDisplay = estHours < 10 ? estHours.toFixed(1) : Math.round(estHours);
      hoursUnit = 'listening hours this week';
    } else {
      hoursDisplay = Math.round(estHours * 60);
      hoursUnit = 'listening minutes this week';
    }

    const artists   = toArr(topArtists.topartists?.artist);
    const tracks    = toArr(topTracks.toptracks?.track);
    const albums    = toArr(topAlbums.topalbums?.album);
    const recents   = toArr(recent.recenttracks?.track).slice(0, 6);

    const maxA = artists[0] ? parseInt(artists[0].playcount) : 1;
    const maxT = tracks[0]  ? parseInt(tracks[0].playcount)  : 1;
    const maxAl = albums[0] ? parseInt(albums[0].playcount)  : 1;

    function listItem(rank, imgUrl, name, sub, count, bar, maxBar, extra = '') {
      const pct = Math.round((parseInt(count) / maxBar) * 100);
      return `
        <div class="list-item">
          ${extra || `<span class="list-rank">${rank}</span>`}
          ${imgUrl ? `<img class="list-img" src="${imgUrl}" alt="" />` : `<div class="list-img-ph"></div>`}
          <div class="list-body">
            <div class="list-name">${name}</div>
            ${sub ? `<div class="list-sub">${sub}</div>` : ''}
            ${bar ? `<div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>` : ''}
          </div>
          <div class="list-count">${count}</div>
        </div>`;
    }

    const artistRows = artists.map((a, i) =>
      listItem(i+1, null, a.name, null, `${fmt(a.playcount)} plays`, true, maxA)
    ).join('');

    const trackRows = tracks.map((t, i) => {
      const cover = img(t.image, 'small') || img(t.image, 'medium');
      return listItem(i+1, cover, t.name, t.artist.name, `${fmt(t.playcount)} plays`, true, maxT);
    }).join('');

    const albumRows = albums.map((a, i) => {
      const cover = img(a.image, 'small') || img(a.image, 'medium');
      return listItem(i+1, cover, a.name, a.artist.name, `${fmt(a.playcount)} plays`, true, maxAl);
    }).join('');

    const recentRows = recents.map(t => {
      const isNow = t['@attr']?.nowplaying === 'true';
      const cover = img(t.image, 'small') || img(t.image, 'medium');
      const album = t.album?.['#text'];
      const sub   = [t.artist['#text'], album].filter(Boolean).join(' · ');
      const countHtml = isNow
        ? `<div class="list-count" style="color:var(--accent)">now</div>`
        : `<div class="list-count">${timeAgo(t.date?.uts)}</div>`;
      return `
        <div class="list-item${isNow ? ' nowplaying' : ''}">
          ${isNow ? `<div class="nowplaying-dot"></div>` : `<span class="list-rank">♪</span>`}
          ${cover ? `<img class="list-img" src="${cover}" alt="" />` : `<div class="list-img-ph"></div>`}
          <div class="list-body">
            <div class="list-name">${t.name}</div>
            <div class="list-sub">${sub}</div>
          </div>
          ${countHtml}
        </div>`;
    }).join('');

    document.getElementById('results-card').innerHTML = `
      <div class="profile-row">
        ${avatarUrl
          ? `<img class="profile-avatar" src="${avatarUrl}" alt="${u.name}" />`
          : `<div class="profile-avatar-ph">♪</div>`}
        <div class="profile-info">
          <div class="profile-name">${u.name}</div>
          <div class="profile-meta">${fmt(totalPlays)} total scrobbles · member for ${memberYears}y</div>
          <div class="integrity-badge">
            <span class="badge badge-checking">⟳ checking integrity...</span>
          </div>
        </div>
        <button class="back-btn" onclick="show('page-input')">← back</button>
      </div>

      <div class="stat-grid">
        <div class="stat-card hero">
          <div class="hero-number">${hoursDisplay}</div>
          <div class="hero-unit">${hoursUnit}</div>
          <div class="hero-sub">${fmt(weekTotal)} scrobbles · ~${avgPerDay}/day</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${fmt(weekTotal)}</div>
          <div class="stat-label">scrobbles<br>this week</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${avgPerDay}</div>
          <div class="stat-label">avg tracks<br>per day</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${fmt(totalPlays)}</div>
          <div class="stat-label">all-time<br>scrobbles</div>
        </div>
      </div>

      <div class="ban-card" id="ban-card" style="animation-delay:0.08s">
        <div class="section-head" style="margin-bottom:0">
          <span class="section-label">leaderboard ban risk · 8-day rolling window</span>
        </div>
        <div class="ban-header">
          <span class="ban-pct" style="color:var(--muted2)">—</span>
          <span class="ban-pct-sub" style="animation:blink 2s ease infinite">fetching real track durations...</span>
        </div>
        <div class="ban-bar-wrap">
          <div class="ban-bar" style="width:0%;background:var(--muted)"></div>
        </div>
      </div>

      ${artists.length ? `
      <div class="section" style="animation-delay:0.1s">
        <div class="section-head"><span class="section-label">top artists · 7 days</span></div>
        ${artistRows}
      </div>` : ''}

      ${tracks.length ? `
      <div class="section" style="animation-delay:0.15s">
        <div class="section-head"><span class="section-label">top tracks · 7 days</span></div>
        ${trackRows}
      </div>` : ''}

      ${albums.length ? `
      <div class="section" style="animation-delay:0.2s">
        <div class="section-head"><span class="section-label">top albums · 7 days</span></div>
        ${albumRows}
      </div>` : ''}

      ${recents.length ? `
      <div class="section" style="animation-delay:0.25s">
        <div class="section-head"><span class="section-label">recently played</span></div>
        ${recentRows}
      </div>` : ''}
    `;
  }

  // ── Background analysis: real durations → ban risk + integrity check ──
  async function runAnalysis(user) {
    const now      = Math.floor(Date.now() / 1000);
    const eightAgo = now - 8 * 24 * 60 * 60;
    const weekAgo  = now - 7 * 24 * 60 * 60;

    // Fetch all 8-day scrobbles (paginated, cap 10 pages = 2000 tracks)
    const page1 = await lfm('user.getRecentTracks', API_KEY, {
      user, from: eightAgo, to: now, limit: 200, page: 1
    });
    const totalPages = Math.min(parseInt(page1.recenttracks['@attr'].totalPages), 10);
    let all = toArr(page1.recenttracks.track).filter(t => t.date);

    if (totalPages > 1) {
      const rest = await Promise.all(
        Array.from({ length: totalPages - 1 }, (_, i) =>
          lfm('user.getRecentTracks', API_KEY, {
            user, from: eightAgo, to: now, limit: 200, page: i + 2
          })
        )
      );
      rest.forEach(p => all = all.concat(toArr(p.recenttracks.track).filter(t => t.date)));
    }

    // Build unique track map
    const uniq = {};
    all.forEach(t => {
      const key = `${t.artist['#text']}|||${t.name}`;
      if (!uniq[key]) uniq[key] = { artist: t.artist['#text'], name: t.name, duration: null };
    });

    // Batch-fetch actual durations from Last.fm (returns milliseconds)
    const keys = Object.keys(uniq).slice(0, 300);
    const BATCH = 8;
    for (let i = 0; i < keys.length; i += BATCH) {
      await Promise.all(
        keys.slice(i, i + BATCH).map(async key => {
          try {
            const d = await lfm('track.getInfo', API_KEY, {
              artist: uniq[key].artist,
              track:  uniq[key].name
            });
            const ms = parseInt(d.track?.duration);
            if (ms > 0) uniq[key].duration = ms / 1000; // ms → seconds
          } catch {}
        })
      );
    }

    // ── Ban risk: sum real durations over 8-day window ──
    const FALLBACK_SECS = 210; // only used for tracks with no duration in Last.fm db
    const BAN_LIMIT_SECS = 6 * 24 * 3600; // 144 hours

    let totalListenSecs = 0;
    let tracksWithRealDur = 0;
    all.forEach(t => {
      const dur = uniq[`${t.artist['#text']}|||${t.name}`]?.duration;
      if (dur) { totalListenSecs += dur; tracksWithRealDur++; }
      else      { totalListenSecs += FALLBACK_SECS; }
    });

    updateBanCard(totalListenSecs, all.length, tracksWithRealDur);

    // ── Integrity check: look at 7-day scrobbles sorted oldest → newest ──
    const week = all.filter(t => parseInt(t.date.uts) >= weekAgo);
    week.sort((a, b) => parseInt(a.date.uts) - parseInt(b.date.uts));

    const suspicious = [];
    for (let i = 1; i < week.length; i++) {
      const prev    = week[i - 1];
      const curr    = week[i];
      const gap     = parseInt(curr.date.uts) - parseInt(prev.date.uts);
      const prevDur = uniq[`${prev.artist['#text']}|||${prev.name}`]?.duration;
      const currDur = uniq[`${curr.artist['#text']}|||${curr.name}`]?.duration;

      const minGap = currDur
        ? Math.max(Math.min(currDur * 0.5, 240), 30)
        : (prevDur ? Math.min(prevDur * 0.4, 90) : 30);

      if (gap < minGap) {
        suspicious.push({
          prevTrack: prev.name, prevArtist: prev.artist['#text'],
          currTrack: curr.name, currArtist: curr.artist['#text'],
          gap, currDur, prevDur
        });
      }
    }

    const badge = document.querySelector('.integrity-badge');
    if (!badge) return;

    if (suspicious.length === 0) {
      badge.innerHTML = `<span class="badge badge-clean">✓ clean · ${week.length} scrobbles checked</span>`;
      return;
    }

    // Deduplicate
    const seen = new Set();
    const uniqSusp = suspicious.filter(s => {
      const k = `${s.prevTrack}|${s.currTrack}`;
      return seen.has(k) ? false : (seen.add(k), true);
    });

    function fmtSecs(s) {
      if (!s) return '?';
      return s >= 60 ? `${Math.floor(s/60)}m ${Math.round(s%60)}s` : `${Math.round(s)}s`;
    }

    const rows = uniqSusp.slice(0, 5).map(s => `
      <div class="suspicious-row">
        <div class="suspicious-track">${s.currTrack} <span style="color:var(--muted2)">by ${s.currArtist}</span></div>
        <div class="suspicious-detail">
          scrobbled ${fmtSecs(s.gap)} after "${s.prevTrack}"
          ${s.currDur ? `· needs ≥ ${fmtSecs(Math.min(s.currDur * 0.5, 240))} to scrobble legitimately` : ''}
        </div>
      </div>`).join('');

    const extra = uniqSusp.length > 5
      ? `<div class="suspicious-detail" style="margin-top:0.2rem">+ ${uniqSusp.length - 5} more</div>` : '';

    badge.innerHTML = `
      <span class="badge badge-cheater" onclick="this.closest('.integrity-badge').querySelector('.suspicious-list').classList.toggle('hidden')">
        ⚠ cheater · ${suspicious.length} impossible scrobble${suspicious.length !== 1 ? 's' : ''}
      </span>
      <div class="suspicious-list hidden">
        ${rows}
        ${extra}
      </div>`;
    }
  }

  function updateBanCard(totalSecs, scrobbleCount, realDurCount) {
    const card = document.getElementById('ban-card');
    if (!card) return;

    const BAN_LIMIT_SECS = 6 * 24 * 3600; // 144 hrs
    const banPct   = (totalSecs / BAN_LIMIT_SECS) * 100;
    const barPct   = Math.min(banPct, 100);
    const listenHrs  = (totalSecs / 3600).toFixed(1);
    const remainHrs  = Math.max((BAN_LIMIT_SECS - totalSecs) / 3600, 0).toFixed(1);
    const overHrs    = ((totalSecs - BAN_LIMIT_SECS) / 3600).toFixed(1);
    const coverage   = Math.round((realDurCount / scrobbleCount) * 100);

    let banColor, cardExtra, statusClass, statusText, banDisplay;
    if (banPct >= 100) {
      banColor = '#e8726f'; cardExtra = 'danger';
      statusClass = 'banned'; statusText = '⚠ would be banned';
      banDisplay = banPct > 999 ? '999+%' : banPct.toFixed(1) + '%';
    } else if (banPct >= 75) {
      banColor = '#e8a46f'; cardExtra = 'warning';
      statusClass = 'danger'; statusText = 'approaching limit';
      banDisplay = banPct.toFixed(1) + '%';
    } else if (banPct >= 40) {
      banColor = '#d4a574'; cardExtra = '';
      statusClass = 'caution'; statusText = 'worth watching';
      banDisplay = banPct.toFixed(1) + '%';
    } else {
      banColor = '#4ade80'; cardExtra = '';
      statusClass = 'safe'; statusText = 'safe';
      banDisplay = banPct.toFixed(1) + '%';
    }

    card.className = `ban-card ${cardExtra}`;
    card.innerHTML = `
      <div class="section-head" style="margin-bottom:0">
        <span class="section-label">leaderboard ban risk · 8-day rolling window</span>
      </div>
      <div class="ban-header">
        <span class="ban-pct" style="color:${banColor}">${banDisplay}</span>
        <span class="ban-pct-sub">of ban threshold</span>
      </div>
      <div class="ban-bar-wrap">
        <div class="ban-bar" style="width:${barPct}%;background:${banColor}"></div>
      </div>
      <div class="ban-details">
        <div class="ban-detail-row">
          <span class="ban-detail-label">actual listening (8 days)</span>
          <span class="ban-detail-val">${listenHrs} hrs / 144 hr limit</span>
        </div>
        <div class="ban-detail-row">
          <span class="ban-detail-label">${banPct >= 100 ? 'over limit by' : 'headroom remaining'}</span>
          <span class="ban-detail-val" style="color:${banColor}">${banPct >= 100 ? '+' + overHrs : remainHrs} hrs</span>
        </div>
        <div class="ban-detail-row">
          <span class="ban-detail-label">scrobbles counted</span>
          <span class="ban-detail-val">${fmt(scrobbleCount)} tracks · ${coverage}% had real durations</span>
        </div>
        <div class="ban-detail-row">
          <span class="ban-detail-label">window type</span>
          <span class="ban-detail-val">rolling · drops off as scrobbles age out</span>
        </div>
      </div>
      <span class="ban-status ${statusClass}">${statusText}</span>`;
  }
</script>
</body>
</html>
