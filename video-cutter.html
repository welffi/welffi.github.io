<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>video cutter · welffi</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/c7moPaj.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100;0,9..144,300;1,9..144,100;1,9..144,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0a0908;
      --surface:  #141210;
      --surface2: #1a1714;
      --border:   #241f1b;
      --border2:  #2e2821;
      --text:     #ede8e0;
      --muted:    #4e463c;
      --muted2:   #695e52;
      --accent:   #d4a574;
      --accent2:  #e8c49a;
      --red:      #e8726f;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 40% at 50% -5%, rgba(212,165,116,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 60% 30% at 50% 105%, rgba(180,130,80,0.04) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.2rem 7rem;
      gap: 1.4rem;
    }

    .title-block { text-align: center; }
    h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.9rem;
      font-weight: 300;
      letter-spacing: -0.01em;
    }
    .subtitle {
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      color: var(--muted2);
      text-transform: lowercase;
      margin-top: 0.4rem;
    }

    .editor { width: 100%; max-width: 880px; display: flex; flex-direction: column; gap: 1.2rem; }

    /* ── Drop zone ── */
    .dropzone {
      border: 1.5px dashed var(--border2);
      border-radius: 16px;
      padding: 4rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s;
      background: rgba(255,255,255,0.012);
    }
    .dropzone:hover, .dropzone.drag {
      border-color: rgba(212,165,116,0.5);
      background: rgba(212,165,116,0.04);
    }
    .dropzone .dz-icon { color: var(--accent); margin-bottom: 1rem; }
    .dropzone .dz-icon svg { width: 38px; height: 38px; }
    .dropzone .dz-main { font-size: 0.85rem; color: var(--text); letter-spacing: 0.04em; }
    .dropzone .dz-sub { font-size: 0.6rem; color: var(--muted2); margin-top: 0.5rem; letter-spacing: 0.08em; }

    /* ── Preview ── */
    .preview-wrap {
      background: #000;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 16 / 9;
      position: relative;
    }
    .preview-wrap video { width: 100%; height: 100%; object-fit: contain; display: block; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.55rem 0.65rem;
    }
    .tool-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      height: 36px;
      min-width: 36px;
      padding: 0 0.7rem;
      border-radius: 9px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted2);
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: color 0.18s, border-color 0.18s, background 0.18s;
      text-transform: lowercase;
      white-space: nowrap;
    }
    .tool-btn svg { width: 15px; height: 15px; }
    .tool-btn:hover { color: var(--text); border-color: var(--muted2); }
    .tool-btn.active { color: var(--accent); border-color: rgba(212,165,116,0.45); background: rgba(212,165,116,0.08); }
    .tool-btn.danger:hover { color: var(--red); border-color: rgba(232,114,111,0.4); }
    .tool-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .tool-btn.primary { color: var(--accent); border-color: rgba(212,165,116,0.4); background: rgba(212,165,116,0.1); }
    .tool-btn.primary:hover { background: rgba(212,165,116,0.16); }
    .toolbar-sep { width: 1px; height: 22px; background: var(--border2); margin: 0 3px; }
    .toolbar-spacer { flex: 1; }
    .time-readout { font-size: 0.66rem; color: var(--accent2); letter-spacing: 0.06em; padding: 0 0.4rem; white-space: nowrap; }

    /* ── Timeline ── */
    .timeline {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.5rem;
      overflow: hidden;
    }
    .timeline-scroll { overflow-x: auto; overflow-y: hidden; position: relative; padding-bottom: 4px; }
    .timeline-inner { position: relative; min-width: 100%; }

    .ruler {
      position: relative;
      height: 22px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
      cursor: text;
    }
    .ruler .tick {
      position: absolute;
      top: 0; bottom: 0;
      border-left: 1px solid var(--border2);
      pointer-events: none;
    }
    .ruler .tick span {
      position: absolute;
      left: 4px; top: 4px;
      font-size: 0.5rem;
      color: var(--muted2);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .track {
      position: relative;
      height: 64px;
      cursor: pointer;
    }
    .clip {
      position: absolute;
      top: 0; bottom: 0;
      background: linear-gradient(180deg, rgba(212,165,116,0.16), rgba(212,165,116,0.07));
      border: 1px solid rgba(212,165,116,0.35);
      border-radius: 7px;
      overflow: hidden;
      box-sizing: border-box;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .clip::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(90deg, transparent 0 7px, rgba(212,165,116,0.06) 7px 8px);
      pointer-events: none;
    }
    .clip.selected {
      border-color: var(--accent2);
      box-shadow: 0 0 0 1px var(--accent2), 0 0 16px rgba(212,165,116,0.25);
    }
    .clip-label {
      position: absolute;
      top: 5px; left: 7px; right: 7px;
      font-size: 0.55rem;
      color: var(--accent2);
      letter-spacing: 0.05em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }
    .track.razor { cursor: crosshair; }
    .track.razor .clip:hover::after {
      content: '';
      position: absolute; top: 0; bottom: 0;
      left: var(--rx, 50%);
      width: 1px;
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
    }

    .playhead {
      position: absolute;
      top: 0; bottom: 0;
      width: 1px;
      background: var(--accent);
      pointer-events: none;
      z-index: 5;
    }
    .playhead::before {
      content: '';
      position: absolute;
      top: -1px; left: -4px;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 6px solid var(--accent);
    }

    .status-line {
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      color: var(--muted2);
      text-align: center;
      min-height: 0.9rem;
    }
    .status-line.busy { color: var(--accent2); }
    .status-line.err  { color: var(--red); }

    .hint-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 1.1rem;
      justify-content: center;
      font-size: 0.52rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .hint-row b { color: var(--muted2); font-weight: 500; }

    .hidden { display: none !important; }

    /* ── Taskbar (shared) ── */
    .taskbar {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 100; display: flex; align-items: center; padding: 0 6px; height: 52px;
      background: rgba(20,17,14,0.82);
      backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(212,165,116,0.14); border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset, 0 1px 0 rgba(255,255,255,0.06) inset;
      animation: dockSlideUp 0.7s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .taskbar-section { display: flex; align-items: center; gap: 2px; padding: 0 8px; }
    .taskbar-divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
    .taskbar-clock { padding: 0 10px; text-align: center; }
    .clock-time { font-size: 0.72rem; color: var(--accent); letter-spacing: 0.08em; line-height: 1; }
    .clock-date { font-size: 0.5rem; color: var(--muted2); letter-spacing: 0.12em; margin-top: 2px; text-transform: lowercase; }
    .dock-btn {
      display: flex; align-items: center; justify-content: center;
      width: 38px; height: 38px; border-radius: 12px; border: none; background: transparent;
      cursor: pointer; position: relative; text-decoration: none;
      transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), background 0.2s ease;
    }
    .dock-btn:hover { background: rgba(212,165,116,0.08); transform: translateY(-4px) scale(1.08); }
    .dock-btn svg { width: 16px; height: 16px; display: block; }
    .dock-btn.active::after {
      content: ''; position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%);
      width: 3px; height: 3px; border-radius: 50%; background: var(--accent);
    }
    .dock-btn .tooltip {
      position: absolute; bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: rgba(20,17,14,0.95); border: 1px solid var(--border2); border-radius: 6px;
      padding: 3px 8px; font-size: 0.55rem; letter-spacing: 0.1em; color: var(--accent);
      white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s, transform 0.15s;
    }
    .dock-btn:hover .tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes dockSlideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @media (max-width: 560px) {
      .tool-btn .label { display: none; }
      .tool-btn { padding: 0 0.5rem; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="title-block">
    <h1>video cutter</h1>
    <p class="subtitle">drop · cut · trim · export — all in your browser</p>
  </div>

  <div class="editor">
    <!-- DROP ZONE -->
    <div class="dropzone" id="dropzone">
      <div class="dz-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <path d="M7 10l5 5 5-5"/><path d="M12 15V3"/>
        </svg>
      </div>
      <div class="dz-main">drop a video here, or click to browse</div>
      <div class="dz-sub">mp4 · webm · mov — stays entirely on your device</div>
    </div>
    <input type="file" id="file-input" accept="video/*" class="hidden" />

    <!-- EDITOR (hidden until a video loads) -->
    <div id="editor-body" class="hidden" style="display:flex;flex-direction:column;gap:1.2rem">
      <div class="preview-wrap">
        <video id="video" playsinline></video>
      </div>

      <div class="toolbar">
        <button class="tool-btn" id="btn-play" title="play / pause (space)">
          <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <span class="label">play</span>
        </button>
        <div class="toolbar-sep"></div>
        <button class="tool-btn active" id="btn-select" title="select tool (v)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7 17 2.5-7L20 10 3 3z"/></svg>
          <span class="label">select</span>
        </button>
        <button class="tool-btn" id="btn-razor" title="razor / cut tool (c)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
          <span class="label">razor</span>
        </button>
        <button class="tool-btn" id="btn-split" title="split at playhead (s)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M12 3v18"/><path d="M5 8l-2 4 2 4"/><path d="M19 8l2 4-2 4"/></svg>
          <span class="label">split</span>
        </button>
        <button class="tool-btn danger" id="btn-delete" title="delete selected clip (del)" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>
          <span class="label">delete</span>
        </button>
        <div class="toolbar-sep"></div>
        <button class="tool-btn" id="btn-zoom-out" title="zoom out">−</button>
        <button class="tool-btn" id="btn-zoom-in" title="zoom in">+</button>
        <div class="toolbar-spacer"></div>
        <span class="time-readout" id="time-readout">0:00.0 / 0:00.0</span>
        <button class="tool-btn primary" id="btn-export" title="export the cut as mp4">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>
          <span class="label">export</span>
        </button>
        <button class="tool-btn" id="btn-new" title="load a different video">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>

      <div class="timeline">
        <div class="timeline-scroll" id="timeline-scroll">
          <div class="timeline-inner" id="timeline-inner">
            <div class="ruler" id="ruler"></div>
            <div class="track" id="track"></div>
            <div class="playhead" id="playhead" style="left:0"></div>
          </div>
        </div>
      </div>

      <div class="status-line" id="status"></div>

      <div class="hint-row">
        <span><b>space</b> play/pause</span>
        <span><b>v</b> select</span>
        <span><b>c</b> razor</span>
        <span><b>s</b> split at playhead</span>
        <span><b>del</b> delete clip</span>
        <span><b>← →</b> nudge</span>
      </div>
    </div>
  </div>
</div>

<!-- TASKBAR -->
<div class="taskbar">
  <div class="taskbar-section">
    <div class="taskbar-clock">
      <div class="clock-time" id="clock-time">--:--</div>
      <div class="clock-date" id="clock-date">--- --</div>
    </div>
  </div>
  <div class="taskbar-divider"></div>
  <div class="taskbar-section">
    <a class="dock-btn" href="./">
      <span class="tooltip">home</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:#d4a574"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    </a>
    <a class="dock-btn" href="cropper.html">
      <span class="tooltip">crop image</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:#d4a574"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </a>
    <a class="dock-btn active" href="video-cutter.html">
      <span class="tooltip">video cutter</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:#d4a574"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
    </a>
    <a class="dock-btn" href="lastfm.html">
      <span class="tooltip">last.fm</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:#d4a574"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
    </a>
  </div>
</div>

<script>
  // ── Clock ──
  function updateClock() {
    const now = new Date();
    const p = n => String(n).padStart(2,'0');
    document.getElementById('clock-time').textContent = `${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
    const days = ['sun','mon','tue','wed','thu','fri','sat'];
    const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    document.getElementById('clock-date').textContent = `${days[now.getDay()]} · ${months[now.getMonth()]} ${p(now.getDate())}`;
  }
  updateClock(); setInterval(updateClock, 1000);

  // ── Elements ──
  const dropzone   = document.getElementById('dropzone');
  const fileInput  = document.getElementById('file-input');
  const editorBody = document.getElementById('editor-body');
  const video      = document.getElementById('video');
  const trackEl    = document.getElementById('track');
  const rulerEl    = document.getElementById('ruler');
  const innerEl    = document.getElementById('timeline-inner');
  const scrollEl   = document.getElementById('timeline-scroll');
  const playheadEl = document.getElementById('playhead');
  const timeReadout= document.getElementById('time-readout');
  const statusEl   = document.getElementById('status');
  const playIcon   = document.getElementById('play-icon');

  // ── State ──
  let clips = [];          // [{srcStart, srcEnd, tlStart}]
  let totalDur = 0;
  let pps = 12;            // pixels per second (zoom)
  let playheadTl = 0;
  let playing = false;
  let activeIdx = 0;
  let tool = 'select';     // 'select' | 'razor'
  let selected = null;
  let exporting = false;
  let srcURL = null;
  let currentFile = null;

  // ── ffmpeg.wasm — lazy-loaded on first export (single-thread build, no special headers needed) ──
  let ffmpeg = null;
  let stageLabel = '';
  async function loadFFmpeg() {
    if (ffmpeg) return ffmpeg;
    if (typeof FFmpeg === 'undefined') {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js';
        s.onload = res;
        s.onerror = () => rej(new Error('couldn\'t download the video engine'));
        document.head.appendChild(s);
      });
    }
    const { createFFmpeg } = FFmpeg;
    ffmpeg = createFFmpeg({
      log: false,
      corePath: 'https://unpkg.com/@ffmpeg/core-st@0.11.0/dist/ffmpeg-core.js',
    });
    ffmpeg.setProgress(({ ratio }) => {
      if (!stageLabel) return;
      const p = Math.round((ratio || 0) * 100);
      setStatus(`${stageLabel}${isFinite(p) && p >= 0 && p <= 100 ? ' · ' + p + '%' : ''}`, 'busy');
    });
    await ffmpeg.load();
    return ffmpeg;
  }

  // ── Helpers ──
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  function fmtTime(s) {
    if (!isFinite(s)) s = 0;
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${sec.toFixed(1).padStart(4,'0')}`;
  }
  function once(el, ev) { return new Promise(r => el.addEventListener(ev, r, { once: true })); }
  function setStatus(msg, kind='') { statusEl.textContent = msg; statusEl.className = 'status-line' + (kind ? ' ' + kind : ''); }

  // ── File loading ──
  dropzone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { if (e.target.files[0]) loadVideo(e.target.files[0]); });
  ['dragover','dragenter'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add('drag'); }));
  ['dragleave','drop'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove('drag'); }));
  dropzone.addEventListener('drop', e => {
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('video/')) loadVideo(f);
  });

  function loadVideo(file) {
    if (srcURL) URL.revokeObjectURL(srcURL);
    currentFile = file;
    srcURL = URL.createObjectURL(file);
    video.src = srcURL;
    video.onloadedmetadata = () => {
      const dur = video.duration;
      if (!isFinite(dur) || dur <= 0) { setStatus('could not read video duration', 'err'); return; }
      clips = [{ srcStart: 0, srcEnd: dur }];
      selected = null;
      playing = false;
      activeIdx = 0;
      // fit timeline to container width
      const w = scrollEl.clientWidth || 700;
      pps = clamp(w / dur, 4, 200);
      dropzone.classList.add('hidden');
      editorBody.classList.remove('hidden');
      rebuild();
      setPlayhead(0, true);
      setStatus(`loaded · ${fmtTime(dur)} · drag the playhead, then cut with the razor`);
    };
    video.onerror = () => setStatus('couldn\'t load that video file', 'err');
  }

  document.getElementById('btn-new').addEventListener('click', () => {
    pausePlay();
    editorBody.classList.add('hidden');
    dropzone.classList.remove('hidden');
    fileInput.value = '';
    setStatus('');
  });

  // ── Timeline build / render ──
  function rebuild() {
    let t = 0;
    clips.forEach(c => { c.tlStart = t; t += (c.srcEnd - c.srcStart); });
    totalDur = t;
    renderTimeline();
    setPlayhead(clamp(playheadTl, 0, totalDur));
    updateUI();
  }

  function chooseStep() {
    const opts = [0.5, 1, 2, 5, 10, 15, 30, 60, 120, 300];
    for (const s of opts) if (s * pps >= 54) return s;
    return 600;
  }

  function renderTimeline() {
    const W = Math.max(totalDur * pps, scrollEl.clientWidth || 1);
    innerEl.style.width = W + 'px';

    // ruler
    const step = chooseStep();
    let r = '';
    for (let s = 0; s <= totalDur + 0.0001; s += step) {
      r += `<div class="tick" style="left:${(s * pps).toFixed(1)}px"><span>${fmtTime(s)}</span></div>`;
    }
    rulerEl.innerHTML = r;

    // clips
    let h = '';
    clips.forEach((c, i) => {
      const x = c.tlStart * pps;
      const w = Math.max((c.srcEnd - c.srcStart) * pps, 2);
      h += `<div class="clip${selected === i ? ' selected' : ''}" data-i="${i}" style="left:${x.toFixed(1)}px;width:${w.toFixed(1)}px">
        <div class="clip-label">clip ${i + 1} · ${fmtTime(c.srcEnd - c.srcStart)}</div>
      </div>`;
    });
    trackEl.innerHTML = h;
    trackEl.classList.toggle('razor', tool === 'razor');
  }

  function setPlayhead(tl, seek) {
    playheadTl = clamp(tl, 0, totalDur || 0);
    playheadEl.style.left = (playheadTl * pps) + 'px';
    timeReadout.textContent = `${fmtTime(playheadTl)} / ${fmtTime(totalDur)}`;
    if (seek) {
      const m = tlToSource(playheadTl);
      if (m) { activeIdx = m.idx; if (Math.abs(video.currentTime - m.src) > 0.01) video.currentTime = m.src; }
    }
  }

  function tlToSource(tl) {
    if (!clips.length) return null;
    for (let i = 0; i < clips.length; i++) {
      const c = clips[i];
      const dur = c.srcEnd - c.srcStart;
      if (tl <= c.tlStart + dur + 1e-6) return { idx: i, src: c.srcStart + Math.max(0, tl - c.tlStart) };
    }
    const last = clips[clips.length - 1];
    return { idx: clips.length - 1, src: last.srcEnd };
  }

  // ── Track interactions ──
  trackEl.addEventListener('mousemove', e => {
    if (tool !== 'razor') return;
    const clip = e.target.closest('.clip');
    if (clip) { const rect = clip.getBoundingClientRect(); clip.style.setProperty('--rx', (e.clientX - rect.left) + 'px'); }
  });

  trackEl.addEventListener('click', e => {
    const el = e.target.closest('.clip');
    if (!el) return;
    const i = +el.dataset.i;
    const c = clips[i];
    const rect = el.getBoundingClientRect();
    const frac = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    const srcTime = c.srcStart + frac * (c.srcEnd - c.srcStart);
    if (tool === 'razor') {
      splitClip(i, srcTime);
    } else {
      selected = (selected === i) ? null : i;
      renderTimeline();
      updateUI();
    }
  });

  // scrub by clicking the ruler
  rulerEl.addEventListener('pointerdown', e => {
    const startScrub = ev => {
      const rect = rulerEl.getBoundingClientRect();
      setPlayhead((ev.clientX - rect.left) / pps, true);
    };
    startScrub(e);
    const move = ev => startScrub(ev);
    const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  });

  // ── Editing ops ──
  function splitClip(i, srcTime) {
    const c = clips[i];
    if (srcTime <= c.srcStart + 0.05 || srcTime >= c.srcEnd - 0.05) { setStatus('cut too close to a clip edge', 'err'); return; }
    const second = { srcStart: srcTime, srcEnd: c.srcEnd };
    c.srcEnd = srcTime;
    clips.splice(i + 1, 0, second);
    selected = null;
    rebuild();
    setStatus(`cut · ${clips.length} clips`);
  }

  function splitAtPlayhead() {
    const m = tlToSource(playheadTl);
    if (m) splitClip(m.idx, m.src);
  }

  function deleteSelected() {
    if (selected == null) return;
    clips.splice(selected, 1);
    selected = null;
    rebuild();
    setPlayhead(clamp(playheadTl, 0, totalDur), true);
    setStatus(clips.length ? `deleted · ${clips.length} clips left` : 'timeline empty — load or undo by re-adding');
  }

  function updateUI() {
    document.getElementById('btn-delete').disabled = (selected == null);
    document.getElementById('btn-export').disabled = (clips.length === 0);
    document.getElementById('btn-select').classList.toggle('active', tool === 'select');
    document.getElementById('btn-razor').classList.toggle('active', tool === 'razor');
  }

  // ── Tools ──
  document.getElementById('btn-select').addEventListener('click', () => { tool = 'select'; renderTimeline(); updateUI(); });
  document.getElementById('btn-razor').addEventListener('click', () => { tool = 'razor'; selected = null; renderTimeline(); updateUI(); });
  document.getElementById('btn-split').addEventListener('click', splitAtPlayhead);
  document.getElementById('btn-delete').addEventListener('click', deleteSelected);
  document.getElementById('btn-play').addEventListener('click', togglePlay);

  document.getElementById('btn-zoom-in').addEventListener('click', () => { pps = clamp(pps * 1.5, 4, 400); renderTimeline(); setPlayhead(playheadTl); });
  document.getElementById('btn-zoom-out').addEventListener('click', () => { pps = clamp(pps / 1.5, 4, 400); renderTimeline(); setPlayhead(playheadTl); });

  // ── Playback ──
  function togglePlay() { playing ? pausePlay() : startPlay(); }
  function startPlay() {
    if (!clips.length || exporting) return;
    if (playheadTl >= totalDur - 0.01) setPlayhead(0, true);
    const m = tlToSource(playheadTl);
    if (m) { activeIdx = m.idx; video.currentTime = m.src; }
    video.play();
    playing = true;
    playIcon.innerHTML = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
  }
  function pausePlay() {
    playing = false;
    video.pause();
    playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
  }

  function tick() {
    if (playing && !exporting && clips.length) {
      const c = clips[activeIdx];
      if (!c) { pausePlay(); }
      else {
        const cur = video.currentTime;
        if (cur >= c.srcEnd - 0.02) {
          if (activeIdx < clips.length - 1) { activeIdx++; video.currentTime = clips[activeIdx].srcStart; }
          else { setPlayhead(totalDur); pausePlay(); }
        } else {
          setPlayhead(c.tlStart + (cur - c.srcStart));
        }
      }
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // ── Keyboard ──
  document.addEventListener('keydown', e => {
    if (editorBody.classList.contains('hidden')) return;
    if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
    switch (e.key.toLowerCase()) {
      case ' ': e.preventDefault(); togglePlay(); break;
      case 'v': tool = 'select'; renderTimeline(); updateUI(); break;
      case 'c': tool = 'razor'; selected = null; renderTimeline(); updateUI(); break;
      case 's': splitAtPlayhead(); break;
      case 'delete': case 'backspace': e.preventDefault(); deleteSelected(); break;
      case 'arrowleft':  e.preventDefault(); setPlayhead(playheadTl - (e.shiftKey ? 1 : 1/30), true); break;
      case 'arrowright': e.preventDefault(); setPlayhead(playheadTl + (e.shiftKey ? 1 : 1/30), true); break;
    }
  });

  // ── Export → MP4 via ffmpeg.wasm ──
  // The whole cut is done in ONE ffmpeg pass with a trim+concat filtergraph.
  // (ffmpeg.wasm 0.11 is unreliable across multiple runs, so a single command
  //  is the robust approach.) We try with audio first; videos with no audio
  //  track fail that attempt, so we reload and retry video-only.
  document.getElementById('btn-export').addEventListener('click', exportVideo);

  function buildFilter(withAudio) {
    const parts = [];
    let cat = '';
    clips.forEach((c, i) => {
      const s = c.srcStart.toFixed(3), e = c.srcEnd.toFixed(3);
      parts.push(`[0:v]trim=start=${s}:end=${e},setpts=PTS-STARTPTS[v${i}]`);
      if (withAudio) parts.push(`[0:a]atrim=start=${s}:end=${e},asetpts=PTS-STARTPTS[a${i}]`);
      cat += withAudio ? `[v${i}][a${i}]` : `[v${i}]`;
    });
    const n = clips.length;
    if (withAudio) return parts.join(';') + ';' + cat + `concat=n=${n}:v=1:a=1[outv][outa]`;
    return parts.join(';') + ';' + cat + `concat=n=${n}:v=1:a=0[outv]`;
  }

  async function encodeOnce(withAudio) {
    const ff = ffmpeg;
    const { fetchFile } = FFmpeg;
    const ext = (currentFile.name.split('.').pop() || 'mp4').toLowerCase().replace(/[^a-z0-9]/g, '') || 'mp4';
    const inName = 'input.' + ext;
    ff.FS('writeFile', inName, await fetchFile(currentFile));

    const filter = buildFilter(withAudio);
    const args = ['-i', inName, '-filter_complex', filter, '-map', '[outv]'];
    if (withAudio) args.push('-map', '[outa]', '-c:a', 'aac');
    args.push('-c:v', 'libx264', '-preset', 'veryfast', '-crf', '20', '-pix_fmt', 'yuv420p');
    if (!withAudio) args.push('-an');
    args.push('cut.mp4');

    stageLabel = withAudio ? 'encoding' : 'encoding (no audio track)';
    setStatus(stageLabel + '…', 'busy');
    await ff.run(...args);

    const data = ff.FS('readFile', 'cut.mp4');  // throws if ffmpeg produced nothing
    try { ff.FS('unlink', inName); ff.FS('unlink', 'cut.mp4'); } catch (_) {}
    return new Blob([data.buffer], { type: 'video/mp4' });
  }

  async function exportVideo() {
    if (!clips.length || exporting || !currentFile) return;
    const btn = document.getElementById('btn-export');
    exporting = true;
    pausePlay();
    btn.disabled = true;

    try {
      setStatus('loading video engine (~25 MB, first time only)…', 'busy');
      await loadFFmpeg();

      let blob;
      try {
        blob = await encodeOnce(true);          // assume the video has audio
      } catch (e) {
        // most likely: no audio stream — reset to a clean instance and retry video-only
        console.warn('audio export failed, retrying without audio:', e);
        ffmpeg = null;
        setStatus('no audio track found — retrying…', 'busy');
        await loadFFmpeg();
        blob = await encodeOnce(false);
      }

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'cut.mp4';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 3000);
      setStatus(`exported ✓ · ${(blob.size / 1048576).toFixed(1)} MB · saved as cut.mp4`);
    } catch (e) {
      console.error(e);
      setStatus('export failed: ' + (e && e.message ? e.message : 'unknown error'), 'err');
      ffmpeg = null;  // instance may be in a bad state — force a fresh load next time
    } finally {
      stageLabel = '';
      exporting = false;
      btn.disabled = (clips.length === 0);
    }
  }
</script>
</body>
</html>
